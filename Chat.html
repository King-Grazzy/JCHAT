<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCHAT - Chat</title>
    
    <!-- Security Meta Tags -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="JCHAT - Real-time messaging with friends">
    <meta name="keywords" content="chat, messaging, real-time, friends, JCHAT">
    <meta name="author" content="JCHAT Team">

    <!-- Google Fonts: Poppins for headings, Inter for body text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Preconnect to Firebase and Cloudinary domains for faster loading -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firebaseio.com" crossorigin>
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
    <link rel="preconnect" href="https://api.cloudinary.com" crossorigin>
    <link rel="dns-prefetch" href="//fonts.googleapis.com">
    <link rel="dns-prefetch" href="//fonts.gstatic.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        /* Universal box-sizing for consistent layout */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        /* Global CSS Variables for easy theme switching */
        :root {
            --pink: #ff2e92;
            --blue: #00d5ff;
            --glass-black: rgba(10, 10, 10, .75);
            --glass-blue: rgba(0, 213, 255, .15);
            --radius: 20px;
            --transition: .3s ease;

            /* These variables will be overridden by theme classes */
            --white: #fff;
            --text-light: rgba(255, 255, 255, .7);
            --background-main: rgba(10, 10, 10, .75);
            --background-gradient-1: #00d5ff;
            --background-gradient-2: #ff2e92;
            --card-background: linear-gradient(145deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, .01));
            --header-background: linear-gradient(135deg, rgba(10, 10, 10, .85), rgba(10, 10, 10, .75));
            --border-light: rgba(255, 255, 255, .05);
            --input-background: rgba(255, 255, 255, 0.05);
            --button-background: linear-gradient(90deg, var(--blue), var(--pink));
            --button-shadow: 0 4px 15px var(--blue), 0 4px 15px var(--pink);

            /* New variables for consistent theming */
            --background-color-primary: #1a1a2e;
            --background-color-secondary: #0f0f1f;
            --header-background-color: #2a2a4a;
            --footer-background-color: #2a2a4a;
            --content-background-color: #20203a;
            --card-background-color: #2a2a4a;
            --text-color-primary: #e0e0e0;
            --text-color-secondary: #b0b0d0;
            --notification-badge-color: #ff2e92;
            --status-online: #4CAF50;
            --status-offline: #6c757d;
            --status-away: #FFC107;
            --delete-button-color: #dc3545;
            --warning-color: #ffc107;
            --accent-color: #00d5ff;
            --accent-color-dark: #00aaff;
            --border-color: #3a3a5a;
        }

        /* --- Theme Definitions (Light and Dark Mode) --- */
        /* Light Mode */
        body.theme-light-mode {
            --background-main: #f0f2f5;
            --background-gradient-1: #e0e2e5;
            --background-gradient-2: #d0d2d5;
            --white: #333;
            --text-light: #666;
            --card-background: rgba(255, 255, 255, 0.95);
            --header-background: rgba(255, 255, 255, 0.98);
            --border-light: rgba(0, 0, 0, 0.1);
            --input-background: rgba(0, 0, 0, 0.05);
            --button-background: linear-gradient(90deg, #6dd5ed, #2193b0);
            --button-shadow: 0 4px 15px rgba(109, 213, 237, 0.4), 0 4px 15px rgba(33, 147, 176, 0.4);

            --background-color-primary: #f0f2f5;
            --background-color-secondary: #e0e2e5;
            --header-background-color: #ffffff;
            --footer-background-color: #ffffff;
            --content-background-color: #f7f9fb;
            --card-background-color: #ffffff;
            --text-color-primary: #333333;
            --text-color-secondary: #666666;
            --text-color-light: #999999;
            --accent-color: #007bff;
            --accent-color-dark: #0056b3;
            --border-color: #e0e0e0;
            --input-background-color: #f0f0f0;
            --button-background: #e9ecef;
            --button-hover-background: #dee2e6;
            --active-item-background: rgba(0, 123, 255, 0.1);
            --notification-badge-color: #dc3545;
            --status-online: #28a745;
            --status-offline: #6c757d;
            --status-away: #ffc107;
            --delete-button-color: #dc3545;
            --warning-color: #ffc107;
        }

        /* Dark Mode */
        body.theme-dark-mode {
            --background-main: #1a1a2e;
            --background-gradient-1: #16213e;
            --background-gradient-2: #0f3460;
            --white: #e0e0e0;
            --text-light: #a0a0a0;
            --card-background: rgba(25, 25, 40, 0.7);
            --header-background: linear-gradient(135deg, rgba(10, 10, 20, .85), rgba(10, 10, 20, .75));
            --border-light: rgba(255, 255, 255, 0.08);
            --input-background: rgba(255, 255, 255, 0.08);
            --button-background: linear-gradient(90deg, #e94560, #ba2f49);
            --button-shadow: 0 4px 15px rgba(233, 69, 96, 0.4), 0 4px 15px rgba(186, 47, 73, 0.4);

            --background-color-primary: #121212;
            --background-color-secondary: #1e1e1e;
            --header-background-color: #2c2c2c;
            --footer-background-color: #2c2c2c;
            --content-background-color: #242424;
            --card-background-color: #2c2c2c;
            --text-color-primary: #ffffff;
            --text-color-secondary: #bbbbbb;
            --accent-color: #bb86fc;
            --accent-color-dark: #9a67ea;
            --border-color: #444444;
            --input-background-color: #383838;
            --button-background: #383838;
            --button-hover-background: #505050;
            --active-item-background: rgba(187, 134, 252, 0.2);
            --notification-badge-color: #cf6679;
            --delete-button-color: #f44336;
            --warning-color: #ffeb3b;
        }

        /* Glass Mode specific variables */
        body.theme-glass-mode {
            --background-main: rgba(10, 10, 10, 0.75);
            background-image: url('https://source.unsplash.com/random/1920x1080?abstract,blur') !important;
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            backdrop-filter: blur(10px);
            --card-background: rgba(25, 25, 40, 0.7);
            --white: #e0e0e0;
            --text-light: rgba(255, 255, 255, 0.7);
            --input-background: rgba(255, 255, 255, 0.05);
            --border-light: rgba(255, 255, 255, 0.1);
            --button-background: linear-gradient(90deg, var(--pink), var(--blue));
            --button-shadow: 0 4px 15px var(--blue), 0 4px 15px var(--pink);
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.5);

            --background-color-primary: rgba(10, 10, 10, 0.75);
            --background-color-secondary: rgba(10, 10, 10, 0.6);
            --header-background-color: rgba(10, 10, 10, 0.85);
            --footer-background-color: rgba(10, 10, 10, 0.85);
            --content-background-color: rgba(10, 10, 10, 0.75);
            --card-background-color: rgba(25, 25, 40, 0.7);
            --text-color-primary: #e0e0e0;
            --text-color-secondary: #b0b0d0;
            --accent-color: #00d5ff;
            --accent-color-dark: #00aaff;
            --border-color: rgba(255, 255, 255, 0.1);
            --input-background-color: rgba(255, 255, 255, 0.05);
            --button-background: rgba(0, 213, 255, 0.15);
            --button-hover-background: rgba(0, 213, 255, 0.25);
            --active-item-background: rgba(0, 213, 255, 0.1);
        }

        /* Sunset Theme */
        body.theme-sunset-mode {
            background: linear-gradient(to top, #ff7e5f, #feb47b) !important;
            --background-main: linear-gradient(to top, #ff7e5f, #feb47b);
            --card-background: rgba(255, 255, 255, 0.15);
            --white: #fff;
            --text-light: rgba(255, 255, 255, 0.8);
            --input-background: rgba(255, 255, 255, 0.1);
            --border-light: rgba(255, 255, 255, 0.3);
            --button-background: linear-gradient(90deg, #fd746c, #ff9068);
            --button-shadow: 0 4px 15px rgba(253, 116, 108, 0.4), 0 4px 15px rgba(255, 144, 104, 0.4);

            --background-color-primary: #ff7e5f;
            --background-color-secondary: #feb47b;
            --header-background-color: rgba(255, 126, 95, 0.9);
            --footer-background-color: rgba(255, 126, 95, 0.9);
            --content-background-color: rgba(255, 126, 95, 0.85);
            --card-background-color: rgba(255, 255, 255, 0.15);
            --text-color-primary: #fff;
            --text-color-secondary: rgba(255, 255, 255, 0.8);
            --accent-color: #ffd700;
            --accent-color-dark: #ccaa00;
            --border-color: rgba(255, 255, 255, 0.3);
            --input-background-color: rgba(255, 255, 255, 0.2);
            --button-background: rgba(255, 255, 255, 0.2);
            --button-hover-background: rgba(255, 255, 255, 0.3);
            --active-item-background: rgba(255, 215, 0, 0.1);
        }

        html, body {
            scroll-behavior: auto !important;
            overflow: auto !important;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 0px;
            background-color: var(--background-main);
            background-image: radial-gradient(circle at top left, var(--background-gradient-1), transparent 100px),
                              radial-gradient(circle at bottom right, var(--background-gradient-2), transparent 150px);
            color: var(--white);
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* Header Styling */
        header {
            background: var(--header-background);
            border-bottom: 1px solid var(--border-light);
            padding: 10px 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 55px;
            z-index: 10;
            display: flex;
            justify-content: center;
        }

        header .header-content-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            padding: 0 30px;
        }

        .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            background-clip: text;
            color: transparent;
            background-image: linear-gradient(90deg, var(--blue), var(--pink));
            letter-spacing: -0.03em;
            text-decoration: none;
        }

        /* Header Navigation */
        header nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 25px;
        }

        header nav ul li a {
            color: var(--white);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 5px 0;
            position: relative;
            transition: color var(--transition);
        }

        header nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 3px;
            background: var(--blue);
            border-radius: 2px;
            transition: width var(--transition);
        }

        header nav ul li a:hover {
            color: var(--blue);
        }

        header nav ul li a:hover::after {
            width: 100%;
        }

        /* User Profile Header Styling */
        .user-profile-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Notification Icon Styling */
        .notification-icon-wrapper {
            position: relative;
            margin-right: 15px;
        }

        .notification-icon-wrapper a {
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .notification-icon-wrapper a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .notification-icon-wrapper a:hover::before {
            left: 100%;
        }

        .notification-icon-wrapper a:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 213, 255, 0.3);
            border-color: var(--blue);
        }

        .notification-icon-wrapper i {
            font-size: 1.3rem;
            background: linear-gradient(45deg, var(--blue), var(--pink));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            transition: all 0.3s ease;
            z-index: 1;
            position: relative;
        }

        .notification-icon-wrapper a:hover i {
            transform: rotate(15deg) scale(1.1);
            background: linear-gradient(45deg, var(--pink), var(--blue));
            background-clip: text;
            -webkit-background-clip: text;
        }

        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: linear-gradient(45deg, #ff4757, #ff3742);
            color: var(--white);
            border-radius: 50%;
            padding: 4px 8px;
            font-size: 0.7rem;
            font-weight: 800;
            min-width: 22px;
            height: 22px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--background-main);
            animation: pulse-notification 2s infinite;
            z-index: 2;
        }

        @keyframes pulse-notification {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .notification-badge:empty {
            display: none;
        }

        .user-profile-header #profileLink {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--white);
            transition: opacity 0.3s ease, background-color 0.3s ease;
            padding: 5px 10px;
            border-radius: var(--radius);
        }

        .user-profile-header #profileLink:hover {
            opacity: 0.8;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .user-profile-header img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: opacity 0.3s ease;
        }

        .user-profile-header i {
            font-size: 30px;
            background-image: linear-gradient(90deg, var(--blue), var(--pink));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        .user-profile-header span {
            font-weight: 600;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
            background-image: linear-gradient(90deg, var(--blue), var(--pink));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        /* Admin Icon Styling */
        #adminIconLink {
            display: none;
            margin-right: 15px;
            background-image: linear-gradient(90deg, var(--blue), var(--pink));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            font-size: 1.5rem;
            transition: transform 0.2s ease;
        }

        #adminIconLink:hover {
            transform: scale(1.1);
        }

        /* Main Content Area */
        main {
            flex-grow: 1;
            padding: 0;
            padding-top: 55px;
            width: 100%;
            height: calc(100vh - 55px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-wrapper {
            width: 100%;
            height: 100%;
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Chat Header Section */
        .chat-header-section {
            background: var(--card-background);
            border-bottom: 1px solid var(--border-light);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px) saturate(180%);
            position: relative;
            z-index: 5;
        }

        .chat-header-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--blue), var(--pink));
        }

        .back-button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-light);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--white);
            text-decoration: none;
        }

        .back-button:hover {
            background: var(--button-background);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 213, 255, 0.3);
        }

        .back-button i {
            font-size: 1.2rem;
            background: linear-gradient(45deg, var(--blue), var(--pink));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chat-partner-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .partner-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--blue);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .partner-avatar-placeholder {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--blue), var(--pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--white);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .partner-avatar-placeholder i {
            background-image: linear-gradient(90deg, var(--pink), var(--blue));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .partner-details h2 {
            margin: 0 0 5px 0;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--white);
            font-family: 'Poppins', sans-serif;
        }

        .partner-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--status-offline);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        .status-indicator.online {
            background: var(--status-online);
            box-shadow: 0 0 10px var(--status-online);
        }

        .status-indicator.away {
            background: var(--status-away);
            box-shadow: 0 0 10px var(--status-away);
        }

        .chat-options {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-option-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-light);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--white);
        }

        .chat-option-btn:hover {
            background: var(--button-background);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 213, 255, 0.3);
        }

        .chat-option-btn i {
            font-size: 1rem;
            background: linear-gradient(45deg, var(--blue), var(--pink));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Messages Section */
        .messages-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--background-main);
            position: relative;
        }

        .messages-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        /* Custom scrollbar */
        .messages-list::-webkit-scrollbar {
            width: 8px;
        }

        .messages-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .messages-list::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, var(--blue), var(--pink));
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .messages-list::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(to bottom, var(--pink), var(--blue));
        }

        /* Message Items */
        .message-item {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            max-width: 80%;
            animation: messageSlideIn 0.3s ease-out;
        }

        .message-item.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-item.received {
            align-self: flex-start;
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-color);
            flex-shrink: 0;
        }

        .message-avatar-placeholder {
            width: 35px;
            height: 35px;

            }

            .send-button {
                width: 35px;
                height: 35px;
            }

            .send-button i {
                font-size: 0.9rem;
            }
        }

        /* File Upload Styles */
        .file-input {
            display: none;
        }

        .upload-preview {
            display: none;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);

        }

        /**
         * Displays a temporary message box with a given message and type.
         */
        function showMessageBox(message, type, isPersistent = false, durationMs = 3000) {
            if (messageBox.timeoutId) {
                clearTimeout(messageBox.timeoutId);
            }

            messageBox.innerHTML = `<i id="messageBoxIcon"></i><span id="messageBoxText"></span>`;
            const messageBoxIcon = document.getElementById('messageBoxIcon');
            const messageBoxText = document.getElementById('messageBoxText');

            messageBoxText.textContent = message;
            messageBox.className = 'message-box show ' + type;

            if (type === 'success') {
                messageBoxIcon.classList.add('fas', 'fa-check-circle');
            } else if (type === 'error') {
                messageBoxIcon.classList.add('fas', 'fa-times-circle');
            } else if (type === 'info') {
                messageBoxIcon.classList.add('fas', 'fa-info-circle');
            } else if (type === 'warning') {
                messageBoxIcon.classList.add('fas', 'fa-exclamation-triangle');
            } else if (type === 'loading') {
                messageBoxIcon.classList.add('fas', 'fa-spinner', 'fa-spin');
            }

            messageBox.style.display = 'flex';
            messageBox.style.opacity = '1';

            if (!isPersistent) {
                messageBox.timeoutId = setTimeout(() => {
                    messageBox.style.opacity = '0';
                    messageBox.addEventListener('transitionend', function handler() {
                        messageBox.style.display = 'none';
                        messageBox.removeEventListener('transitionend', handler);
                    }, { once: true });
                }, durationMs);
            }
        }

        /**
         * Constructs a Cloudinary URL for an image/video.
         */
        function getCloudinaryImageUrl(urlOrPublicId, transformations = "w_auto,f_auto,q_auto") {
            if (!urlOrPublicId) return null;
            if (urlOrPublicId.startsWith('http://') || urlOrPublicId.startsWith('https://')) {
                if (urlOrPublicId.includes('res.cloudinary.com')) {
                    const parts = urlOrPublicId.split('/upload/');
                    if (parts.length === 2) {
                        return `${parts[0]}/upload/${transformations}/${parts[1]}`;
                    }
                }
                return urlOrPublicId;
            }
            return `https://res.cloudinary.com/${cloudinaryConfig.cloudName}/image/upload/${transformations}/${urlOrPublicId}`;
        }

        /**
         * Displays the profile picture or a default icon.
         */
        function displayProfilePicture(imgElement, iconElement, profilePicId, usernameInitial, transformations) {
            if (imgElement && iconElement) {
                if (profilePicId) {
                    const imageUrl = getCloudinaryImageUrl(profilePicId, transformations);
                    imgElement.src = imageUrl;
                    imgElement.style.display = 'block';
                    iconElement.style.display = 'none';
                    imgElement.onerror = () => {
                        console.error(`JCHAT_ERROR: Failed to load profile picture: ${profilePicId}. Using placeholder.`);
                        imgElement.src = `https://placehold.co/50x50/CCCCCC/000000?text=${usernameInitial}`;
                        imgElement.style.display = 'block';
                        iconElement.style.display = 'none';
                    };
                } else {
                    imgElement.src = '';
                    imgElement.style.display = 'none';
                    iconElement.style.display = 'block';
                }
            }
        }

        /**
         * Fetches and displays the current user's profile data for the header.
         */
        async function fetchAndDisplayHeaderProfile(user) {
            console.log("JCHAT_DEBUG: fetchAndDisplayHeaderProfile called for user:", user.uid);
            try {
                const privateProfileDocRef = doc(db, "artifacts", appId, "users", user.uid, "profiles", "user_profile");
                const privateDocSnap = await getDoc(privateProfileDocRef);

                let profileData = null;
                if (privateDocSnap.exists()) {
                    profileData = privateDocSnap.data();
                    console.log("JCHAT_DEBUG: Fetched existing profile data for header:", profileData);
                } else {
                    console.warn("JCHAT_WARN: Private profile not found for header, creating a new one.");
                    profileData = {
                        username: user.displayName || `User_${user.uid.substring(0, 8)}`,
                        email: user.email || "",
                        profilePicId: user.photoURL || null,
                        bio: "",
                        location: "",
                        friendsCount: 0,
                        followersCount: 0,
                        followingCount: 0,
                        createdAt: new Date(),
                        updatedAt: new Date(),
                        inspirationType: "motivational",
                        visibility: {
                            displayName: true, profilePic: true, bio: false, location: false,
                            emailPublic: false, lastOnline: false, allowFriendRequests: true, allowMessages: true,
                        },
                        totalPosts: 0,
                        jCoins: 0,
                        gas: 0,
                        level: 1,
                        currentXp: 0,
                        xpToNextLevel: 500,
                        walletUnlocked: false,
                        lastLoginBonusClaimed: null,
                        isAdmin: false
                    };
                    await setDoc(privateProfileDocRef, profileData);

                    const publicProfileDocRef = doc(db, "artifacts", appId, "public", "data", "users", user.uid);
                    await setDoc(publicProfileDocRef, {
                        username: profileData.username,
                        profilePicId: profileData.profilePicId,
                        bio: profileData.bio,
                        location: profileData.location,
                        createdAt: profileData.createdAt,
                        updatedAt: profileData.updatedAt,
                        visibility: profileData.visibility,
                        totalPosts: profileData.totalPosts
                    }, { merge: true });
                }

                currentUserProfileData = profileData;

                const usernameInitial = (profileData.username || "J").charAt(0).toUpperCase();
                displayProfilePicture(headerProfilePic, headerAvatarIcon, profileData?.profilePicId, usernameInitial, "w_70,h_70,c_fill,g_face,r_max");
                headerDisplayName.textContent = profileData.username || "JCHAT User";

                if (profileLink) {
                    profileLink.href = `/profile.html?userId=${user.uid}`;
                }

                const ADMIN_UID = 'cc96gdhCRPO72NFZtleRCujHvIq2';
                if (adminIconLink) {
                    if (user.uid === ADMIN_UID) {
                        adminIconLink.style.display = 'block';
                    } else {
                        adminIconLink.style.display = 'none';
                    }
                }

            } catch (error) {
                console.error("JCHAT_ERROR: Error fetching or creating profile for header:", error);
                const usernameInitial = (user.displayName || "J").charAt(0).toUpperCase();
                displayProfilePicture(headerProfilePic, headerAvatarIcon, user.photoURL, usernameInitial, "w_70,h_70,c_fill,g_face,r_max");
                headerDisplayName.textContent = user.displayName || "JCHAT User";
                showMessageBox(`Error loading header profile: ${error.message}`, 'error');
            }
        }

        /**
         * Fetches and displays the notification count for the current user.
         */
        async function fetchNotificationCount(userId) {
            try {
                const notificationsCollectionRef = collection(db, "artifacts", appId, "users", userId, "notifications");
                const q = query(notificationsCollectionRef, where("read", "==", false));
                const querySnapshot = await getDocs(q);
                const unreadCount = querySnapshot.size;

                if (notificationCountElement) {
                    if (unreadCount > 0) {
                        notificationCountElement.textContent = unreadCount;
                        notificationCountElement.style.display = 'flex';
                    } else {
                        notificationCountElement.style.display = 'none';
                    }
                }
            } catch (error) {
                console.error("JCHAT_ERROR: Error fetching notification count:", error);
                if (notificationCountElement) notificationCountElement.style.display = 'none';
            }
        }

        /**
         * Generates a consistent chat ID from two user UIDs.
         */
        function getChatId(uid1, uid2) {
            return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;
        }

        /**
         * Fetches partner profile data.
         */
        async function fetchPartnerData() {
            try {
                const partnerDocRef = doc(db, "artifacts", appId, "public", "data", "users", partnerId);
                const partnerDocSnap = await getDoc(partnerDocRef);

                if (partnerDocSnap.exists()) {
                    partnerData = partnerDocSnap.data();
                    
                    const partnerUsername = partnerData.username || `User_${partnerId.substring(0, 8)}`;
                    const usernameInitial = partnerUsername.charAt(0).toUpperCase();
                    
                    partnerName.textContent = partnerData.visibility?.displayName !== false ? partnerUsername : 'Anonymous User';
                    
                    if (partnerData.profilePicId && partnerData.visibility?.profilePic !== false) {
                        displayProfilePicture(partnerAvatar, partnerAvatarPlaceholder, partnerData.profilePicId, usernameInitial, "w_100,h_100,c_fill,g_face,r_max");
                    } else {
                        partnerAvatar.style.display = 'none';
                        partnerAvatarPlaceholder.style.display = 'flex';
                    }
                } else {
                    partnerName.textContent = 'Unknown User';
                    partnerAvatar.style.display = 'none';
                    partnerAvatarPlaceholder.style.display = 'flex';
                }
            } catch (error) {
                console.error("JCHAT_ERROR: Error fetching partner data:", error);
                partnerName.textContent = 'Error loading user';
                showMessageBox(`Error loading partner data: ${error.message}`, 'error');
            }
        }

        /**
         * Checks if users are friends.
         */
        async function checkFriendship() {
            try {
                const friendshipId = getChatId(currentUser.uid, partnerId);
                const friendshipDocRef = doc(db, "artifacts", appId, "public", "data", "friends", friendshipId);
                const friendshipDocSnap = await getDoc(friendshipDocRef);
                
                if (!friendshipDocSnap.exists()) {
                    showMessageBox("You can only chat with friends. Please add this user as a friend first.", 'warning');
                    setTimeout(() => {
                        window.location.href = '/find_friends.html';
                    }, 3000);
                    return false;
                }
                return true;
            } catch (error) {
                console.error("JCHAT_ERROR: Error checking friendship:", error);
                showMessageBox("Error verifying friendship status.", 'error');
                return false;
            }
        }

        /**
         * Formats timestamp for display.
         */
        function formatMessageTime(timestamp) {
            if (!timestamp) return '';
            
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            const now = new Date();
            const diffInMs = now - date;
            const diffInHours = diffInMs / (1000 * 60 * 60);
            
            if (diffInHours < 24) {
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else {
                return date.toLocaleDateString();
            }
        }

        /**
         * Formats file size for display.
         */
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        /**
         * Creates a message element.
         */
        function createMessageElement(messageData, messageId) {
            const messageItem = document.createElement('div');
            messageItem.classList.add('message-item');
            messageItem.classList.add(messageData.senderId === currentUser.uid ? 'sent' : 'received');
            messageItem.dataset.messageId = messageId;

            const isSent = messageData.senderId === currentUser.uid;
            const senderData = isSent ? currentUserProfileData : partnerData;
            const usernameInitial = (senderData?.username || "U").charAt(0).toUpperCase();

            let avatarHtml = '';
            if (senderData?.profilePicId && senderData?.visibility?.profilePic !== false) {
                const imageUrl = getCloudinaryImageUrl(senderData.profilePicId, "w_70,h_70,c_fill,g_face,r_max");
                avatarHtml = `<img class="message-avatar" src="${imageUrl}" alt="Avatar" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                             <div class="message-avatar-placeholder" style="display: none;"><i class="fas fa-user-circle"></i></div>`;
            } else {
                avatarHtml = `<div class="message-avatar-placeholder"><i class="fas fa-user-circle"></i></div>`;
            }

            let attachmentHtml = '';
            if (messageData.attachmentUrl) {
                const fileExtension = messageData.attachmentName ? messageData.attachmentName.split('.').pop().toLowerCase() : '';
                const isImage = ['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(fileExtension);
                
                if (isImage) {
                    attachmentHtml = `
                        <div class="message-attachment">
                            <img src="${messageData.attachmentUrl}" alt="${messageData.attachmentName || 'Image'}" 
                                 onclick="window.open('${messageData.attachmentUrl}', '_blank')">
                        </div>`;
                } else {
                    let fileIcon = 'fas fa-file';
                    if (['pdf'].includes(fileExtension)) fileIcon = 'fas fa-file-pdf';
                    else if (['doc', 'docx'].includes(fileExtension)) fileIcon = 'fas fa-file-word';
                    else if (['mp4', 'avi', 'mov'].includes(fileExtension)) fileIcon = 'fas fa-file-video';
                    
                    attachmentHtml = `
                        <div class="message-attachment">
                            <div class="file-info">
                                <i class="${fileIcon} file-icon"></i>
                                <div class="file-details">
                                    <div class="file-name">${messageData.attachmentName || 'File'}</div>
                                    <div class="file-size">${messageData.attachmentSize ? formatFileSize(messageData.attachmentSize) : ''}</div>
                                </div>
                            </div>
                        </div>`;
                }
            }

            let statusHtml = '';
            if (isSent) {
                let statusIcon = 'fas fa-check';
                let statusClass = '';
                
                if (messageData.read) {
                    statusIcon = 'fas fa-check-double';
                    statusClass = 'read';
                } else if (messageData.delivered) {
                    statusIcon = 'fas fa-check-double';
                    statusClass = 'delivered';
                }
                
                statusHtml = `<div class="message-status ${statusClass}"><i class="${statusIcon}"></i></div>`;
            }

            messageItem.innerHTML = `
                ${avatarHtml}
                <div class="message-content">
                    <div class="message-bubble">
                        <p class="message-text">${messageData.text || ''}</p>
                        ${attachmentHtml}
                    </div>
                    <div class="message-meta">
                        <span class="message-time">${formatMessageTime(messageData.timestamp)}</span>
                        ${statusHtml}
                    </div>
                </div>
            `;

            return messageItem;
        }

        /**
         * Fetches and displays messages.
         */
        function fetchMessages() {
            if (unsubscribeMessages) unsubscribeMessages();

            const messagesCollectionRef = collection(db, "artifacts", appId, "chats", chatId, "messages");
            const q = query(messagesCollectionRef, orderBy("timestamp", "asc"));

            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                loadingState.style.display = 'none';
                
                if (snapshot.empty) {
                    emptyChatState.style.display = 'flex';
                    messagesList.style.display = 'none';
                } else {
                    emptyChatState.style.display = 'none';
                    messagesList.style.display = 'block';
                    
                    // Clear existing messages
                    messagesList.innerHTML = '';
                    
                    let lastDate = null;
                    
                    snapshot.docs.forEach(docSnap => {
                        const messageData = docSnap.data();
                        const messageDate = messageData.timestamp ? messageData.timestamp.toDate() : new Date();
                        const messageDateString = messageDate.toDateString();
                        
                        // Add date separator if needed
                        if (lastDate !== messageDateString) {
                            const dateSeparator = document.createElement('div');
                            dateSeparator.classList.add('date-separator');
                            dateSeparator.textContent = messageDateString === new Date().toDateString() ? 'Today' : messageDateString;
                            messagesList.appendChild(dateSeparator);
                            lastDate = messageDateString;
                        }
                        
                        const messageElement = createMessageElement(messageData, docSnap.id);
                        messagesList.appendChild(messageElement);
                    });
                    
                    // Scroll to bottom
                    messagesList.scrollTop = messagesList.scrollHeight;
                    
                    // Mark messages as read if they're from partner
                    markMessagesAsRead();
                }
            }, (error) => {
                console.error("JCHAT_ERROR: Error fetching messages:", error);
                showMessageBox(`Error loading messages: ${error.message}`, 'error');
                loadingState.style.display = 'none';
                emptyChatState.style.display = 'flex';
            });
        }

        /**
         * Marks unread messages as read.
         */
        async function markMessagesAsRead() {
            try {
                const messagesCollectionRef = collection(db, "artifacts", appId, "chats", chatId, "messages");
                const q = query(messagesCollectionRef, 
                    where("senderId", "==", partnerId), 
                    where("read", "==", false)
                );
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    const batch = writeBatch(db);
                    querySnapshot.docs.forEach(docSnap => {
                        batch.update(docSnap.ref, { read: true });
                    });
                    await batch.commit();
                }
            } catch (error) {
                console.error("JCHAT_ERROR: Error marking messages as read:", error);
            }
        }

        /**
         * Uploads file to Cloudinary.
         */
        async function uploadFileToCloudinary(file) {
            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', cloudinaryConfig.uploadPreset);
                
                const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudinaryConfig.cloudName}/auto/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error('Upload failed');
                }
                
                const data = await response.json();
                return {
                    url: data.secure_url,
                    publicId: data.public_id,
                    size: data.bytes
                };
            } catch (error) {
                console.error("JCHAT_ERROR: Error uploading file:", error);
                throw error;
            }
        }

        /**
         * Sends a message.
         */
        async function sendMessage() {
            const messageText = messageInput.value.trim();
            
            if (!messageText && !selectedFile) {
                return;
            }
            
            if (!currentUser || !currentUserProfileData) {
                showMessageBox("You must be logged in to send messages.", 'error');
                return;
            }

            sendButton.disabled = true;
            messageInput.disabled = true;

            try {
                let attachmentData = null;
                
                // Upload file if selected
                if (selectedFile) {
                    showMessageBox("Uploading file...", 'loading', true);
                    const uploadResult = await uploadFileToCloudinary(selectedFile);
                    attachmentData = {
                        url: uploadResult.url,
                        name: selectedFile.name,
                        size: uploadResult.size,
                        type: selectedFile.type
                    };
                    clearFileSelection();
                    showMessageBox("File uploaded successfully!", 'success', false, 1000);
                }

                // Send message
                const messagesCollectionRef = collection(db, "artifacts", appId, "chats", chatId, "messages");
                const messageData = {
                    text: messageText,
                    senderId: currentUser.uid,
                    receiverId: partnerId,
                    timestamp: serverTimestamp(),
                    delivered: false,
                    read: false
                };

                if (attachmentData) {
                    messageData.attachmentUrl = attachmentData.url;
                    messageData.attachmentName = attachmentData.name;
                    messageData.attachmentSize = attachmentData.size;
                    messageData.attachmentType = attachmentData.type;
                }

                await addDoc(messagesCollectionRef, messageData);

                // Send notification to partner
                const notificationRef = collection(db, "artifacts", appId, "users", partnerId, "notifications");
                await addDoc(notificationRef, {
                    type: 'new_message',
                    message: `${currentUserProfileData.username} sent you a message`,
                    senderId: currentUser.uid,
                    recipientId: partnerId,
                    timestamp: serverTimestamp(),
                    read: false
                });

                // Clear input
                messageInput.value = '';
                messageInput.style.height = 'auto';

            } catch (error) {
                console.error("JCHAT_ERROR: Error sending message:", error);
                showMessageBox(`Failed to send message: ${error.message}`, 'error');
            } finally {
                sendButton.disabled = false;
                messageInput.disabled = false;
                messageInput.focus();
            }
        }

        /**
         * Handles file selection.
         */
        function handleFileSelection(file) {
            if (!file) return;

            // Check file size (10MB limit)
            const maxSize = 10 * 1024 * 1024; // 10MB
            if (file.size > maxSize) {
                showMessageBox("File size must be less than 10MB", 'error');
                return;
            }

            selectedFile = file;
            
            // Update upload preview
            uploadName.textContent = file.name;
            uploadSize.textContent = formatFileSize(file.size);
            
            // Set appropriate icon
            const fileExtension = file.name.split('.').pop().toLowerCase();
            if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(fileExtension)) {
                uploadIcon.className = 'fas fa-image upload-icon';
            } else if (['mp4', 'avi', 'mov'].includes(fileExtension)) {
                uploadIcon.className = 'fas fa-video upload-icon';
            } else if (fileExtension === 'pdf') {
                uploadIcon.className = 'fas fa-file-pdf upload-icon';
            } else if (['doc', 'docx'].includes(fileExtension)) {
                uploadIcon.className = 'fas fa-file-word upload-icon';
            } else {
                uploadIcon.className = 'fas fa-file upload-icon';
            }
            
            uploadPreview.classList.add('show');
        }

        /**
         * Clears file selection.
         */
        function clearFileSelection() {
            selectedFile = null;
            uploadPreview.classList.remove('show');
            fileInput.value = '';
        }

        /**
         * Auto-resize textarea.
         */
        function autoResizeTextarea() {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + 'px';
        }

        /**
         * Clear chat messages.
         */
        async function clearChat() {
            try {
                const messagesCollectionRef = collection(db, "artifacts", appId, "chats", chatId, "messages");
                const querySnapshot = await getDocs(messagesCollectionRef);
                
                if (querySnapshot.empty) {
                    showMessageBox("No messages to clear", 'info');
                    return;
                }

                const batch = writeBatch(db);
                querySnapshot.docs.forEach(docSnap => {
                    batch.delete(docSnap.ref);
                });
                
                await batch.commit();
                showMessageBox("Chat cleared successfully", 'success');
            } catch (error) {
                console.error("JCHAT_ERROR: Error clearing chat:", error);
                showMessageBox(`Failed to clear chat: ${error.message}`, 'error');
            }
        }

        /**
         * Initialize chat.
         */
        async function initializeChat() {
            if (!currentUser || !partnerId) return;

            chatId = getChatId(currentUser.uid, partnerId);
            
            // Check if users are friends
            const areFriends = await checkFriendship();
            if (!areFriends) return;

            // Fetch partner data
            await fetchPartnerData();
            
            // Start listening for messages
            fetchMessages();
        }

        // Event Listeners
        sendButton.addEventListener('click', sendMessage);

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        messageInput.addEventListener('input', autoResizeTextarea);

        attachmentBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleFileSelection(file);
            }
        });

        uploadRemove.addEventListener('click', clearFileSelection);

        clearChatBtn.addEventListener('click', async () => {
            if (confirm('Are you sure you want to clear all messages in this chat?')) {
                await clearChat();
            }
        });

        chatInfoBtn.addEventListener('click', () => {
            if (partnerId) {
                window.location.href = `/profile.html?userId=${partnerId}`;
            }
        });

        // Authentication State Listener
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                console.log("JCHAT_DEBUG: User authenticated in Chat Page:", user.uid);
                await fetchAndDisplayHeaderProfile(user);
                await initializeChat();
                fetchNotificationCount(user.uid);
            } else {
                console.log("JCHAT_DEBUG: No user signed in. Attempting authentication...");
                try {
                    if (initialAuthToken) {
                        await signInWithCustomToken(auth, initialAuthToken);
                        console.log("JCHAT_DEBUG: Signed in with custom token.");
                    } else {
                        await signInAnonymously(auth);
                        console.log("JCHAT_DEBUG: Signed in anonymously.");
                    }
                } catch (error) {
                    console.error("JCHAT_ERROR: Error during authentication:", error);
                    showMessageBox("Authentication failed. Redirecting to login...", 'error');
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                }
            }
        });

        // Theme handling
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('jchat-theme');
            const themes = ['theme-light-mode', 'theme-dark-mode', 'theme-glass-mode', 'theme-sunset-mode'];
            if (savedTheme && themes.includes(savedTheme)) {
                document.body.classList.remove(...themes);
                document.body.classList.add(savedTheme);
            } else {
                document.body.classList.remove(...themes);
                document.body.classList.add('theme-dark-mode');
            }
        });

        window.addEventListener('storage', (event) => {
            if (event.key === 'jchat-theme') {
                const newTheme = event.newValue || 'theme-dark-mode';
                const themes = ['theme-light-mode', 'theme-dark-mode', 'theme-glass-mode', 'theme-sunset-mode'];
                if (themes.includes(newTheme)) {
                    document.body.classList.remove(...themes);
                    document.body.classList.add(newTheme);
                }
            }
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (unsubscribeMessages) unsubscribeMessages();
            if (unsubscribePartnerStatus) unsubscribePartnerStatus();
        });
    </script>
