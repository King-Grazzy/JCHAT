    <style>
        /* Universal box-sizing for consistent layout */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        /* Global CSS Variables for easy theme switching */
        :root {
            --pink: #ff2e92;
            --blue: #00d5ff;
            --glass-black: rgba(10, 10, 10, .75);
            --glass-blue: rgba(0, 213, 255, .15);
            --radius: 20px;
            --transition: .3s ease;

            /* These variables will be overridden by theme classes */
            --white: #fff;
            --text-light: rgba(255, 255, 255, .7);
            --background-main: rgba(10, 10, 10, .75);
            --background-gradient-1: #00d5ff;
            --background-gradient-2: #ff2e92;
            --card-background: linear-gradient(145deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, .01));
            --header-background: linear-gradient(135deg, rgba(10, 10, 10, .85), rgba(10, 10, 10, .75));
            --border-light: rgba(255, 255, 255, .05);
            --input-background: rgba(255, 255, 255, 0.05);
            --button-background: linear-gradient(90deg, var(--blue), var(--pink));
            --button-shadow: 0 4px 15px var(--blue), 0 4px 15px var(--pink);

            /* Semantic Colors */
            --background-color-primary: #1a1a2e;
            --background-color-secondary: #0f0f1f;
            --header-background-color: #2a2a4a;
            --footer-background-color: #2a2a4a;
            --content-background-color: #20203a;
            --card-background-color: #2a2a4a;
            --text-color-primary: #e0e0e0;
            --text-color-secondary: #b0b0d0;
            --notification-badge-color: #ff2e92;
            --status-online: #4CAF50;
            --status-offline: #6c757d;
            --status-away: #FFC107;
            --delete-button-color: #dc3545;
            --warning-color: #ffc107;
            --accent-color: #00d5ff;
            --accent-color-dark: #00aaff;
            --border-color: #3a3a5a;
            --theme-gold: #ffd700;

            /* Message Bubble Colors */
            --message-received-bg: rgba(255, 255, 255, 0.1);
            --message-sent-bg: linear-gradient(135deg, var(--blue), var(--pink));
            --message-received-text: var(--text-color-primary);
            --message-sent-text: #ffffff;
        }

        /* Pink and Blue Glowing Loader */
        .jchat-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.95), rgba(20, 20, 30, 0.95));
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .jchat-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-container {
            text-align: center;
            position: relative;
        }

        .loader-spinner {
            width: 80px;
            height: 80px;
            border: 4px solid transparent;
            border-radius: 50%;
            position: relative;
            margin: 0 auto 20px;
            animation: spin 2s linear infinite;
        }

        .loader-spinner::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border: 4px solid transparent;
            border-top: 4px solid var(--pink);
            border-right: 4px solid var(--blue);
            border-radius: 50%;
            animation: spin 1.5s linear infinite reverse;
            filter: drop-shadow(0 0 20px var(--pink)) drop-shadow(0 0 20px var(--blue));
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-text {
            color: var(--white);
            font-family: 'Poppins', sans-serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .loader-subtext {
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            opacity: 0.8;
        }

        /* Global Body Styles */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--background-color-primary) 0%, var(--background-color-secondary) 100%);
            background-attachment: fixed;
            color: var(--text-color-primary);
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(0, 213, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 46, 146, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(0, 213, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* Chat Container */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 100%;
            margin: 0 auto;
            background: var(--card-background);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            position: relative;
            overflow: hidden;
        }

        /* Chat Header */
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background: var(--header-background);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--border-light);
            position: relative;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-button {
            background: none;
            border: none;
            color: var(--text-color-primary);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-button:hover {
            background: var(--border-light);
            transform: translateX(-2px);
        }

        .partner-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .partner-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--border-light);
            object-fit: cover;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 0 0 2px rgba(0, 213, 255, 0);
        }

        .partner-avatar:hover {
            transform: scale(1.05);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(0, 213, 255, 0.3);
        }

        .partner-details h3 {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-color-primary);
        }

        .partner-status {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--status-offline);
            transition: var(--transition);
        }

        .status-indicator.online {
            background: var(--status-online);
            box-shadow: 0 0 8px var(--status-online);
        }

        .status-indicator.away {
            background: var(--status-away);
        }

        .status-text {
            font-size: 12px;
            color: var(--text-color-secondary);
        }

        .chat-header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-action-btn {
            background: none;
            border: none;
            color: var(--text-color-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-action-btn:hover {
            background: var(--border-light);
            color: var(--text-color-primary);
            transform: scale(1.1);
        }

        /* Header Profile */
        .header-profile {
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .header-profile:hover {
            transform: scale(1.05);
        }

        .header-profile-pic {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid var(--border-light);
            object-fit: cover;
            transition: all 0.3s ease;
            display: block;
        }

        .header-profile-fallback {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid var(--border-light);
            background: var(--input-background);
            display: none;
            align-items: center;
            justify-content: center;
            color: var(--text-color-secondary);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .header-profile:hover .header-profile-pic {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(0, 213, 255, 0.4);
        }

        .header-profile:hover .header-profile-fallback {
            border-color: var(--accent-color);
            background: var(--border-light);
            color: var(--accent-color);
        }

        /* Messages Area */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--border-light);
            border-radius: 3px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: var(--text-color-secondary);
        }

        /* Message Bubbles */
        .message {
            display: flex;
            margin-bottom: 10px;
            animation: messageSlideIn 0.3s ease-out;
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 20px;
            position: relative;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
            backdrop-filter: blur(10px);
            border: 1px solid transparent;
        }

        .message.sent .message-bubble {
            background: var(--message-sent-bg);
            color: var(--message-sent-text);
            border-bottom-right-radius: 8px;
            margin-left: auto;
            box-shadow: 0 4px 15px rgba(0, 213, 255, 0.2);
        }

        .message.received .message-bubble {
            background: var(--message-received-bg);
            color: var(--message-received-text);
            border-bottom-left-radius: 8px;
            border: 1px solid var(--border-light);
        }

        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        .message.received .message-time {
            text-align: left;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: var(--message-received-bg);
            border-radius: 20px;
            border-bottom-left-radius: 8px;
            max-width: 70%;
            margin-bottom: 10px;
            border: 1px solid var(--border-light);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .typing-indicator.active {
            opacity: 1;
            transform: translateY(0);
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-color-secondary);
            border-radius: 50%;
            animation: typingPulse 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingPulse {
            0%, 60%, 100% {
                transform: scale(1);
                opacity: 0.5;
            }
            30% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        /* Message Input Area */
        .message-input-container {
            padding: 15px 20px;
            background: var(--header-background);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-light);
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            background: var(--input-background);
            border: 1px solid var(--border-light);
            border-radius: 25px;
            padding: 0;
            transition: var(--transition);
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(0, 213, 255, 0.2);
        }

        .message-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-color-primary);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            padding: 12px 16px;
            resize: none;
            max-height: 120px;
            min-height: 44px;
            line-height: 1.4;
        }

        .message-input::placeholder {
            color: var(--text-color-secondary);
        }

        .input-actions {
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 8px;
        }

        .input-action-btn {
            background: none;
            border: none;
            color: var(--text-color-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-action-btn:hover {
            background: var(--border-light);
            color: var(--accent-color);
            transform: scale(1.1);
        }

        .send-button {
            background: var(--button-background);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: var(--transition);
            box-shadow: var(--button-shadow);
            opacity: 0.7;
            transform: scale(0.9);
        }

        .send-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 213, 255, 0.4), 0 6px 20px rgba(255, 46, 146, 0.4);
        }

        .send-button.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            padding: 40px 20px;
            opacity: 0.8;
        }

        .empty-state-icon {
            font-size: 64px;
            background: var(--button-background);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .empty-state-title {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--text-color-primary);
            margin-bottom: 8px;
        }

        .empty-state-description {
            color: var(--text-color-secondary);
            font-size: 16px;
            max-width: 300px;
            line-height: 1.5;
        }

        /* File Upload Modal */
        .file-upload-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .file-upload-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .file-upload-content {
            background: var(--card-background);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .file-upload-title {
            font-family: 'Poppins', sans-serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-color-primary);
            margin-bottom: 20px;
        }

        .file-upload-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .file-upload-option {
            padding: 20px;
            background: var(--input-background);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }

        .file-upload-option:hover {
            border-color: var(--accent-color);
            background: var(--border-light);
        }

        .file-upload-option i {
            font-size: 24px;
            color: var(--accent-color);
            margin-bottom: 8px;
            display: block;
        }

        .file-upload-option span {
            color: var(--text-color-primary);
            font-size: 14px;
            font-weight: 500;
        }

        /* Message Status Icons */
        .message-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-left: 8px;
            font-size: 12px;
        }

        .status-icon {
            color: var(--text-color-secondary);
        }

        .status-icon.delivered {
            color: var(--accent-color);
        }

        .status-icon.read {
            color: var(--status-online);
        }

        .status-icon.failed {
            color: var(--delete-button-color);
            cursor: pointer;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .chat-header {
                padding: 12px 16px;
            }

            .partner-details h3 {
                font-size: 14px;
            }

            .messages-container {
                padding: 15px;
            }

            .message-bubble {
                max-width: 85%;
                font-size: 13px;
            }

            .message-input-container {
                padding: 12px 16px;
            }

            .empty-state {
                padding: 20px;
            }

            .empty-state-title {
                font-size: 20px;
            }

            .empty-state-description {
                font-size: 14px;
            }
        }

        /* Friends Dropdown */
        .friends-dropdown-container {
            position: absolute;
            top: 15px;
            right: 140px;
            z-index: 101;
        }

        .friends-dropdown-trigger {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: var(--input-background);
            border: 1px solid var(--border-light);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-color-secondary);
            font-size: 16px;
            position: relative;
            overflow: hidden;
        }

        .friends-dropdown-trigger:hover {
            background: var(--border-light);
            border-color: var(--accent-color);
            color: var(--text-color-primary);
            transform: scale(1.05);
        }

        .friends-dropdown-trigger.active {
            background: var(--button-background);
            border-color: transparent;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(0, 213, 255, 0.4), 0 0 20px rgba(255, 46, 146, 0.4);

    <script>
        // Firebase Configuration
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyBsBinyrD9WZZXRaCvA4gxfX7BIimydDvo",
            authDomain: "jchat-1.firebaseapp.com",
            projectId: "jchat-1",
            storageBucket: "jchat-1.firebasestorage.app",
            appId: "1:328479683167:web:276c0b7e8ea44dd2d6a1ea",
            measurementId: "G-S6Z9GG0R9P"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        // Initialize Firebase (wait for imports to be available)
        let app, auth, db;
        
        window.addEventListener('load', async () => {
            if (window.firebaseImports) {
                const { initializeApp, getAuth, getFirestore } = window.firebaseImports;
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            }
        });

        // Global Variables
        let currentUser = null;
        let currentPartner = null;
        let messages = [];
        let isTyping = false;
        let typingTimeout = null;
        let lastSeenTimestamp = Date.now();
        let messageBox = null;
        
        // Friends system variables (from Find_Friends.html)
        let currentUsersFriends = new Set(); // Stores friend UIDs
        let friendsData = []; // Stores detailed friend information
        let filteredFriendsData = []; // Stores filtered friends for search
        let friendsDropdownOpen = false;

        // Initialize the chat application
        document.addEventListener('DOMContentLoaded', function() {
            messageBox = document.getElementById('messageBox');
            initializeChat();
            setupEventListeners();
            loadChatData();
        });

        /**
         * Custom Message Box Function (from Find_Friends.html)
         * @param {string} message - The message to display.
         * @param {string} type - The type of message ('success', 'error', 'info', 'loading', 'warning').
         * @param {boolean} [isPersistent=false] - If true, message stays until explicitly cleared or replaced.
         * @param {number} [durationMs=3000] - Duration in milliseconds for the message to display if not persistent.
         */
        function showMessageBox(message, type, isPersistent = false, durationMs = 3000) {
            if (messageBox.timeoutId) {
                clearTimeout(messageBox.timeoutId);
            }

            messageBox.innerHTML = `<i id="messageBoxIcon"></i><span id="messageBoxText"></span>`;
            const messageBoxIcon = document.getElementById('messageBoxIcon');
            const messageBoxText = document.getElementById('messageBoxText');

            messageBoxText.textContent = message;
            messageBox.className = 'show ' + type;

            // Set icon based on type
            if (type === 'success') {
                messageBoxIcon.classList.add('fas', 'fa-check-circle');
            } else if (type === 'error') {
                messageBoxIcon.classList.add('fas', 'fa-times-circle');
            } else if (type === 'info') {
                messageBoxIcon.classList.add('fas', 'fa-info-circle');
            } else if (type === 'warning') {
                messageBoxIcon.classList.add('fas', 'fa-exclamation-triangle');
            } else if (type === 'loading') {
                messageBoxIcon.classList.add('fas', 'fa-spinner', 'fa-spin');
            } else {
                messageBoxIcon.className = '';
            }

            messageBox.style.display = 'flex';
            messageBox.style.opacity = '1';

            if (!isPersistent) {
                messageBox.timeoutId = setTimeout(() => {
                    messageBox.style.opacity = '0';
                    messageBox.addEventListener('transitionend', function handler() {
                        messageBox.style.display = 'none';
                        messageBox.removeEventListener('transitionend', handler);
                    }, { once: true });
                }, durationMs);
            }
        }

        /**
         * Cloudinary Image URL Function (from Find_Friends.html)
         * @param {string} urlOrPublicId - The full Cloudinary URL or the public ID of the image on Cloudinary.
         * @param {string} transformations - Optional Cloudinary transformations.
         * @returns {string|null} The full Cloudinary URL or null if urlOrPublicId is not provided.
         */
        function getCloudinaryImageUrl(urlOrPublicId, transformations = "w_auto,f_auto,q_auto") {
            if (!urlOrPublicId) return null;
            if (urlOrPublicId.startsWith('http://') || urlOrPublicId.startsWith('https://')) {
                if (urlOrPublicId.includes('res.cloudinary.com')) {
                    const parts = urlOrPublicId.split('/upload/');
                    if (parts.length === 2) {
                        return `${parts[0]}/upload/${transformations}/${parts[1]}`;
                    }
                }
                return urlOrPublicId;
            }
            return `https://res.cloudinary.com/dcwcenq1y/image/upload/${transformations}/${urlOrPublicId}`;
        }

        /**
         * Display Profile Picture Function (from Find_Friends.html)
         * @param {HTMLElement} imgElement - The image element.
         * @param {HTMLElement} iconElement - The icon element.
         * @param {string} profilePicId - The profile picture ID or URL.
         * @param {string} usernameInitial - The username initial for fallback.
         * @param {string} transformations - Cloudinary transformations.
         */
        function displayProfilePicture(imgElement, iconElement, profilePicId, usernameInitial, transformations) {
            if (imgElement && iconElement) {
                if (profilePicId) {
                    const imageUrl = getCloudinaryImageUrl(profilePicId, transformations);
                    imgElement.src = imageUrl;
                    imgElement.style.display = 'block';
                    iconElement.style.display = 'none';
                    imgElement.onerror = () => {
                        console.error(`JCHAT_ERROR: Failed to load profile picture: ${profilePicId}. Using placeholder.`);
                        imgElement.src = `https://placehold.co/36x36/ff2e92/ffffff?text=${usernameInitial}`;
                        imgElement.style.display = 'block';
                        iconElement.style.display = 'none';
                    };
                } else {
                    imgElement.style.display = 'none';
                    iconElement.style.display = 'block';
                    imgElement.src = `https://placehold.co/36x36/ff2e92/ffffff?text=${usernameInitial}`;
                }
            }
        }

        // Initialize chat application
        function initializeChat() {
            // Hide loader after initialization
            setTimeout(() => {
                document.getElementById('pageLoader').classList.add('hidden');
            }, 1500);

            // Get URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const partnerId = urlParams.get('partnerId') || urlParams.get('partner');
            const messageId = urlParams.get('messageId');
            const prefillText = urlParams.get('prefill');

            if (partnerId) {
                loadPartnerInfo(partnerId);
                if (messageId) {
                    scrollToMessage(messageId);
                }
                if (prefillText) {
                    document.getElementById('messageInput').value = decodeURIComponent(prefillText);
                    updateSendButtonState();
                }
            } else {
                showError('No partner specified');
            }

            // Load current user info
            loadCurrentUser();
        }

        // Setup event listeners
        function setupEventListeners() {
            const messageInput = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');
            const backButton = document.getElementById('backButton');
            const attachFileBtn = document.getElementById('attachFileBtn');
            const fileInput = document.getElementById('fileInput');
            const friendsDropdownTrigger = document.getElementById('friendsDropdownTrigger');
            const friendsSearchInput = document.getElementById('friendsSearchInput');

            // Message input events
            messageInput.addEventListener('input', handleInputChange);
            messageInput.addEventListener('keydown', handleKeyDown);
            messageInput.addEventListener('focus', markAsRead);

            // Send button event
            sendButton.addEventListener('click', sendMessage);

            // Back button event
            backButton.addEventListener('click', () => {
                window.history.back();
            });

            // File attachment events
            attachFileBtn.addEventListener('click', openFileUploadModal);
            fileInput.addEventListener('change', handleFileSelection);

            // Call button events
            document.getElementById('videoCallBtn').addEventListener('click', startVideoCall);
            document.getElementById('voiceCallBtn').addEventListener('click', startVoiceCall);
            document.getElementById('chatInfoBtn').addEventListener('click', openChatInfo);

            // Header profile event
            document.getElementById('headerProfile').addEventListener('click', () => {
                window.location.href = '/Profile.html';
            });

            // Friends dropdown events
            friendsDropdownTrigger.addEventListener('click', toggleFriendsDropdown);
            friendsSearchInput.addEventListener('input', handleFriendsSearch);

            // Close dropdown when clicking outside
            document.addEventListener('click', (event) => {
                if (!event.target.closest('.friends-dropdown-container')) {
                    closeFriendsDropdown();
                }
            });

            // Auto-resize textarea
            autoResizeTextarea(messageInput);

            // Scroll to bottom on window resize
            window.addEventListener('resize', scrollToBottom);
        }

        // Toggle friends dropdown
        function toggleFriendsDropdown() {
            const trigger = document.getElementById('friendsDropdownTrigger');
            const menu = document.getElementById('friendsDropdownMenu');
            
            if (friendsDropdownOpen) {
                closeFriendsDropdown();
            } else {
                openFriendsDropdown();
            }
        }

        // Open friends dropdown
        function openFriendsDropdown() {
            const trigger = document.getElementById('friendsDropdownTrigger');
            const menu = document.getElementById('friendsDropdownMenu');
            
            console.log(`JCHAT_DEBUG: Opening friends dropdown. Current friends count: ${friendsData.length}`);
            
            friendsDropdownOpen = true;
            trigger.classList.add('active');
            menu.classList.add('show');
            
            // Load friends if not already loaded
            if (friendsData.length === 0) {
                console.log('JCHAT_DEBUG: No friends loaded, triggering loadFriends()');
                loadFriends();
            } else {
                console.log('JCHAT_DEBUG: Friends already loaded, rendering list');
                renderFriendsList();
            }
        }

        // Close friends dropdown
        function closeFriendsDropdown() {
            const trigger = document.getElementById('friendsDropdownTrigger');
            const menu = document.getElementById('friendsDropdownMenu');
            
            friendsDropdownOpen = false;
            trigger.classList.remove('active');
            menu.classList.remove('show');
        }

        // Handle friends search
        function handleFriendsSearch(event) {
            const searchTerm = event.target.value.toLowerCase();
            filteredFriendsData = friendsData.filter(friend => 
                friend.username.toLowerCase().includes(searchTerm) ||
                friend.displayName.toLowerCase().includes(searchTerm)
            );
            renderFriendsList();
        }

        // Load friends from Firebase (exact same logic as Find_Friends.html)
        async function loadFriends() {
            if (!currentUser || !db) {
                showFriendsError("Authentication required");
                return;
            }

            try {
                const { collection, onSnapshot, doc, getDoc } = window.firebaseImports;
                
                // Use the exact same path as Find_Friends.html
                const publicFriendsRef = collection(db, "artifacts", appId, "public", "data", "friends");

                // Clear existing friends
                currentUsersFriends.clear();
                friendsData = [];

                // Set up real-time listener for friends (same logic as Find_Friends.html)
                onSnapshot(publicFriendsRef, async (snapshot) => {

        // Send message
        async function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const messageText = messageInput.value.trim();

            if (!messageText || !currentUser || !currentPartner) return;

            const tempId = generateMessageId();
            const message = {
                id: tempId,
                text: messageText,
                sender: 'current',
                timestamp: Date.now(),
                status: 'sending'
            };

            // Add message to UI immediately
            addMessageToUI(message);
            
            // Clear input
            messageInput.value = '';
            updateSendButtonState();
            autoResizeTextarea(messageInput);

            // Hide empty state
            hideEmptyState();
            
            // Scroll to bottom
            scrollToBottom();

            // Stop typing indicator
            if (isTyping) {
                isTyping = false;
                sendTypingStatus(false);
            }

            // Send to Firebase
            try {
                const { collection, addDoc, serverTimestamp } = window.firebaseImports;
                
                // Create chat ID (consistent ordering)
                const chatId = [currentUser.uid, currentPartner.id].sort().join('_');
                
                // Add message to Firebase
                const messagesRef = collection(db, "artifacts", appId, "chats", chatId, "messages");
                const messageData = {
                    text: messageText,
                    senderId: currentUser.uid,
                    receiverId: currentPartner.id,
                    timestamp: serverTimestamp(),
                    status: 'sent',
                    chatId: chatId
                };

                await addDoc(messagesRef, messageData);
                
                // Update status to delivered
                updateMessageStatus(tempId, 'delivered');
                
                // Simulate read receipt after delay
                setTimeout(() => {
                    updateMessageStatus(tempId, 'read');
                }, 3000);

            } catch (error) {
                console.error("JCHAT_ERROR: Error sending message:", error);
                updateMessageStatus(tempId, 'failed');
                showMessageBox('Failed to send message. Please try again.', 'error');
            }
        }

        // Create message element

            const messageDiv = document.createElement('div');

            messageDiv.dataset.messageId = message.id;

            const bubble = document.createElement('div');

            bubble.innerHTML = `

                <div class="message-time">

        // Get status icon
        function getStatusIcon(status) {
            const icons = {
                sending: '<i class="fas fa-clock status-icon"></i>',
                sent: '<i class="fas fa-check status-icon"></i>',
                delivered: '<i class="fas fa-check status-icon delivered"></i>',
                read: '<i class="fas fa-check-double status-icon read"></i>',

            return `<span class="message-status">${icons[status] || ''}</span>`;

            const messageElement = document.querySelector(`[data-message-id="${messageId}"]`);
            if (messageElement) {
                const timeElement = messageElement.querySelector('.message-time');
                if (timeElement) {
                    const timestamp = timeElement.textContent.split(' ')[0];
                    timeElement.innerHTML = `${timestamp} ${getStatusIcon(status)}`;
                }
            }

            // Update in messages array
            const message = messages.find(m => m.id === messageId);
            if (message) {
                message.status = status;
            }
        }

        // Format last seen time
        function formatLastSeen(timestamp) {
            const now = Date.now();
            const diff = now - timestamp;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return 'Just now';
            if (minutes < 60) return `${minutes}m ago`;
            if (hours < 24) return `${hours}h ago`;
            return `${days}d ago`;
        }

        // Load chat data
        async function loadChatData() {
            if (!currentUser || !currentPartner || !db) {
                return;
            }

            try {
                const { collection, query, orderBy, onSnapshot, where } = window.firebaseImports;
                
                // Create chat ID (consistent ordering)
                const chatId = [currentUser.uid, currentPartner.id].sort().join('_');
                
                // Listen for messages in real-time
                const messagesRef = collection(db, "artifacts", appId, "chats", chatId, "messages");
                const messagesQuery = query(messagesRef, orderBy("timestamp", "asc"));
                
                onSnapshot(messagesQuery, (snapshot) => {
                    // Clear existing messages
                    messages = [];
                    const messagesContainer = document.getElementById('messagesContainer');
                    const existingMessages = messagesContainer.querySelectorAll('.message');
                    existingMessages.forEach(msg => msg.remove());
                    
                    // Add messages from Firebase
                    snapshot.forEach((doc) => {
                        const messageData = doc.data();
                        const message = {
                            id: doc.id,
                            text: messageData.text,
                            sender: messageData.senderId === currentUser.uid ? 'current' : 'partner',
                            timestamp: messageData.timestamp?.toMillis() || Date.now(),
                            status: messageData.status || 'delivered'
                        };
                        addMessageToUI(message);
                    });
                    
                    // Show empty state if no messages
                    if (messages.length === 0) {
                        showEmptyState();
                    } else {
                        hideEmptyState();
                    }
                }, (error) => {
                    console.error("JCHAT_ERROR: Error loading messages:", error);
                    showError('Failed to load messages');

                showError('Failed to setup message listener');

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

                        break;
                    case 'document':
                        fileInput.accept = '.pdf,.doc,.docx,.txt,.xls,.xlsx,.ppt,.pptx';
                        break;
                    default:
                        fileInput.accept = '*/*';
                }
                
                fileInput.click();
                closeFileUploadModal();
            }
        });

        // Close file upload modal when clicking outside
        document.getElementById('fileUploadModal').addEventListener('click', function(event) {
            if (event.target === this) {
                closeFileUploadModal();
            }
        });



        // Handle page visibility for read receipts
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                markAsRead();
            }
        });

        // Auto-focus message input when page loads
        window.addEventListener('load', function() {
            setTimeout(() => {
                document.getElementById('messageInput').focus();
            }, 2000);
        });
    </script>
</body>
</html>
