<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Last updated: 2025-08-25T00:00:00Z -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCHAT - Private Chat</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore-compat.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; }
        :root {
            --pink: #ff2e92;
            --blue: #00d5ff;
            --radius: 20px;
            --transition: .3s ease;

            --white: #fff;
            --text-light: rgba(255, 255, 255, .7);
            --background-main: rgba(10, 10, 10, .75);
            --background-gradient-1: #00d5ff;
            --background-gradient-2: #ff2e92;
            --card-background: linear-gradient(145deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, .01));
            --header-background: linear-gradient(135deg, rgba(10, 10, 10, .85), rgba(10, 10, 10, .75));
            --border-light: rgba(255, 255, 255, .05);
            --input-background: rgba(255, 255, 255, 0.05);
            --button-background: linear-gradient(90deg, var(--blue), var(--pink));
            --button-shadow: 0 4px 15px var(--blue), 0 4px 15px var(--pink);

            --background-color-primary: #1a1a2e;
            --background-color-secondary: #0f0f1f;
            --header-background-color: #2a2a4a;
            --footer-background-color: #2a2a4a;
            --content-background-color: #20203a;
            --card-background-color: #2a2a4a;
            --text-color-primary: #e0e0e0;
            --text-color-secondary: #b0b0d0;
            --accent-color: #00d5ff;
            --accent-color-dark: #00aaff;
            --border-color: #3a3a5a;

            --message-received-bg: rgba(255, 255, 255, 0.1);
            --message-sent-bg: #4A90E2;
        }
        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
            color: var(--white);
            background: radial-gradient(1200px 800px at -10% -10%, var(--background-gradient-1), transparent 40%),
                        radial-gradient(1200px 800px at 110% 110%, var(--background-gradient-2), transparent 40%),
                        var(--background-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: var(--header-background);
            border-bottom: 1px solid var(--border-light);
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header .back-btn {
            color: var(--white);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 10px;
            background: transparent;
            border: 1px solid var(--border-light);
            transition: var(--transition);
        }
        header .back-btn:hover { background: rgba(255,255,255,0.06); }
        header .peer {
            display: flex; align-items: center; gap: 12px;
        }
        header .peer img {
            width: 36px; height: 36px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.15);
        }
        header .peer .name { font-weight: 600; }
        header .peer .status { font-size: 12px; color: var(--text-light); }

        .chat-layout {
            flex: 1;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 18px;
            padding: 18px;
        }
        .sidebar {
            background: var(--card-background);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar .search {
            display: flex; gap: 8px; margin-bottom: 12px;
        }
        .sidebar .search input {
            flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border-color);
            background: var(--input-background); color: var(--white);
        }
        .sidebar .search button {
            padding: 10px 12px; border-radius: 10px; border: 0; color: #fff;
            background: var(--button-background);
            box-shadow: var(--button-shadow);
            cursor: pointer;
        }
        .conversation-list { overflow: auto; display: flex; flex-direction: column; gap: 8px; }
        .conversation-item {
            display: grid; grid-template-columns: 44px 1fr auto; gap: 10px; align-items: center;
            padding: 10px; border-radius: 12px; border: 1px solid var(--border-light);
            background: rgba(255,255,255,0.02);
            cursor: pointer; transition: var(--transition);
        }
        .conversation-item:hover { background: rgba(255,255,255,0.05); }
        .conversation-item img { width: 44px; height: 44px; border-radius: 50%; }
        .conversation-item .meta { display: flex; flex-direction: column; gap: 2px; }
        .conversation-item .meta .username { font-weight: 600; }
        .conversation-item .meta .last { color: var(--text-light); font-size: 12px; }
        .conversation-item .time { color: var(--text-light); font-size: 12px; }
        .conversation-item.active { outline: 2px solid var(--accent-color); }

        .chat-card {
            background: var(--card-background);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            display: grid; grid-template-rows: auto 1fr auto;
            overflow: hidden;
        }
        .chat-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; border-bottom: 1px solid var(--border-light);
        }
        .chat-header .title { display: flex; align-items: center; gap: 10px; }
        .chat-header .title img { width: 36px; height: 36px; border-radius: 50%; }
        .chat-header .actions { display: flex; gap: 8px; }
        .chat-header .actions button {
            padding: 8px 10px; border-radius: 10px; border: 1px solid var(--border-light); background: transparent; color: var(--white);
            cursor: pointer; transition: var(--transition);
        }
        .chat-header .actions button:hover { background: rgba(255,255,255,0.06); }

        .messages {
            padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
            background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.00));
        }
        .msg-row { display: flex; gap: 10px; align-items: flex-end; }
        .msg-row.sent { justify-content: flex-end; }
        .msg-bubble {
            max-width: 70%; padding: 10px 12px; border-radius: 14px; border: 1px solid var(--border-light);
            background: var(--message-received-bg); color: var(--white);
        }
        .msg-row.sent .msg-bubble { background: var(--message-sent-bg); border-color: transparent; }
        .msg-bubble .meta { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; font-size: 12px; color: var(--text-light); }
        .msg-bubble .text { white-space: pre-wrap; word-wrap: break-word; }

        .composer { display: grid; grid-template-columns: auto auto 1fr auto; gap: 8px; padding: 10px; border-top: 1px solid var(--border-light); }
        .composer button, .composer input[type="file"]::file-selector-button {
            padding: 10px 12px; border-radius: 10px; border: 0; color: #fff; background: var(--button-background); box-shadow: var(--button-shadow); cursor: pointer;
        }
        .composer input[type="text"] {
            padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--input-background); color: var(--white);
        }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

        .chat-card { position: relative; box-shadow: 0 12px 40px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.03); }
        .msg-bubble { backdrop-filter: saturate(140%) blur(4px); box-shadow: 0 4px 16px rgba(0,0,0,.25); }

        .typing-indicator { display: flex; align-items: center; gap: 6px; padding: 8px 16px; color: var(--text-light); }
        .typing-indicator[hidden] { display: none; }
        .typing-indicator .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-light); opacity: .6; animation: bounce 1.2s infinite; }
        .typing-indicator .dot:nth-child(2) { animation-delay: .15s; }
        .typing-indicator .dot:nth-child(3) { animation-delay: .3s; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-4px); } }

        .emoji-panel { position: absolute; bottom: 66px; left: 70px; background: var(--card-background); border: 1px solid var(--border-light); border-radius: 12px; padding: 8px; box-shadow: 0 10px 30px rgba(0,0,0,.4); display: grid; grid-template-columns: repeat(8, 28px); gap: 6px; z-index: 5; }
        .emoji-panel[hidden] { display: none; }
        .emoji-panel button { background: transparent; border: 0; font-size: 18px; cursor: pointer; padding: 4px; }

        .scroll-bottom { position: absolute; right: 16px; bottom: 76px; width: 40px; height: 40px; border-radius: 50%; display: grid; place-items: center; border: 0; color: #fff; background: var(--button-background); box-shadow: var(--button-shadow); cursor: pointer; opacity: 0; pointer-events: none; transition: opacity var(--transition), transform var(--transition); }
        .scroll-bottom.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .scroll-bottom:not(.show) { transform: translateY(8px); }

        @media (max-width: 1024px) {
            .chat-layout { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body class="theme-dark-mode">
<header>
    <a href="Home.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    <div class="peer">
        <img src="assets/icon1.png" alt="Peer">
        <div>
            <div class="name" id="peerName">Jane Doe</div>
            <div class="status" id="peerStatus">Online</div>
        </div>
    </div>
</header>

<main class="chat-layout">
    <aside class="sidebar">
        <div class="search">
            <input id="searchInput" placeholder="Search conversations" autocomplete="off" />
            <button id="newChatBtn"><i class="fas fa-plus"></i></button>
        </div>
        <div id="conversationList" class="conversation-list"></div>
    </aside>

    <section class="chat-card" aria-live="polite">
        <div class="chat-header">
            <div class="title">
                <img id="chatPeerAvatar" src="assets/icon2.png" alt="Avatar">
                <div>
                    <div id="chatPeerName">Jane Doe</div>
                    <small class="text-light" id="chatPeerPresence">Typing…</small>
                </div>
            </div>
            <div class="actions">
                <button id="callBtn" title="Start call"><i class="fas fa-phone"></i></button>
                <button id="videoBtn" title="Start video"><i class="fas fa-video"></i></button>
                <button id="moreBtn" title="More"><i class="fas fa-ellipsis-h"></i></button>
            </div>
        </div>

        <div id="messages" class="messages"></div>

        <form id="composer" class="composer" autocomplete="off">
            <button id="attachBtn" type="button" title="Attach file"><i class="fas fa-paperclip"></i></button>
            <button id="emojiBtn" type="button" title="Emoji"><i class="fas fa-face-smile"></i></button>
            <input id="textInput" type="text" placeholder="Type a message" aria-label="Message" />
            <input id="fileInput" type="file" class="sr-only" />
            <button id="sendBtn" type="submit" title="Send"><i class="fas fa-paper-plane"></i></button>
        </form>
        <div id="typingIndicator" class="typing-indicator" hidden>
            <span>Typing</span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
        <button id="scrollBottom" class="scroll-bottom" aria-label="Scroll to latest"><i class="fas fa-arrow-down"></i></button>
        <div id="emojiPanel" class="emoji-panel" hidden aria-label="Emoji picker" role="dialog" aria-modal="false"></div>
    </section>
</main>

<script>
(function() {
    "use strict";

    const messagesEl = document.getElementById('messages');
    const composerEl = document.getElementById('composer');
    const textInputEl = document.getElementById('textInput');
    const fileInputEl = document.getElementById('fileInput');
    const conversationListEl = document.getElementById('conversationList');
    const typingEl = document.getElementById('typingIndicator');
    const emojiBtn = document.getElementById('emojiBtn');
    const emojiPanel = document.getElementById('emojiPanel');
    const scrollBtn = document.getElementById('scrollBottom');

    const soundSend = new Tone.Synth().toDestination();
    const soundReceive = new Tone.MembraneSynth().toDestination();

    let typingTimeoutId = null;

    // Firebase init
    if (!window.firebaseApp) {
        window.firebaseApp = firebase.initializeApp(window.firebaseConfig || {});
    }
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Resolve peer/user from URL or default
    const urlParams = new URLSearchParams(location.search);
    const peer = {
        id: urlParams.get('peerId') || (window.defaultPeer && window.defaultPeer.id) || 'demo-peer',
        name: urlParams.get('peerName') || (window.defaultPeer && window.defaultPeer.name) || 'Contact',
        avatar: urlParams.get('peerAvatar') || (window.defaultPeer && window.defaultPeer.avatar) || 'assets/icon2.png'
    };
    document.getElementById('chatPeerName').textContent = peer.name;
    document.getElementById('chatPeerAvatar').src = peer.avatar;

    // Sign in (anonymous if not already)
    let currentUser = null;
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            startChat();
        } else {
            await auth.signInAnonymously();
        }
    });

    // Create deterministic room id between two users (anonymous uid + peer id)
    function getRoomId(uid, peerId) {
        const a = String(uid);
        const b = String(peerId);
        return [a, b].sort().join('__');
    }

    function messageDoc(roomId) {
        return db.collection('rooms').doc(roomId).collection('messages');
    }

    function startChat() {
        const roomId = getRoomId(currentUser.uid, peer.id);
        subscribeMessages(roomId);
        setupComposer(roomId);
        document.getElementById('peerName').textContent = peer.name;
    }

    function subscribeMessages(roomId) {
        messagesEl.innerHTML = '';
        messageDoc(roomId)
            .orderBy('createdAt', 'asc')
            .limit(200)
            .onSnapshot((snap) => {
                messagesEl.innerHTML = '';
                snap.forEach((doc) => renderMessage(doc.data()));
                messagesEl.scrollTop = messagesEl.scrollHeight;
                updateScrollButtonVisibility();
            });
    }

    function renderMessage(data) {
        const isMe = data.senderId === (currentUser && currentUser.uid);
        const row = document.createElement('div');
        row.className = 'msg-row' + (isMe ? ' sent' : '');
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        const text = document.createElement('div');
        text.className = 'text';
        if (data.type === 'image' && data.url) {
            const img = document.createElement('img');
            img.src = data.url;
            img.alt = data.name || 'image';
            img.style.maxWidth = '280px';
            img.style.borderRadius = '12px';
            text.appendChild(img);
        } else {
            text.textContent = data.text || '';
        }
        bubble.appendChild(text);
        row.appendChild(bubble);
        messagesEl.appendChild(row);
    }

    function setupComposer(roomId) {
        composerEl.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = textInputEl.value.trim();
            if (!text) return;
            textInputEl.value = '';
            await sendMessage(roomId, { type: 'text', text });
            try { await Tone.start(); soundSend.triggerAttackRelease('C6', '8n'); } catch (_) {}
        });

        document.getElementById('attachBtn').addEventListener('click', () => fileInputEl.click());
        fileInputEl.addEventListener('change', async () => {
            const file = fileInputEl.files && fileInputEl.files[0];
            if (!file) return;
            await uploadWithCloudinary(roomId, file);
            fileInputEl.value = '';
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            // In a real app, query Firestore for recent conversations. Hidden for simplicity here.
        });

        textInputEl.addEventListener('input', showTyping);
    }

    async function sendMessage(roomId, payload) {
        const doc = {
            senderId: currentUser.uid,
            senderAvatar: '',
            ...payload,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        await messageDoc(roomId).add(doc);
    }

    async function uploadWithCloudinary(roomId, file) {
        const cloud = window.cloudinaryConfig || {};
        if (!cloud.cloudName || !cloud.unsignedUploadPreset) {
            alert('Cloudinary config missing');
            return;
        }
        return new Promise((resolve, reject) => {
            const widget = cloudinary.createUploadWidget({
                cloudName: cloud.cloudName,
                uploadPreset: cloud.unsignedUploadPreset,
                multiple: false,
                sources: ['local','url','camera']
            }, async (error, result) => {
                if (error) return reject(error);
                if (result && result.event === 'success') {
                    const info = result.info;
                    await sendMessage(roomId, { type: 'image', url: info.secure_url, name: info.original_filename });
                    try { await Tone.start(); soundSend.triggerAttackRelease('E5', '8n'); } catch(_) {}
                    resolve(info);
                }
            });
            widget.open();
        });
    }

    function populateEmojiPanel() {
        const emojis = ['😀','😁','😂','🤣','😊','😍','😘','😎','🤔','🙄','😴','🤯','👍','👎','👏','🙏','🔥','💯','✨','🎉','❤️','💙','💚','💛','💜','🧡','🤍','🤝','👋','🙌','🤌','👌','✌️','🤞','🤟','👉','👈','☕','🍕','🍔','🍟'];
        emojiPanel.innerHTML = '';
        for (const e of emojis) {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.textContent = e;
            btn.addEventListener('click', () => {
                textInputEl.value += e;
                textInputEl.focus();
            });
            emojiPanel.appendChild(btn);
        }
    }

    function showTyping() {
        typingEl.hidden = false;
        clearTimeout(typingTimeoutId);
        typingTimeoutId = setTimeout(() => { typingEl.hidden = true; }, 1200);
    }

    function updateScrollButtonVisibility() {
        const nearBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 60;
        scrollBtn.classList.toggle('show', !nearBottom);
    }

    messagesEl.addEventListener('scroll', updateScrollButtonVisibility);
    scrollBtn.addEventListener('click', () => {
        messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
    });

    emojiBtn.addEventListener('click', () => {
        if (emojiPanel.hasAttribute('hidden')) {
            populateEmojiPanel();
            emojiPanel.removeAttribute('hidden');
        } else {
            emojiPanel.setAttribute('hidden', '');
        }
    });
    document.addEventListener('click', (e) => {
        if (!emojiPanel.contains(e.target) && e.target !== emojiBtn) {
            emojiPanel.setAttribute('hidden', '');
        }
    });

})();
</script>
</body>
</html>
