<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCHAT - Chat</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* JCHAT Theme Colors */
            --jchat-primary: #4a4ae8;
            --jchat-primary-dark: #3a3ad8;
            --jchat-secondary: #6c63ff;
            --jchat-accent: #ff6b6b;
            
            /* Instagram-Style Colors */
            --ig-bg: #ffffff;
            --ig-bg-dark: #121212;
            --ig-sent-bubble: #4a4ae8;
            --ig-received-bubble: #f1f1f1;
            --ig-received-bubble-dark: #2a2a2a;
            --ig-text-primary: #262626;
            --ig-text-secondary: #8e8e93;
            --ig-text-light: #ffffff;
            --ig-border: #dbdbdb;
            --ig-border-dark: #383838;
            --ig-shadow: rgba(0, 0, 0, 0.1);
            
            /* Dimensions */
            --header-height: 60px;
            --composer-height: 55px;
            --chat-max-width: 600px;
            --profile-size: 40px;
            --icon-size: 24px;
            --bubble-max-width: 70%;
            --message-padding: 12px;
            --message-border-radius: 18px;
            --message-gap: 8px;
            --input-min-height: 36px;
            --input-border-radius: 18px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--ig-bg);
            color: var(--ig-text-primary);
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        body.dark-mode {
            background: var(--ig-bg-dark);
            color: var(--ig-text-light);
        }

        /* Main Chat Container */
        .chat-container {
            max-width: var(--chat-max-width);
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--ig-bg);
            transition: background-color 0.3s ease;
        }

        body.dark-mode .chat-container {
            background: var(--ig-bg-dark);
        }

        /* Header - Top Bar */
        .chat-header {
            height: var(--header-height);
            background: var(--jchat-primary);
            display: flex;
            align-items: center;
            padding: 0 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px var(--ig-shadow);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .profile-picture {
            width: var(--profile-size);
            height: var(--profile-size);
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .profile-picture:hover {
            transform: scale(1.05);
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-size: 16px;
            font-weight: 600;
            color: var(--ig-text-light);
            line-height: 1.2;
        }

        .status-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.2;
        }

        .typing-indicator {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            font-style: italic;
            display: none;
        }

        .typing-indicator.show {
            display: block;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-icon {
            width: var(--icon-size);
            height: var(--icon-size);
            color: var(--ig-text-light);
            cursor: pointer;
            transition: opacity 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-icon:hover {
            opacity: 0.8;
        }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: var(--ig-bg);
            transition: background-color 0.3s ease;
        }

        body.dark-mode .messages-area {
            background: var(--ig-bg-dark);
        }

        .message {
            display: flex;
            margin-bottom: var(--message-gap);
            max-width: 100%;
            animation: messageSlideIn 0.3s ease-out;
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: var(--bubble-max-width);
            padding: var(--message-padding);
            border-radius: var(--message-border-radius);
            word-wrap: break-word;
            position: relative;
            transition: all 0.2s ease;
        }

        .message.sent .message-bubble {
            background: var(--ig-sent-bubble);
            color: var(--ig-text-light);
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: var(--ig-received-bubble);
            color: var(--ig-text-primary);
            border-bottom-left-radius: 4px;
        }

        body.dark-mode .message.received .message-bubble {
            background: var(--ig-received-bubble-dark);
            color: var(--ig-text-light);
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
            margin-bottom: 4px;
        }

        .message-time {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            text-align: right;
            float: right;
            margin-left: 8px;
        }

        .message.received .message-time {
            color: var(--ig-text-secondary);
        }

        .message-status {
            display: inline-block;
            margin-left: 4px;
            font-size: 11px;
        }

        .status-sent { color: rgba(255, 255, 255, 0.7); }
        .status-delivered { color: #53bdeb; }
        .status-seen { color: #53bdeb; }

        /* Message Reactions */
        .message-reaction {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--ig-accent);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            animation: reactionPop 0.3s ease-out;
        }

        @keyframes reactionPop {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Reply Preview */
        .reply-preview {
            background: rgba(0, 0, 0, 0.05);
            border-left: 3px solid var(--jchat-primary);
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 13px;
            color: var(--ig-text-secondary);
            display: none;
        }

        body.dark-mode .reply-preview {
            background: rgba(255, 255, 255, 0.05);
        }

        .reply-preview.show {
            display: block;
        }

        /* Composer - Bottom Input Bar */
        .composer {
            height: var(--composer-height);
            background: var(--ig-bg);
            border-top: 1px solid var(--ig-border);
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            bottom: 0;
            transition: background-color 0.3s ease;
        }

        body.dark-mode .composer {
            background: var(--ig-bg-dark);
            border-top-color: var(--ig-border-dark);
        }

        .composer-icon {
            width: var(--icon-size);
            height: var(--icon-size);
            color: var(--ig-text-secondary);
            cursor: pointer;
            transition: color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .composer-icon:hover {
            color: var(--jchat-primary);
        }

        .composer-icon.like {
            width: 20px;
            height: 20px;
            color: var(--ig-accent);
        }

        .input-field {
            flex: 1;
            min-height: var(--input-min-height);
            max-height: 120px;
            border: none;
            border-radius: var(--input-border-radius);
            padding: 8px 16px;
            font-size: 14px;
            font-family: inherit;
            background: var(--ig-received-bubble);
            color: var(--ig-text-primary);
            resize: none;
            outline: none;
            transition: all 0.2s ease;
        }

        body.dark-mode .input-field {
            background: var(--ig-received-bubble-dark);
            color: var(--ig-text-light);
        }

        .input-field:focus {
            background: var(--ig-bg);
            box-shadow: 0 0 0 2px var(--jchat-primary);
        }

        body.dark-mode .input-field:focus {
            background: var(--ig-bg-dark);
        }

        /* Long Press Menu */
        .message-menu {
            position: fixed;
            background: var(--ig-bg);
            border: 1px solid var(--ig-border);
            border-radius: 12px;
            padding: 8px 0;
            box-shadow: 0 4px 20px var(--ig-shadow);
            z-index: 1000;
            display: none;
            animation: menuSlideUp 0.2s ease-out;
        }

        body.dark-mode .message-menu {
            background: var(--ig-bg-dark);
            border-color: var(--ig-border-dark);
        }

        @keyframes menuSlideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .menu-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--ig-text-primary);
        }

        body.dark-mode .menu-item {
            color: var(--ig-text-light);
        }

        .menu-item:hover {
            background: var(--ig-received-bubble);
        }

        body.dark-mode .menu-item:hover {
            background: var(--ig-received-bubble-dark);
        }

        .menu-item i {
            width: 16px;
            color: var(--ig-text-secondary);
        }



        /* Responsive Design */
        @media (max-width: 768px) {
            .chat-container {
                max-width: 100%;
            }
            
            .messages-area {
                padding: 12px;
            }
            
            .composer {
                padding: 0 12px;
            }
            
            .header-right {
                gap: 16px;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--ig-border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--ig-text-secondary);
        }

        /* Vanish Mode */
        .vanish-mode {
            background: var(--ig-bg-dark) !important;
            color: var(--ig-text-light) !important;
        }

        .vanish-mode .chat-container {
            background: var(--ig-bg-dark) !important;
        }

        .vanish-mode .messages-area {
            background: var(--ig-bg-dark) !important;
        }

        .vanish-mode .composer {
            background: var(--ig-bg-dark) !important;
            border-top-color: var(--ig-border-dark) !important;
        }

        /* Loading States */
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: var(--ig-text-secondary);
            padding: 40px;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 8px;
            color: var(--ig-text-primary);
        }

        body.dark-mode .empty-state h3 {
            color: var(--ig-text-light);
        }

        .empty-state p {
            font-size: 14px;
            line-height: 1.5;
        }

        /* Loading Spinner */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>


    <!-- Main Chat Container -->
    <div class="chat-container">
        <!-- Header - Top Bar -->
        <div class="chat-header">
            <div class="header-left">
                <div class="profile-picture" id="profilePicture">
                    <i class="fas fa-user" style="font-size: 20px; color: white; display: flex; align-items: center; justify-content: center; height: 100%;"></i>
                </div>

                    <div class="username" id="username">Select a Chat</div>

                </div>
                <div class="header-icon" id="infoBtn" title="Info">
                    <i class="fas fa-info-circle"></i>
                </div>
            </div>
        </div>

        <!-- Messages Area -->
        <div class="messages-area" id="messagesArea">
            <div class="empty-state">
                <i class="fas fa-comments"></i>
                <h3>Welcome to JCHAT</h3>
                <p>Select a conversation from your chat list to start messaging</p>
            </div>
        </div>

        <!-- Composer - Bottom Input Bar -->
        <div class="composer">
            <div class="composer-icon" id="cameraBtn" title="Camera">
                <i class="fas fa-camera"></i>
            </div>
            <div class="composer-icon" id="galleryBtn" title="Gallery">
                <i class="fas fa-image"></i>
            </div>
            <textarea 
                class="input-field" 
                id="messageInput" 
                placeholder="Type a message..."
                rows="1"
                disabled
            ></textarea>
            <div class="composer-icon" id="microphoneBtn" title="Voice Message">
                <i class="fas fa-microphone"></i>
            </div>
            <div class="composer-icon like" id="likeBtn" title="Send Heart">
                <i class="fas fa-heart"></i>
            </div>
        </div>
    </div>

    <!-- Long Press Menu -->
    <div class="message-menu" id="messageMenu">
        <div class="menu-item" id="copyBtn">
            <i class="fas fa-copy"></i>
            Copy
        </div>
        <div class="menu-item" id="replyBtn">
            <i class="fas fa-reply"></i>
            Reply
        </div>
        <div class="menu-item" id="forwardBtn">
            <i class="fas fa-share"></i>
            Forward
        </div>
        <div class="menu-item" id="reactBtn">
            <i class="fas fa-heart"></i>
            React
        </div>
        <div class="menu-item" id="deleteBtn">
            <i class="fas fa-trash"></i>
            Delete
        </div>
    </div>

    <script type="module">
        // Firebase Imports
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, setDoc, collection, query, where, getDocs, onSnapshot, addDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/11.8.0/firebase-auth.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBsBinyrD9WZZXRaCvA4gxfX7BIimydDvo",
            authDomain: "jchat-1.firebaseapp.com",
            projectId: "jchat-1",
            storageBucket: "jchat-1.firebasestorage.app",
            appId: "1:328479683167:web:276c0b7e8ea44dd2d6a1ea",
            measurementId: "G-S6Z9GG0R9P"
        };

        // Cloudinary Configuration
        const cloudinaryConfig = {
            cloudName: "cloudinary",
            uploadPreset: "ml_default"
        };

        const appId = "default-app-id";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Chat State
        let currentUser = null;
        let currentUserProfileData = null;
        let currentChatId = null;
        let unsubscribeMessages = null;
        let chatListData = [];

        // DOM Elements
        const messageInput = document.getElementById('messageInput');
        const messagesArea = document.getElementById('messagesArea');
        const username = document.getElementById('username');
        const statusText = document.getElementById('statusText');
        const profilePicture = document.getElementById('profilePicture');
        const typingIndicator = document.getElementById('typingIndicator');
        const messageMenu = document.getElementById('messageMenu');

        // State
        let isVanishMode = false;
        let selectedMessage = null;
        let isReplying = false;
        let currentChat = null;

        // Initialize Firebase
        function initializeFirebase() {
            console.log('JCHAT_DEBUG: Initializing Firebase with config:', firebaseConfig);
            console.log('JCHAT_DEBUG: Cloudinary config:', cloudinaryConfig);
        }

        // Initialize Chat
        function initializeChat() {
            console.log('JCHAT_DEBUG: Initializing Instagram-style chat');
            initializeFirebase();
            setupEventListeners();
        }

        // Setup Event Listeners
        function setupEventListeners() {
            // Message Input Functionality
            if (messageInput) {
                messageInput.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
                });

                messageInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });
            }

            // Like Button
            if (document.getElementById('likeBtn')) {
                document.getElementById('likeBtn').addEventListener('click', () => {
                    if (!currentChat) return;
                    sendHeartMessage();
                });
            }

            // Camera Button
            if (document.getElementById('cameraBtn')) {
                document.getElementById('cameraBtn').addEventListener('click', () => {
                    if (!currentChat) return;
                    openCamera();
                });
            }

            // Gallery Button
            if (document.getElementById('galleryBtn')) {
                document.getElementById('galleryBtn').addEventListener('click', () => {
                    if (!currentChat) return;
                    openGallery();
                });
            }

            // Microphone Button
            if (document.getElementById('microphoneBtn')) {
                document.getElementById('microphoneBtn').addEventListener('click', () => {
                    if (!currentChat) return;
                    startVoiceRecording();
                });
            }

            // Call Button
            if (document.getElementById('callBtn')) {
                document.getElementById('callBtn').addEventListener('click', () => {
                    if (!currentChat) return;
                    initiateCall();
                });
            }

            // Video Button
            if (document.getElementById('videoBtn')) {
                document.getElementById('videoBtn').addEventListener('click', () => {
                    if (!currentChat) return;
                    initiateVideoCall();
                });
            }

            // Info Button
            if (document.getElementById('infoBtn')) {
                document.getElementById('infoBtn').addEventListener('click', () => {
                    if (!currentChat) return;
                    showChatInfo();
                });
            }

            // Message Long Press Menu
            setupMessageMenu();
        }

        // Send Message
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentChat) return;

            try {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message sent';
                messageDiv.innerHTML = `
                    <div class="message-bubble">
                        <div class="message-text">${text}</div>
                        <div class="message-time">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
                        <div class="message-status">
                            <i class="fas fa-check status-sent"></i>
                        </div>
                    </div>
                `;

                messagesArea.appendChild(messageDiv);
                messagesArea.scrollTop = messagesArea.scrollHeight;

                // Clear input
                messageInput.value = '';
                messageInput.style.height = 'auto';

                // Save to Firebase
                if (currentChatId) {
                    await saveMessageToFirebase(text, 'text');
                }

                // Simulate message delivery
                setTimeout(() => {
                    const statusIcon = messageDiv.querySelector('.status-sent i');
                    statusIcon.className = 'fas fa-check-double status-delivered';
                }, 1000);

                // Simulate message seen
                setTimeout(() => {
                    const statusIcon = messageDiv.querySelector('.status-delivered i');
                    statusIcon.className = 'fas fa-check-double status-seen';
                }, 2000);

                // Clear reply if active
                if (isReplying) {
                    clearReply();
                }
            } catch (error) {
                console.error('JCHAT_ERROR: Error sending message:', error);
            }
        }

        // Send Heart Message
        function sendHeartMessage() {
            const heartDiv = document.createElement('div');
            heartDiv.className = 'message sent';
            heartDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="message-text">❤️</div>
                    <div class="message-time">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
                    <div class="message-status">
                        <i class="fas fa-check status-sent"></i>
                    </div>
                </div>
            `;
            messagesArea.appendChild(heartDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;

            // Save to Firebase
            if (currentChatId) {
                saveMessageToFirebase('❤️', 'heart');
            }
        }

        // Save Message to Firebase
        async function saveMessageToFirebase(text, type) {
            try {
                const messagesRef = collection(db, "artifacts", appId, "chats", currentChatId, "messages");
                await addDoc(messagesRef, {
                    text: text,
                    type: type,
                    senderId: currentUser.uid,
                    senderProfilePic: currentUserProfileData?.profilePicId || currentUser.profilePicId,
                    timestamp: serverTimestamp(),
                    status: 'sent'
                });

                // Update chat last message
                const chatRef = doc(db, "artifacts", appId, "chats", currentChatId);
                await updateDoc(chatRef, {
                    lastMessage: text,
                    lastMessageTime: serverTimestamp()
                });
            } catch (error) {
                console.error('JCHAT_ERROR: Error saving message to Firebase:', error);
            }
        }

        // Camera Functionality
        function openCamera() {
            console.log('JCHAT_DEBUG: Opening camera for real users');
            // TODO: Implement camera capture and Cloudinary upload
        }

        // Gallery Functionality
        function openGallery() {
            console.log('JCHAT_DEBUG: Opening gallery for real users');
            // TODO: Implement gallery selection and Cloudinary upload
        }

        // Voice Recording
        function startVoiceRecording() {
            console.log('JCHAT_DEBUG: Starting voice recording for real users');
            // TODO: Implement voice recording and Cloudinary upload
        }

        // Call Functionality
        function initiateCall() {
            console.log('JCHAT_DEBUG: Initiating call for real users');
            // TODO: Implement call functionality
        }

        // Video Call Functionality
        function initiateVideoCall() {
            console.log('JCHAT_DEBUG: Initiating video call for real users');
            // TODO: Implement video call functionality
        }

        // Show Chat Info
        function showChatInfo() {
            console.log('JCHAT_DEBUG: Showing chat info for real users');
            // TODO: Implement chat info panel
        }

        // Setup Message Menu
        function setupMessageMenu() {
            let longPressTimer;
            let longPressedMessage = null;

            messagesArea.addEventListener('mousedown', (e) => {
                const messageBubble = e.target.closest('.message-bubble');
                if (messageBubble) {
                    longPressedMessage = messageBubble.closest('.message');
                    longPressTimer = setTimeout(() => {
                        showMessageMenu(e, messageBubble);
                    }, 500);
                }
            });

            messagesArea.addEventListener('mouseup', () => {
                clearTimeout(longPressTimer);
            });

            messagesArea.addEventListener('mouseleave', () => {
                clearTimeout(longPressTimer);
            });

            // Hide menu when clicking outside
            document.addEventListener('click', (e) => {
                if (!messageMenu.contains(e.target)) {
                    messageMenu.style.display = 'none';
                }
            });

            // Menu Actions
            if (document.getElementById('copyBtn')) {
                document.getElementById('copyBtn').addEventListener('click', () => {
                    if (selectedMessage) {
                        const text = selectedMessage.querySelector('.message-text').textContent;
                        navigator.clipboard.writeText(text);
                        messageMenu.style.display = 'none';
                    }
                });
            }

            if (document.getElementById('replyBtn')) {
                document.getElementById('replyBtn').addEventListener('click', () => {
                    if (selectedMessage) {
                        // TODO: Implement reply functionality for real users
                        messageMenu.style.display = 'none';
                    }
                });
            }

            if (document.getElementById('forwardBtn')) {
                document.getElementById('forwardBtn').addEventListener('click', () => {
                    if (selectedMessage) {
                        // TODO: Implement forward functionality for real users
                        messageMenu.style.display = 'none';
                    }
                });
            }

            if (document.getElementById('reactBtn')) {
                document.getElementById('reactBtn').addEventListener('click', () => {
                    if (selectedMessage) {
                        const reaction = document.createElement('div');
                        reaction.className = 'message-reaction';
                        reaction.innerHTML = '❤️';
                        selectedMessage.querySelector('.message-bubble').appendChild(reaction);
                        messageMenu.style.display = 'none';
                    }
                });
            }

            if (document.getElementById('deleteBtn')) {
                document.getElementById('deleteBtn').addEventListener('click', () => {
                    if (selectedMessage) {
                        selectedMessage.remove();
                        messageMenu.style.display = 'none';
                    }
                });
            }
        }

        // Show Message Menu
        function showMessageMenu(e, messageBubble) {
            messageMenu.style.display = 'block';
            messageMenu.style.left = `${e.clientX - 100}px`;
            messageMenu.style.top = `${e.clientY - 120}px`;
            
            selectedMessage = messageBubble;
        }

        // Clear Reply
        function clearReply() {
            isReplying = false;
        }

        // Double Tap Reaction
        let lastTap = 0;
        messagesArea.addEventListener('click', (e) => {
            const messageBubble = e.target.closest('.message-bubble');
            if (messageBubble) {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                if (tapLength < 500 && tapLength > 0) {
                    // Double tap detected
                    const reaction = document.createElement('div');
                    reaction.className = 'message-reaction';
                    reaction.innerHTML = '❤️';
                    messageBubble.appendChild(reaction);
                }
                lastTap = currentTime;
            }
        });

        // Typing Indicator
        messageInput.addEventListener('input', () => {
            if (messageInput.value.trim() && currentChat) {
                typingIndicator.classList.add('show');
            } else {
                typingIndicator.classList.remove('show');
            }
        });

        // Authentication
        onAuthStateChanged(auth, async (user) => {
            try {
                if (user) {
                    currentUser = user;
                    console.log("JCHAT_DEBUG: User authenticated:", user.uid);
                    
                    // TODO: Load user profile data and chat list
                } else {
                    console.log("JCHAT_DEBUG: No user signed in.");
                    try {
                        await signInAnonymously(auth);
                        console.log("JCHAT_DEBUG: Signed in anonymously.");
                    } catch (error) {
                        console.error("JCHAT_ERROR: Error during anonymous sign-in:", error);
                    }
                }
            } catch (error) {
                console.error("JCHAT_ERROR: Error in authentication flow:", error);
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initializeChat();
        });

        console.log('JCHAT Instagram-style chat initialized successfully!');
        console.log('Firebase and Cloudinary configured and ready for real users');
        console.log('Features: Reactions, reply, long press menu, typing indicator');
    </script>
