<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCHAT - Chat with Friends</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        /* Global CSS Variables */
        :root {
            --pink: #ff2e92;
            --blue: #00d5ff;
            --glass-black: rgba(10, 10, 10, .75);
            --glass-blue: rgba(0, 213, 255, .15);
            --radius: 20px;
            --transition: .3s ease;
            --white: #fff;
            --text-light: rgba(255, 255, 255, .7);
            --background-main: rgba(10, 10, 10, .75);
            --background-gradient-1: #00d5ff;
            --background-gradient-2: #ff2e92;
            --card-background: linear-gradient(145deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, .01));
            --header-background: linear-gradient(135deg, rgba(10, 10, 10, .85), rgba(10, 10, 10, .75));
            --border-light: rgba(255, 255, 255, .05);
            --input-background: rgba(255, 255, 255, 0.05);
            --button-background: linear-gradient(90deg, var(--blue), var(--pink));
            --button-shadow: 0 4px 15px var(--blue), 0 4px 15px var(--pink);
        }

        /* Theme Definitions */
        body.theme-dark-mode {
            --background-main: #1a1a2e;
            --background-gradient-1: #16213e;
            --background-gradient-2: #0f3460;
            --white: #e0e0e0;
            --text-light: #a0a0a0;
            --card-background: rgba(25, 25, 40, 0.7);
            --header-background: linear-gradient(135deg, rgba(10, 10, 20, .85), rgba(10, 10, 20, .75));
            --border-light: rgba(255, 255, 255, 0.08);
            --input-background: rgba(255, 255, 255, 0.08);
        }

        body.theme-light-mode {
            --background-main: #f0f2f5;
            --white: #333;
            --text-light: #666;
            --card-background: rgba(255, 255, 255, 0.95);
            --header-background: rgba(255, 255, 255, 0.98);
            --border-light: rgba(0, 0, 0, 0.1);
            --input-background: rgba(0, 0, 0, 0.05);
        }

        body.theme-glass-mode {
            --background-main: rgba(10, 10, 10, 0.75);
            background-image: url('https://source.unsplash.com/random/1920x1080?abstract,blur') !important;
            background-size: cover;
            background-attachment: fixed;
            backdrop-filter: blur(10px);
        }

        body.theme-sunset-mode {
            background: linear-gradient(to top, #ff7e5f, #feb47b) !important;
            --white: #fff;
            --text-light: rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            background-color: var(--background-main);
            background-image: radial-gradient(circle at top left, var(--background-gradient-1), transparent 100px),
                              radial-gradient(circle at bottom right, var(--background-gradient-2), transparent 150px);
            color: var(--white);
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* Header */
        header {
            background: var(--header-background);
            border-bottom: 1px solid var(--border-light);
            padding: 10px 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            z-index: 1000;
            display: flex;
            justify-content: center;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            padding: 0 20px;
        }

        .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            background-clip: text;
            color: transparent;
            background-image: linear-gradient(90deg, var(--blue), var(--pink));
            text-decoration: none;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .notification-icon {
            position: relative;
            font-size: 1.5rem;
            background-image: linear-gradient(90deg, var(--blue), var(--pink));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .notification-icon:hover { transform: scale(1.1); }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--white);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--blue);
        }

        .user-avatar-placeholder {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--blue), var(--pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--white);
        }

        /* Main Layout */
        .chat-container {
            display: flex;
            height: calc(100vh - 60px);
            margin-top: 60px;
        }

        /* Friends Sidebar */
        .friends-sidebar {
            width: 350px;
            background: var(--card-background);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .friends-sidebar.collapsed {
            width: 60px;
        }

        .friends-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .friends-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background-clip: text;
            color: transparent;
            background-image: linear-gradient(90deg, var(--blue), var(--pink));
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .friends-sidebar.collapsed .friends-title {
            display: none;
        }

        .friends-count {
            font-size: 0.9rem;
            color: var(--text-light);
            font-weight: 500;
        }

        /* Toggle Button - Icon Toggle */
        .toggle-friends-btn {
            background: linear-gradient(45deg, var(--pink), var(--blue));
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 46, 146, 0.3), 0 4px 15px rgba(0, 213, 255, 0.3);
            flex-shrink: 0;
        }

        .toggle-friends-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 46, 146, 0.4), 0 8px 25px rgba(0, 213, 255, 0.4);
        }

        /* Search Container */
        .friends-search {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .friends-sidebar.collapsed .friends-search {
            display: none;
        }

        .search-container {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border-radius: 25px;
            border: 1px solid var(--border-light);
            background-color: var(--input-background);
            color: var(--white);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .search-input::placeholder {
            color: var(--text-light);
        }

        .search-input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(0, 213, 255, 0.3);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 1rem;
        }

        .clear-search {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px;
            border-radius: 50%;
            transition: all 0.2s ease;
            display: none;
        }

        .clear-search:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
        }

        /* Friends List */
        .friends-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .friends-sidebar.collapsed .friends-list {
            padding: 10px 5px;
        }

        .friend-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        .friends-sidebar.collapsed .friend-item {
            padding: 12px 10px;
            justify-content: center;
        }

        .friend-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-left-color: var(--blue);
        }

        .friend-item.active {
            background: rgba(0, 213, 255, 0.1);
            border-left-color: var(--blue);
        }

        .friend-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--pink);
            flex-shrink: 0;
        }

        .friend-avatar-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--blue), var(--pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--white);
            flex-shrink: 0;
        }

        .friend-info {
            margin-left: 12px;
            flex: 1;
            min-width: 0;
        }

        .friends-sidebar.collapsed .friend-info {
            display: none;
        }

        .friend-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--white);
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .friend-status {
            font-size: 0.8rem;
            color: var(--text-light);
            margin: 2px 0 0 0;
        }

        .online-indicator {
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            right: 2px;
            border: 2px solid var(--card-background);
        }

        /* Loading and Empty States */
        .loading-friends,
        .no-friends {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .friends-sidebar.collapsed .loading-friends,
        .friends-sidebar.collapsed .no-friends {
            padding: 20px 5px;
        }

        .loading-friends i {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--blue);
            animation: spin 1s linear infinite;
        }

        .no-friends i {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: var(--text-light);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--background-main);
        }

        .chat-welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }

        .welcome-icon {
            font-size: 4rem;
            background-image: linear-gradient(90deg, var(--blue), var(--pink));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .welcome-title {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            background-clip: text;
            color: transparent;
            background-image: linear-gradient(90deg, var(--blue), var(--pink));
            margin-bottom: 15px;
        }

        .welcome-subtitle {
            font-size: 1.1rem;
            color: var(--text-light);
            max-width: 400px;
            line-height: 1.5;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .chat-container {
                flex-direction: column;
            }

            .friends-sidebar {
                width: 100%;
                height: 50vh;
                border-right: none;
                border-bottom: 1px solid var(--border-light);
            }

            .friends-sidebar.collapsed {
                height: 60px;
                width: 100%;
            }

            .chat-area {
                height: 50vh;
            }

            .friends-sidebar.collapsed .chat-area {
                height: calc(100vh - 120px);
            }

            .friends-header {
                padding: 15px;
            }

            .friends-title {
                font-size: 1.3rem;
            }

            .toggle-friends-btn {
                width: 35px;
                height: 35px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .header-content {
                padding: 0 15px;
            }

            .logo {
                font-size: 1.5rem;
            }

            .friends-sidebar {
                height: 45vh;
            }

            .welcome-title {
                font-size: 1.6rem;
            }

            .welcome-subtitle {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body class="theme-dark-mode">
    <!-- Header -->
    <header>
        <div class="header-content">
            <a href="/home.html" class="logo">
                <img src="assets/security.png" alt="JCHAT Security" style="height:24px;width:auto;margin-right:10px" onerror="this.style.display='none'">
                JCHAT
            </a>
            
            <div class="header-actions">
                <div class="notification-icon">
                    <i class="fas fa-bell"></i>
                </div>
                
                <a href="/profile.html" class="user-profile" id="userProfile">
                    <img id="headerProfilePic" src="" alt="Profile" class="user-avatar" style="display: none;">
                    <div id="headerAvatarIcon" class="user-avatar-placeholder">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <span id="headerDisplayName">Loading...</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Chat Container -->
    <div class="chat-container">
        <!-- Friends Sidebar with Toggle -->
        <div class="friends-sidebar" id="friendsSidebar">
            <div class="friends-header">
                <h2 class="friends-title">
                    <i class="fas fa-users"></i>
                    Friends
                    <span id="friendsCount" class="friends-count">(0)</span>
                </h2>
                <button id="toggleFriendsBtn" class="toggle-friends-btn" title="Toggle Friends List">
                    <i class="fas fa-eye-slash" id="friendsToggleIcon"></i>
                </button>
            </div>
            
            <div class="friends-search">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="friendsSearchInput" class="search-input" placeholder="Search friends...">
                    <button id="clearFriendsSearch" class="clear-search" style="display: none;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>
            
            <div class="friends-list" id="friendsList">
                <div class="loading-friends" id="loadingFriends">
                    <i class="fas fa-spinner"></i>
                    <p>Loading friends...</p>
                </div>
                <div class="no-friends" id="noFriends" style="display: none;">
                    <i class="fas fa-user-friends"></i>
                    <p>No friends found</p>
                </div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-welcome">
                <div class="welcome-icon">
                    <i class="fas fa-comments"></i>
                </div>
                <h1 class="welcome-title">Welcome to JCHAT</h1>
                <p class="welcome-subtitle">
                    Select a friend from the sidebar to start chatting. 
                    Use the toggle button to show/hide your friends list.
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        // Import Firebase modules
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyBsBinyrD9WZZXRaCvA4gxfX7BIimydDvo",
            authDomain: "jchat-1.firebaseapp.com",
            projectId: "jchat-1",
            storageBucket: "jchat-1.firebasestorage.app",
            messagingSenderId: "328479683167",
            appId: "1:328479683167:web:276c0b7e8ea44dd2d6a1ea",
            measurementId: "G-S6Z9GG0R9P"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // Cloudinary Configuration
        const cloudinaryConfig = {
            cloudName: "dxld01rcp",
            uploadPreset: "Storage_preset"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // DOM Elements
        const friendsSidebar = document.getElementById('friendsSidebar');
        const toggleFriendsBtn = document.getElementById('toggleFriendsBtn');
        const friendsToggleIcon = document.getElementById('friendsToggleIcon');
        const friendsSearchInput = document.getElementById('friendsSearchInput');
        const clearFriendsSearch = document.getElementById('clearFriendsSearch');
        const friendsList = document.getElementById('friendsList');
        const friendsCount = document.getElementById('friendsCount');
        const loadingFriends = document.getElementById('loadingFriends');
        const noFriends = document.getElementById('noFriends');
        const headerProfilePic = document.getElementById('headerProfilePic');
        const headerAvatarIcon = document.getElementById('headerAvatarIcon');
        const headerDisplayName = document.getElementById('headerDisplayName');

        // Global State
        let currentUser = null;
        let allFriendsData = [];
        let friendsVisible = true;
        let currentUserProfileData = null;

        // Cloudinary Image URL Helper
        function getCloudinaryImageUrl(urlOrPublicId, transformations = "w_auto,f_auto,q_auto") {
            if (!urlOrPublicId) return null;
            if (urlOrPublicId.startsWith('http://') || urlOrPublicId.startsWith('https://')) {
                if (urlOrPublicId.includes('res.cloudinary.com')) {
                    const parts = urlOrPublicId.split('/upload/');
                    if (parts.length === 2) {
                        return `${parts[0]}/upload/${transformations}/${parts[1]}`;
                    }
                }
                return urlOrPublicId;
            }
            return `https://res.cloudinary.com/${cloudinaryConfig.cloudName}/image/upload/${transformations}/${urlOrPublicId}`;
        }

        // Display Profile Picture Helper
        function displayProfilePicture(imgElement, iconElement, profilePicId, usernameInitial, transformations) {
            if (imgElement && iconElement) {
                if (profilePicId) {
                    const imageUrl = getCloudinaryImageUrl(profilePicId, transformations);
                    imgElement.src = imageUrl;
                    imgElement.style.display = 'block';
                    iconElement.style.display = 'none';
                    imgElement.onerror = () => {
                        imgElement.src = `https://placehold.co/40x40/CCCCCC/000000?text=${usernameInitial}`;
                        imgElement.style.display = 'block';
                        iconElement.style.display = 'none';
                    };
                } else {
                    imgElement.src = '';
                    imgElement.style.display = 'none';
                    iconElement.style.display = 'block';
                }
            }
        }

        // Toggle Friends Sidebar
        function toggleFriendsSidebar() {
            friendsVisible = !friendsVisible;
            
            if (friendsVisible) {
                friendsSidebar.classList.remove('collapsed');
                friendsToggleIcon.className = 'fas fa-eye-slash';
                toggleFriendsBtn.title = 'Hide Friends List';
            } else {
                friendsSidebar.classList.add('collapsed');
                friendsToggleIcon.className = 'fas fa-eye';
                toggleFriendsBtn.title = 'Show Friends List';
            }
        }

        // Render Friends List (with Find_Friends.html filtering logic)
        function renderFriendsList(friendsToRender, searchQuery) {
            friendsList.innerHTML = '';
            loadingFriends.style.display = 'none';

            let filteredFriends = friendsToRender;

            // Apply search filter (exact logic from Find_Friends.html)
            if (searchQuery) {
                const lowerCaseQuery = searchQuery.toLowerCase();
                filteredFriends = friendsToRender.filter(friend =>
                    (friend.username && friend.username.toLowerCase().includes(lowerCaseQuery))
                );
            }

            if (filteredFriends.length === 0) {
                noFriends.style.display = 'block';
                const noFriendsP = noFriends.querySelector('p');
                if (noFriendsP) {
                    noFriendsP.textContent = searchQuery ? 
                        `No friends found matching "${searchQuery}".` : "No friends to display.";
                }
                friendsList.appendChild(noFriends);
            } else {
                noFriends.style.display = 'none';
                filteredFriends.forEach(friend => {
                    friendsList.appendChild(createFriendItem(friend.userId, friend));
                });
            }

            // Update friends count
            friendsCount.textContent = `(${filteredFriends.length})`;
        }

        // Create Friend Item
        function createFriendItem(userId, userData) {
            const item = document.createElement('div');
            item.classList.add('friend-item');
            item.onclick = () => selectFriend(userId, userData);

            const username = userData.username || `User_${userId.substring(0, 8)}`;
            const profilePicId = userData.profilePicId || null;
            const usernameInitial = username.charAt(0).toUpperCase();

            let avatarHtml = '';
            if (profilePicId && userData.visibility?.profilePic !== false) {
                const imageUrl = getCloudinaryImageUrl(profilePicId, "w_80,h_80,c_fill,g_face,r_max");
                avatarHtml = `<img src="${imageUrl}" alt="${username}'s Avatar" class="friend-avatar" onerror="this.onerror=null;this.outerHTML='<div class=\\"friend-avatar-placeholder\\"><i class=\\"fas fa-user-circle\\"></i></div>';">`;
            } else {
                avatarHtml = `<div class="friend-avatar-placeholder"><i class="fas fa-user-circle"></i></div>`;
            }

            item.innerHTML = `
                ${avatarHtml}
                <div class="friend-info">
                    <h4 class="friend-name">${userData.visibility?.displayName !== false ? username : 'Anonymous User'}</h4>
                    <p class="friend-status">Online</p>
                </div>
            `;

            return item;
        }

        // Select Friend (placeholder for chat functionality)
        function selectFriend(userId, userData) {
            // Remove active class from all friends
            document.querySelectorAll('.friend-item').forEach(item => {
                item.classList.remove('active');
            });
            
            // Add active class to selected friend
            event.currentTarget.classList.add('active');
            
            console.log('Selected friend:', userData.username, 'ID:', userId);
            // Here you would implement chat functionality
        }

        // Load Friends Data
        async function loadFriendsData() {
            if (!currentUser) return;

            loadingFriends.style.display = 'block';
            noFriends.style.display = 'none';

            try {
                // Fetch current user's friends from the friends collection
                const publicFriendsRef = collection(db, "artifacts", appId, "public", "data", "friends");
                const friendsSnapshot = await getDocs(publicFriendsRef);
                
                const friendUserIds = [];
                friendsSnapshot.forEach(docSnap => {
                    const friendData = docSnap.data();
                    if (friendData.user1Id === currentUser.uid) {
                        friendUserIds.push(friendData.user2Id);
                    } else if (friendData.user2Id === currentUser.uid) {
                        friendUserIds.push(friendData.user1Id);
                    }
                });

                // Fetch friend profile data
                allFriendsData = [];
                for (const friendId of friendUserIds) {
                    const userDoc = await getDoc(doc(db, "artifacts", appId, "public", "data", "users", friendId));
                    if (userDoc.exists()) {
                        allFriendsData.push({ userId: friendId, ...userDoc.data() });
                    }
                }

                renderFriendsList(allFriendsData, friendsSearchInput.value);
            } catch (error) {
                console.error("Error loading friends:", error);
                loadingFriends.style.display = 'none';
                noFriends.style.display = 'block';
                const noFriendsP = noFriends.querySelector('p');
                if (noFriendsP) noFriendsP.textContent = "Error loading friends.";
            }
        }

        // Fetch and Display Header Profile
        async function fetchAndDisplayHeaderProfile(user) {
            try {
                const privateProfileDocRef = doc(db, "artifacts", appId, "users", user.uid, "profiles", "user_profile");
                const privateDocSnap = await getDoc(privateProfileDocRef);

                let profileData = null;
                if (privateDocSnap.exists()) {
                    profileData = privateDocSnap.data();
                } else {
                    // Create basic profile if doesn't exist
                    profileData = {
                        username: user.displayName || `User_${user.uid.substring(0, 8)}`,
                        email: user.email || "",
                        profilePicId: user.photoURL || null,
                    };
                }

                currentUserProfileData = profileData;

                // Update header UI
                const usernameInitial = (profileData.username || "J").charAt(0).toUpperCase();
                displayProfilePicture(headerProfilePic, headerAvatarIcon, profileData?.profilePicId, usernameInitial, "w_70,h_70,c_fill,g_face,r_max");
                headerDisplayName.textContent = profileData.username || "JCHAT User";

            } catch (error) {
                console.error("Error fetching profile:", error);
                const usernameInitial = (user.displayName || "J").charAt(0).toUpperCase();
                displayProfilePicture(headerProfilePic, headerAvatarIcon, user.photoURL, usernameInitial, "w_70,h_70,c_fill,g_face,r_max");
                headerDisplayName.textContent = user.displayName || "JCHAT User";
            }
        }

        // Event Listeners
        toggleFriendsBtn.addEventListener('click', toggleFriendsSidebar);

        friendsSearchInput.addEventListener('input', () => {
            renderFriendsList(allFriendsData, friendsSearchInput.value);
            // Show/hide clear button
            clearFriendsSearch.style.display = friendsSearchInput.value ? 'block' : 'none';
        });

        clearFriendsSearch.addEventListener('click', () => {
            friendsSearchInput.value = '';
            renderFriendsList(allFriendsData, '');
            clearFriendsSearch.style.display = 'none';
        });

        // Authentication State Listener
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                console.log("User authenticated:", user.uid);
                await fetchAndDisplayHeaderProfile(user);
                loadFriendsData();
            } else {
                console.log("No user signed in. Attempting anonymous sign-in.");
                try {
                    await signInAnonymously(auth);
                } catch (error) {
                    console.error("Error during anonymous sign-in:", error);
                    headerDisplayName.textContent = "Guest";
                    if (headerProfilePic) headerProfilePic.style.display = 'none';
                    if (headerAvatarIcon) headerAvatarIcon.style.display = 'block';
                }
            }
        });

        // Theme Management
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('jchat-theme');
            const themes = ['theme-light-mode', 'theme-dark-mode', 'theme-glass-mode', 'theme-sunset-mode'];
            if (savedTheme && themes.includes(savedTheme)) {
                document.body.classList.remove(...themes);
                document.body.classList.add(savedTheme);
            } else {
                document.body.classList.add('theme-dark-mode');
            }
        });

        window.addEventListener('storage', (event) => {
            if (event.key === 'jchat-theme') {
                const newTheme = event.newValue || 'theme-dark-mode';
                const themes = ['theme-light-mode', 'theme-dark-mode', 'theme-glass-mode', 'theme-sunset-mode'];
                if (themes.includes(newTheme)) {
                    document.body.classList.remove(...themes);
                    document.body.classList.add(newTheme);
                }
            }
        });
    </script>
</body>
</html>
