<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCHAT - Chat</title>
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --pink: #ff2e92;
            --blue: #00d5ff;
            --glass-black: rgba(10, 10, 10, .75);
            --glass-blue: rgba(0, 213, 255, .15);
            --radius: 20px;
            --transition: .3s ease;
            --white: #fff;
            --text-light: rgba(255, 255, 255, .7);
            --background-main: rgba(10, 10, 10, .75);
            --background-gradient-1: #00d5ff;
            --background-gradient-2: #ff2e92;
            --card-background: linear-gradient(145deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, .01));
            --header-background: linear-gradient(135deg, rgba(10, 10, 10, .85), rgba(10, 10, 10, .75));
            --border-light: rgba(255, 255, 255, .05);
            --input-background: rgba(255, 255, 255, 0.05);
            --button-background: linear-gradient(90deg, var(--blue), var(--pink));
            --button-shadow: 0 4px 15px var(--blue), 0 4px 15px var(--pink);

            --background-color-primary: #1a1a2e;
            --background-color-secondary: #0f0f1f;
            --header-background-color: #2a2a4a;
            --content-background-color: #20203a;
            --card-background-color: #2a2a4a;
            --text-color-primary: #e0e0e0;
            --text-color-secondary: #b0b0d0;
            --notification-badge-color: #ff2e92;
            --status-online: #4CAF50;
            --status-offline: #6c757d;
            --status-away: #FFC107;
            --border-color: #3a3a5a;
            --input-background-color: rgba(255,255,255,0.05);
        }

        body.theme-light-mode {
            --background-color-primary: #f0f2f5;
            --content-background-color: #f7f9fb;
            --card-background-color: #ffffff;
            --text-color-primary: #333333;
            --text-color-secondary: #666666;
            --border-color: #e0e0e0;
            --input-background-color: #f0f0f0;
        }

        body.theme-dark-mode {
            --background-color-primary: #121212;
            --content-background-color: #242424;
            --card-background-color: #2c2c2c;
            --text-color-primary: #ffffff;
            --text-color-secondary: #bbbbbb;
            --border-color: #444444;
            --input-background-color: #383838;
        }

        body.theme-glass-mode {
            background-image: url('https://source.unsplash.com/random/1920x1080?abstract,blur') !important;
            background-size: cover; background-attachment: fixed; background-position: center;
            --card-background-color: rgba(25,25,40,0.7);
            --text-color-primary: #e0e0e0;
            --text-color-secondary: #b0b0d0;
            --border-color: rgba(255,255,255,0.1);
            --input-background-color: rgba(255,255,255,0.05);
        }

        body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Apple Color Emoji", "Segoe UI Emoji"; color: var(--text-color-primary); background: var(--background-color-primary); }

        .app-header {
            position: sticky; top: 0; z-index: 10;
            background: var(--header-background-color);
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; border-bottom: 1px solid var(--border-color);
        }
        .app-title { display: flex; gap: 10px; align-items: center; font-weight: 700; }
        .app-actions { display: flex; gap: 8px; align-items: center; }
        .icon-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-color-primary); border-radius: 10px; padding: 8px 10px; cursor: pointer; }

        .chat-layout { display: grid; grid-template-columns: 300px 1fr 320px; gap: 12px; padding: 12px; height: calc(100vh - 56px); }
        .panel { background: var(--card-background-color); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; }

        .conversations-header { padding: 12px; border-bottom: 1px solid var(--border-color); display: flex; gap: 8px; }
        .search { flex: 1; background: var(--input-background-color); border: 1px solid var(--border-color); border-radius: 10px; padding: 8px 10px; color: var(--text-color-primary); }
        .conversation-list { overflow: auto; }
        .conversation-item { display: grid; grid-template-columns: 40px 1fr auto; gap: 10px; padding: 12px; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .conversation-item.active { background: rgba(0,0,0,0.08); }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #777; display: inline-block; }
        .name { font-weight: 600; }
        .last-message { color: var(--text-color-secondary); font-size: 13px; }
        .badge { background: var(--notification-badge-color); color: white; border-radius: 999px; padding: 2px 8px; font-size: 12px; height: fit-content; }

        .thread-header { padding: 12px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 10px; }
        .thread-messages { flex: 1; overflow: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--border-color); }
        .incoming { background: rgba(255,255,255,0.05); align-self: flex-start; }
        .outgoing { background: linear-gradient(90deg, var(--blue), var(--pink)); color: #fff; align-self: flex-end; border: none; }
        .timestamp { font-size: 11px; opacity: 0.8; margin-top: 4px; }

        .composer { border-top: 1px solid var(--border-color); padding: 10px; display: grid; grid-template-columns: auto 1fr auto; gap: 8px; }
        .composer input[type="text"] { background: var(--input-background-color); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px 12px; color: var(--text-color-primary); }
        .send-btn { background: var(--button-background); color: white; border: none; border-radius: 12px; padding: 10px 14px; cursor: pointer; box-shadow: var(--button-shadow); }

        .info-header { padding: 12px; border-bottom: 1px solid var(--border-color); font-weight: 600; }
        .info-content { padding: 12px; overflow: auto; }

        @media (max-width: 1100px) {
            .chat-layout { grid-template-columns: 280px 1fr; }
            .info-panel { display: none; }
        }
        @media (max-width: 720px) {
            .chat-layout { grid-template-columns: 1fr; }
            .conversations { display: none; }
        }
    </style>
</head>
<body class="theme-dark-mode">
    <header class="app-header">
        <div class="app-title">
            <i class="fa-solid fa-comments"></i>
            <span>JCHAT</span>
        </div>
        <div class="app-actions">
            <a class="icon-btn" href="/Profile.html" title="Back to Profile"><i class="fa-solid fa-arrow-left"></i></a>
            <button class="icon-btn" id="themeToggle" title="Toggle Theme"><i class="fa-solid fa-moon"></i></button>
            <button class="icon-btn" title="Notifications"><i class="fa-regular fa-bell"></i></button>
            <img class="avatar" alt="You" src="https://i.pravatar.cc/40?img=13" />
        </div>
    </header>

    <main class="chat-layout">
        <section class="panel conversations">
            <div class="conversations-header">
                <input class="search" id="conversationSearch" placeholder="Search conversations" autocomplete="off" />
                <button class="icon-btn" id="newChatBtn" title="New chat"><i class="fa-solid fa-pen"></i></button>
            </div>
            <div class="conversation-list" id="conversationList" role="listbox" aria-label="Conversations"></div>
        </section>

        <section class="panel thread">
            <div class="thread-header" id="threadHeader">
                <span class="name" id="threadTitle">Select a conversation</span>
            </div>
            <div class="thread-messages" id="messageList" aria-live="polite"></div>
            <div class="composer">
                <button class="icon-btn" id="attachBtn" title="Attach file"><i class="fa-solid fa-paperclip"></i></button>
                <input type="text" id="messageInput" placeholder="Type a message" />
                <button class="send-btn" id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
                <input type="file" id="fileInput" style="display:none" />
            </div>
        </section>

        <aside class="panel info-panel">
            <div class="info-header">Conversation Info</div>
            <div class="info-content" id="infoContent">
                <div>Participants: <span id="infoParticipants">-</span></div>
                <div>Status: <span id="infoStatus">-</span></div>
            </div>
        </aside>
    </main>

    <script>
        const mockConversations = [
            { id: 'c1', name: 'Alice', avatar: 'https://i.pravatar.cc/40?img=5', unread: 2, participants: ['You','Alice'], status: 'online', messages: [
                { id: 'm1', sender: 'Alice', text: 'Hey there!', time: '10:01' },
                { id: 'm2', sender: 'You', text: 'Hi! How are you?', time: '10:02' },
            ]},
            { id: 'c2', name: 'Project Team', avatar: 'https://i.pravatar.cc/40?img=8', unread: 0, participants: ['You','Jane','Mike'], status: 'away', messages: [
                { id: 'm1', sender: 'Mike', text: 'Standup at 10:30', time: '09:15' },
                { id: 'm2', sender: 'You', text: 'On it 👍', time: '09:16' },
            ]},
            { id: 'c3', name: 'Bob', avatar: 'https://i.pravatar.cc/40?img=12', unread: 1, participants: ['You','Bob'], status: 'offline', messages: [
                { id: 'm1', sender: 'Bob', text: 'Did you check the doc?', time: 'Yesterday' },
            ]},
        ];

        let activeConversationId = null;

        const conversationListEl = document.getElementById('conversationList');
        const messageListEl = document.getElementById('messageList');
        const threadTitleEl = document.getElementById('threadTitle');
        const messageInputEl = document.getElementById('messageInput');
        const sendBtnEl = document.getElementById('sendBtn');
        const attachBtnEl = document.getElementById('attachBtn');
        const fileInputEl = document.getElementById('fileInput');
        const conversationSearchEl = document.getElementById('conversationSearch');
        const infoParticipantsEl = document.getElementById('infoParticipants');
        const infoStatusEl = document.getElementById('infoStatus');
        const themeToggleEl = document.getElementById('themeToggle');

        function renderConversations(list) {
            conversationListEl.innerHTML = '';
            list.forEach(conv => {
                const item = document.createElement('div');
                item.className = 'conversation-item' + (conv.id === activeConversationId ? ' active' : '');
                item.setAttribute('role', 'option');
                item.setAttribute('data-id', conv.id);
                item.innerHTML = `
                    <img class="avatar" src="${conv.avatar}" alt="${conv.name}" />
                    <div>
                        <div class="name">${conv.name}</div>
                        <div class="last-message">${conv.messages[conv.messages.length - 1]?.text || ''}</div>
                    </div>
                    <div>${conv.unread ? `<span class="badge">${conv.unread}</span>` : ''}</div>
                `;
                item.addEventListener('click', () => selectConversation(conv.id));
                conversationListEl.appendChild(item);
            });
        }

        function selectConversation(id) {
            activeConversationId = id;
            const conv = mockConversations.find(c => c.id === id);
            if (!conv) return;
            threadTitleEl.textContent = conv.name;
            infoParticipantsEl.textContent = conv.participants.join(', ');
            infoStatusEl.textContent = conv.status;
            conv.unread = 0;
            renderConversations(mockConversations);
            renderMessages(conv.messages);
            messageInputEl.focus();
        }

        function renderMessages(messages) {
            messageListEl.innerHTML = '';
            messages.forEach(msg => {
                const isOutgoing = msg.sender === 'You';
                const el = document.createElement('div');
                el.className = 'message ' + (isOutgoing ? 'outgoing' : 'incoming');
                el.innerHTML = `
                    <div>${msg.text}</div>
                    <div class="timestamp">${msg.time}</div>
                `;
                messageListEl.appendChild(el);
            });
            messageListEl.scrollTop = messageListEl.scrollHeight;
        }

        function sendMessage() {
            const text = messageInputEl.value.trim();
            if (!text || !activeConversationId) return;
            const conv = mockConversations.find(c => c.id === activeConversationId);
            const now = new Date();
            const hh = now.getHours().toString().padStart(2,'0');
            const mm = now.getMinutes().toString().padStart(2,'0');
            const message = { id: 'm' + Math.random().toString(36).slice(2), sender: 'You', text, time: `${hh}:${mm}` };
            conv.messages.push(message);
            renderMessages(conv.messages);
            messageInputEl.value = '';
        }

        function debounce(fn, delay) {
            let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay); };
        }

        conversationSearchEl.addEventListener('input', debounce((e) => {
            const q = e.target.value.toLowerCase();
            const filtered = mockConversations.filter(c => c.name.toLowerCase().includes(q));
            renderConversations(filtered);
        }, 200));

        sendBtnEl.addEventListener('click', sendMessage);
        messageInputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        attachBtnEl.addEventListener('click', () => fileInputEl.click());
        fileInputEl.addEventListener('change', () => {
            if (!activeConversationId || !fileInputEl.files.length) return;
            const file = fileInputEl.files[0];
            const conv = mockConversations.find(c => c.id === activeConversationId);
            const now = new Date();
            const hh = now.getHours().toString().padStart(2,'0');
            const mm = now.getMinutes().toString().padStart(2,'0');
            conv.messages.push({ id: 'm' + Math.random().toString(36).slice(2), sender: 'You', text: `Attached: ${file.name}`, time: `${hh}:${mm}`});
            renderMessages(conv.messages);
            fileInputEl.value = '';
        });

        themeToggleEl.addEventListener('click', () => {
            const themes = ['theme-light-mode','theme-dark-mode','theme-glass-mode'];
            const current = themes.find(t => document.body.classList.contains(t)) || 'theme-dark-mode';
            const next = themes[(themes.indexOf(current) + 1) % themes.length];
            document.body.classList.remove(...themes);
            document.body.classList.add(next);
            localStorage.setItem('jchat-theme', next);
        });

        // Initial render
        const savedTheme = localStorage.getItem('jchat-theme');
        if (savedTheme) { document.body.classList.remove('theme-dark-mode'); document.body.classList.add(savedTheme); }
        renderConversations(mockConversations);
        // Auto-select first conversation
        if (mockConversations.length) selectConversation(mockConversations[0].id);
    </script>
</body>
</html>
