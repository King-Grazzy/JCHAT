<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCHAT Premium - Advanced Messaging</title>
    
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #3b82f6;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --bg-light: #f8fafc;
            --bg-dark: #0f172a;
            --text-light: #1e293b;
            --text-dark: #f1f5f9;
            --border-light: #e2e8f0;
            --border-dark: #334155;
        }
        
        [data-theme="dark"] {
            --bg-primary: var(--bg-dark);
            --bg-secondary: #1e293b;
            --text-primary: var(--text-dark);
            --text-secondary: #cbd5e1;
            --border-color: var(--border-dark);
        }
        
        [data-theme="light"] {
            --bg-primary: var(--bg-light);
            --bg-secondary: #ffffff;
            --text-primary: var(--text-light);
            --text-secondary: #64748b;
            --border-color: var(--border-light);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
        }
        
        .input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .hidden { display: none; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .gap-2 { gap: 8px; }
        .gap-4 { gap: 16px; }
        .p-4 { padding: 16px; }
        .mb-4 { margin-bottom: 16px; }
        .w-full { width: 100%; }
        .h-full { height: 100%; }
        .min-h-screen { min-height: 100vh; }
        .rounded { border-radius: 8px; }
        .shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            margin: 8px 0;
            word-wrap: break-word;
        }
        
        .message-sent {
            background: var(--primary);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        
        .message-received {
            background: var(--bg-secondary);
            color: var(--text-primary);
            margin-right: auto;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }
        
        .voice-note {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        
        .voice-play-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        
        .voice-play-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.1);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        
        @media (max-width: 768px) {
            .sidebar { width: 100%; }
            .main-content { flex-direction: column; }
        }
    </style>
</head>
<body data-theme="light">
    <!-- Loading Screen -->
    <div id="loadingScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-gradient-to-br from-blue-600 to-blue-800">
        <div class="text-center text-white">
            <div class="mb-6">
                <i class="fas fa-comments text-6xl animate-pulse"></i>
            </div>
            <h1 class="text-3xl font-bold mb-2">JCHAT Premium</h1>
            <p class="text-lg opacity-90">Loading advanced messaging platform...</p>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden min-h-screen">
        <!-- Header -->
        <header class="glass border-b border-white/20 p-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-blue-600 rounded-full flex items-center justify-center">
                        <i class="fas fa-comments text-white text-lg"></i>
                    </div>
                    <h1 class="text-xl font-bold text-white">JCHAT Premium</h1>
                </div>
                
                <div class="flex items-center gap-4">
                    <button id="themeToggle" class="btn btn-secondary w-10 h-10 p-0 rounded-full">
                        <i class="fas fa-moon"></i>
                    </button>
                    
                    <div class="flex items-center gap-3">
                        <div id="userAvatar" class="w-8 h-8 bg-gradient-to-br from-blue-400 to-blue-500 rounded-full flex items-center justify-center cursor-pointer">
                            <i class="fas fa-user text-white text-sm"></i>
                        </div>
                        <span id="userName" class="text-white font-medium">Guest</span>
                        <button id="logoutBtn" class="btn btn-secondary w-8 h-8 p-0 rounded-full text-xs">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex flex-1">
            <!-- Sidebar -->
            <aside class="w-80 bg-white/80 dark:bg-gray-800/80 backdrop-blur-xl border-r border-white/20">
                <div class="p-4">
                    <h2 class="text-lg font-semibold mb-4">Conversations</h2>
                    
                    <div class="mb-4">
                        <input type="text" id="searchInput" placeholder="Search conversations..." class="input pl-10">
                    </div>
                    
                    <div id="conversationList" class="space-y-2">
                        <!-- Conversations will be populated here -->
                    </div>
                    
                    <button id="addFriendBtn" class="btn btn-primary w-full mt-4">
                        <i class="fas fa-user-plus"></i>
                        Add Friend
                    </button>
                </div>
            </aside>

            <!-- Chat Area -->
            <section class="flex-1 flex flex-col">
                <!-- Chat Header -->
                <div id="chatHeader" class="glass border-b border-white/20 p-4 hidden">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div id="partnerAvatar" class="w-10 h-10 bg-gradient-to-br from-blue-400 to-blue-500 rounded-full flex items-center justify-center">
                                <i class="fas fa-user text-white"></i>
                            </div>
                            <div>
                                <h3 id="partnerName" class="font-semibold text-white">Select a conversation</h3>
                                <p id="partnerStatus" class="text-sm text-white/70">Choose a friend to start chatting</p>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-2">
                            <button id="voiceCallBtn" class="btn btn-secondary w-10 h-10 p-0 rounded-full">
                                <i class="fas fa-phone"></i>
                            </button>
                            <button id="videoCallBtn" class="btn btn-secondary w-10 h-10 p-0 rounded-full">
                                <i class="fas fa-video"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Chat Messages -->
                <div id="chatMessages" class="flex-1 p-4 overflow-y-auto">
                    <div class="text-center text-gray-500 py-20">
                        <i class="fas fa-comments text-6xl mb-4 opacity-30"></i>
                        <h3 class="text-xl font-medium mb-2">Welcome to JCHAT Premium</h3>
                        <p class="text-gray-400">Select a conversation to start messaging</p>
                    </div>
                </div>

                <!-- Chat Input -->
                <div id="chatInput" class="glass border-t border-white/20 p-4 hidden">
                    <div class="flex items-end gap-3">
                        <div class="flex-1">
                            <textarea 
                                id="messageInput" 
                                placeholder="Type your message..." 
                                class="input resize-none"
                                rows="1"
                                style="min-height: 44px; max-height: 120px;"
                            ></textarea>
                        </div>
                        
                        <div class="flex items-center gap-2">
                            <button id="attachFileBtn" class="btn btn-secondary w-10 h-10 p-0 rounded-full">
                                <i class="fas fa-paperclip"></i>
                            </button>
                            <button id="voiceNoteBtn" class="btn btn-secondary w-10 h-10 p-0 rounded-full">
                                <i class="fas fa-microphone"></i>
                            </button>
                            <button id="sendMessage" class="btn btn-primary w-10 h-10 p-0 rounded-full">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        console.log('🚀 JCHAT Premium - Starting premium messaging platform...');
        
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBsBinyrD9WZZXRaCvA4gxfX7BIimydDvo",
            authDomain: "jchat-1.firebaseapp.com",
            projectId: "jchat-1",
            storageBucket: "jchat-1.firebasestorage.app",
            messagingSenderId: "328479683167",
            appId: "1:328479683167:web:276c0b7e8ea44dd2d6a1ea",
            measurementId: "G-S6Z9GG0R9P"
        };
        
        // Premium State Management
        class PremiumState {
            constructor() {
                this.state = {
                    user: null,
                    conversations: [],
                    currentChat: null,
                    theme: 'light',
                    isOnline: false,
                    isRecording: false
                };
                this.listeners = new Set();
            }
            
            subscribe(listener) {
                this.listeners.add(listener);
                return () => this.listeners.delete(listener);
            }
            
            notify() {
                this.listeners.forEach(listener => listener(this.state));
            }
            
            update(newState) {
                this.state = { ...this.state, ...newState };
                this.notify();
            }
        }
        
        // Premium Firebase Manager
        class PremiumFirebase {
            constructor() {
                this.app = null;
                this.auth = null;
                this.db = null;
                this.storage = null;
                this.initialize();
            }
            
            async initialize() {
                try {
                    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
                    const { getAuth } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');
                    const { getFirestore } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
                    const { getStorage } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js');
                    
                    this.app = initializeApp(firebaseConfig);
                    this.auth = getAuth(this.app);
                    this.db = getFirestore(this.app);
                    this.storage = getStorage(this.app);
                    
                    console.log('✅ Firebase initialized successfully');
                } catch (error) {
                    console.error('❌ Firebase initialization failed:', error);
                }
            }
            
            async signInAnonymously() {
                try {
                    const { signInAnonymously } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');
                    const userCredential = await signInAnonymously(this.auth);
                    return userCredential.user;
                } catch (error) {
                    console.error('❌ Anonymous sign-in failed:', error);
                    throw error;
                }
            }
            
            async signOut() {
                try {
                    const { signOut } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js');
                    await signOut(this.auth);
                } catch (error) {
                    console.error('❌ Sign out failed:', error);
                    throw error;
                }
            }
        }
        
        // Premium Chat Manager
        class PremiumChat {
            constructor(firebase, state) {
                this.firebase = firebase;
                this.state = state;
                this.currentPartner = null;
                this.messages = [];
            }
            
            async sendMessage(content, type = 'text') {
                try {
                    if (!this.currentPartner || !this.state.state.user) return;
                    
                    const message = {
                        content,
                        type,
                        senderId: this.state.state.user.uid,
                        receiverId: this.currentPartner.uid,
                        timestamp: new Date(),
                        id: Date.now().toString()
                    };
                    
                    this.messages.push(message);
                    this.renderMessage(message);
                    
                    console.log('📤 Message sent:', message);
                    
                } catch (error) {
                    console.error('❌ Failed to send message:', error);
                }
            }
            
            async sendVoiceNote(audioBlob) {
                try {
                    if (!this.currentPartner || !this.state.state.user) return;
                    
                    const message = {
                        type: 'voice',
                        senderId: this.state.state.user.uid,
                        receiverId: this.currentPartner.uid,
                        timestamp: new Date(),
                        id: Date.now().toString(),
                        audioUrl: URL.createObjectURL(audioBlob)
                    };
                    
                    this.messages.push(message);
                    this.renderMessage(message);
                    
                    console.log('🎤 Voice note sent:', message);
                    
                } catch (error) {
                    console.error('❌ Failed to send voice note:', error);
                }
            }
            
            renderMessage(message) {
                const messagesContainer = document.getElementById('chatMessages');
                const messageDiv = document.createElement('div');
                
                const isSent = message.senderId === this.state.state.user?.uid;
                const messageClass = isSent ? 'message-sent' : 'message-received';
                
                if (message.type === 'voice') {
                    messageDiv.innerHTML = `
                        <div class="message-bubble ${messageClass}">
                            <div class="voice-note">
                                <button class="voice-play-btn" onclick="playVoiceNote('${message.audioUrl}')">
                                    <i class="fas fa-play"></i>
                                </button>
                                <div class="voice-waveform"></div>
                                <span class="text-sm opacity-70">Voice Message</span>
                            </div>
                        </div>
                    `;
                } else {
                    messageDiv.innerHTML = `
                        <div class="message-bubble ${messageClass}">
                            ${message.content}
                        </div>
                    `;
                }
                
                messagesContainer.appendChild(messageDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
            
            setCurrentPartner(partner) {
                this.currentPartner = partner;
                this.messages = [];
                this.clearChat();
                this.showChat();
            }
            
            clearChat() {
                const messagesContainer = document.getElementById('chatMessages');
                messagesContainer.innerHTML = '';
            }
            
            showChat() {
                document.getElementById('chatHeader').classList.remove('hidden');
                document.getElementById('chatInput').classList.remove('hidden');
                
                if (this.currentPartner) {
                    document.getElementById('partnerName').textContent = this.currentPartner.displayName || 'Unknown';
                    document.getElementById('partnerStatus').textContent = 'Online';
                }
            }
        }
        
        // Premium Voice Manager
        class PremiumVoice {
            constructor(chat) {
                this.chat = chat;
                this.mediaRecorder = null;
                this.audioChunks = [];
                this.isRecording = false;
                this.recordingTimer = null;
                this.initialize();
            }
            
            initialize() {
                const voiceBtn = document.getElementById('voiceNoteBtn');
                voiceBtn.addEventListener('click', () => this.toggleRecording());
            }
            
            async toggleRecording() {
                if (this.isRecording) {
                    this.stopRecording();
                } else {
                    await this.startRecording();
                }
            }
            
            async startRecording() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    this.mediaRecorder = new MediaRecorder(stream);
                    this.audioChunks = [];
                    this.isRecording = true;
                    
                    this.mediaRecorder.ondataavailable = (event) => {
                        this.audioChunks.push(event.data);
                    };
                    
                    this.mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(this.audioChunks, { type: 'audio/webm' });
                        this.chat.sendVoiceNote(audioBlob);
                        stream.getTracks().forEach(track => track.stop());
                    };
                    
                    this.mediaRecorder.start();
                    this.startRecordingTimer();
                    
                    const voiceBtn = document.getElementById('voiceNoteBtn');
                    voiceBtn.innerHTML = '<i class="fas fa-stop"></i>';
                    voiceBtn.style.background = 'var(--error)';
                    
                    console.log('🎤 Recording started');
                    
                } catch (error) {
                    console.error('❌ Failed to start recording:', error);
                }
            }
            
            stopRecording() {
                if (this.mediaRecorder && this.isRecording) {
                    this.mediaRecorder.stop();
                    this.isRecording = false;
                    this.stopRecordingTimer();
                    
                    const voiceBtn = document.getElementById('voiceNoteBtn');
                    voiceBtn.innerHTML = '<i class="fas fa-microphone"></i>';
                    voiceBtn.style.background = '';
                    
                    console.log('🛑 Recording stopped');
                }
            }
            
            startRecordingTimer() {
                let seconds = 0;
                this.recordingTimer = setInterval(() => {
                    seconds++;
                    const voiceBtn = document.getElementById('voiceNoteBtn');
                    voiceBtn.innerHTML = `<i class="fas fa-stop"></i> ${seconds}s`;
                }, 1000);
            }
            
            stopRecordingTimer() {
                if (this.recordingTimer) {
                    clearInterval(this.recordingTimer);
                    this.recordingTimer = null;
                }
            }
        }
        
        // Premium UI Manager
        class PremiumUI {
            constructor() {
                this.state = new PremiumState();
                this.firebase = new PremiumFirebase();
                this.chat = new PremiumChat(this.firebase, this.state);
                this.voice = new PremiumVoice(this.chat);
                this.initializeUI();
                this.bindEvents();
            }
            
            initializeUI() {
                setTimeout(() => {
                    document.getElementById('loadingScreen').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                }, 2000);
                
                this.setTheme(localStorage.getItem('theme') || 'light');
                this.initializeAuth();
            }
            
            async initializeAuth() {
                try {
                    await this.firebase.initialize();
                    const user = await this.firebase.signInAnonymously();
                    
                    this.state.update({ user });
                    this.updateUserUI(user);
                    
                    console.log('✅ User authenticated:', user);
                    
                } catch (error) {
                    console.error('❌ Authentication failed:', error);
                }
            }
            
            updateUserUI(user) {
                document.getElementById('userName').textContent = user.displayName || 'Anonymous User';
                this.createDemoConversations();
            }
            
            createDemoConversations() {
                const demoUsers = [
                    { uid: 'demo1', displayName: 'Alice Johnson', status: 'Online' },
                    { uid: 'demo2', displayName: 'Bob Smith', status: 'Last seen 2m ago' },
                    { uid: 'demo3', displayName: 'Carol Davis', status: 'Online' }
                ];
                
                this.state.update({ conversations: demoUsers });
                this.renderConversations(demoUsers);
            }
            
            renderConversations(conversations) {
                const container = document.getElementById('conversationList');
                container.innerHTML = '';
                
                conversations.forEach(user => {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'flex items-center gap-3 p-3 rounded hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer transition-colors';
                    userDiv.innerHTML = `
                        <div class="w-10 h-10 bg-gradient-to-br from-blue-400 to-blue-500 rounded-full flex items-center justify-center">
                            <i class="fas fa-user text-white"></i>
                        </div>
                        <div class="flex-1">
                            <h4 class="font-medium">${user.displayName}</h4>
                            <p class="text-sm text-gray-500">${user.status}</p>
                        </div>
                    `;
                    
                    userDiv.addEventListener('click', () => {
                        this.chat.setCurrentPartner(user);
                    });
                    
                    container.appendChild(userDiv);
                });
            }
            
            bindEvents() {
                document.getElementById('themeToggle').addEventListener('click', () => {
                    this.toggleTheme();
                });
                
                const messageInput = document.getElementById('messageInput');
                messageInput.addEventListener('input', this.handleInputResize.bind(this));
                messageInput.addEventListener('keydown', this.handleKeyDown.bind(this));
                
                document.getElementById('sendMessage').addEventListener('click', () => {
                    this.sendMessage();
                });
                
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    this.handleSearch(e.target.value);
                });
                
                document.getElementById('addFriendBtn').addEventListener('click', () => {
                    this.showAddFriendModal();
                });
                
                document.getElementById('logoutBtn').addEventListener('click', () => {
                    this.logout();
                });
            }
            
            setTheme(theme) {
                document.body.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
                this.state.update({ theme });
                
                const icon = document.querySelector('#themeToggle i');
                icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            }
            
            toggleTheme() {
                const newTheme = this.state.state.theme === 'light' ? 'dark' : 'light';
                this.setTheme(newTheme);
            }
            
            handleInputResize(event) {
                const textarea = event.target;
                textarea.style.height = 'auto';
                textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
            }
            
            handleKeyDown(event) {
                if (event.key === 'Enter' && !event.shiftKey) {
                    event.preventDefault();
                    this.sendMessage();
                }
            }
            
            sendMessage() {
                const input = document.getElementById('messageInput');
                const message = input.value.trim();
                
                if (message) {
                    this.chat.sendMessage(message);
                    input.value = '';
                    input.style.height = 'auto';
                }
            }
            
            handleSearch(query) {
                const conversations = this.state.state.conversations;
                const filtered = conversations.filter(user => 
                    user.displayName.toLowerCase().includes(query.toLowerCase())
                );
                this.renderConversations(filtered);
            }
            
            showAddFriendModal() {
                alert('Add friend functionality coming soon!');
            }
            
            async logout() {
                try {
                    await this.firebase.signOut();
                    location.reload();
                } catch (error) {
                    console.error('❌ Logout failed:', error);
                }
            }
        }
        
        // Global functions
        window.playVoiceNote = function(audioUrl) {
            const audio = new Audio(audioUrl);
            audio.play().catch(error => {
                console.error('❌ Failed to play voice note:', error);
            });
        };
        
        // Start the application
        document.addEventListener('DOMContentLoaded', () => {
            new PremiumUI();
        });
    </script>
</body>
</html>
