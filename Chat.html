<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCHAT - Chat</title>
    
    <!-- Security Meta Tags -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="JCHAT - Direct messaging and chat functionality">
    <meta name="keywords" content="chat, messaging, direct message, JCHAT">
    <meta name="author" content="JCHAT Team">

    <!-- Google Fonts: Poppins for headings, Inter for body text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Preconnect to Firebase and Cloudinary domains for faster loading -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firebaseio.com" crossorigin>
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
    <link rel="preconnect" href="https://api.cloudinary.com" crossorigin>
    <link rel="dns-prefetch" href="//fonts.googleapis.com">
    <link rel="dns-prefetch" href="//fonts.gstatic.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        /* Universal box-sizing for consistent layout */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        /* Global CSS Variables for easy theme switching */
        :root {
            --pink: #ff2e92;
            --blue: #00d5ff;
            --glass-black: rgba(10, 10, 10, .75);
            --glass-blue: rgba(0, 213, 255, .15);
            --radius: 20px;
            --transition: .3s ease;

            /* These variables will be overridden by theme classes */
            --white: #fff;
            --text-light: rgba(255, 255, 255, .7);
            --background-main: rgba(10, 10, 10, .75);
            --background-gradient-1: #00d5ff;
            --background-gradient-2: #ff2e92;
            --card-background: linear-gradient(145deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, .01));
            --header-background: linear-gradient(135deg, rgba(10, 10, 10, .85), rgba(10, 10, 10, .75));
            --border-light: rgba(255, 255, 255, .05);
            --input-background: rgba(255, 255, 255, 0.05);
            --button-background: linear-gradient(90deg, var(--blue), var(--pink));
            --button-shadow: 0 4px 15px var(--blue), 0 4px 15px var(--pink);

            /* New variables for consistent theming */
            --background-color-primary: #1a1a2e;
            --background-color-secondary: #0f0f1f;
            --header-background-color: #2a2a4a;
            --footer-background-color: #2a2a4a;
            --content-background-color: #20203a;
            --card-background-color: #2a2a4a;
            --text-color-primary: #e0e0e0;
            --text-color-secondary: #b0b0d0;
            --notification-badge-color: #ff2e92;
            --status-online: #4CAF50;
            --status-offline: #6c757d;
            --status-away: #FFC107;
            --delete-button-color: #dc3545;
            --warning-color: #ffc107;
            --accent-color: #00d5ff;
            --accent-color-dark: #00aaff;
            --border-color: #3a3a5a;
        }

        /* Light Mode */
        body.theme-light-mode {
            --background-main: #f0f2f5;
            --background-gradient-1: #e0e2e5;
            --background-gradient-2: #d0d2d5;
            --white: #333;
            --text-light: #666;
            --card-background: rgba(255, 255, 255, 0.95);
            --header-background: rgba(255, 255, 255, 0.98);
            --border-light: rgba(0, 0, 0, 0.1);
            --input-background: rgba(0, 0, 0, 0.05);
            --button-background: linear-gradient(90deg, #6dd5ed, #2193b0);
            --button-shadow: 0 4px 15px rgba(109, 213, 237, 0.4), 0 4px 15px rgba(33, 147, 176, 0.4);

            --background-color-primary: #f0f2f5;
            --background-color-secondary: #e0e2e5;
            --header-background-color: #ffffff;
            --footer-background-color: #ffffff;
            --content-background-color: #f7f9fb;
            --card-background-color: #ffffff;
            --text-color-primary: #333333;
            --text-color-secondary: #666666;
            --accent-color: #007bff;
            --accent-color-dark: #0056b3;
            --border-color: #e0e0e0;
        }

        /* Dark Mode */
        body.theme-dark-mode {
            --background-main: #1a1a2e;
            --background-gradient-1: #16213e;
            --background-gradient-2: #0f3460;
            --white: #e0e0e0;
            --text-light: #a0a0a0;
            --card-background: rgba(25, 25, 40, 0.7);
            --header-background: linear-gradient(135deg, rgba(10, 10, 20, .85), rgba(10, 10, 20, .75));
            --border-light: rgba(255, 255, 255, 0.08);
            --input-background: rgba(255, 255, 255, 0.08);
            --button-background: linear-gradient(90deg, #e94560, #ba2f49);
            --button-shadow: 0 4px 15px rgba(233, 69, 96, 0.4), 0 4px 15px rgba(186, 47, 73, 0.4);

            --background-color-primary: #121212;
            --background-color-secondary: #1e1e1e;
            --header-background-color: #2c2c2c;
            --footer-background-color: #2c2c2c;
            --content-background-color: #242424;
            --card-background-color: #2c2c2c;
            --text-color-primary: #ffffff;
            --text-color-secondary: #bbbbbb;
            --accent-color: #bb86fc;
            --accent-color-dark: #9a67ea;
            --border-color: #444444;
        }

        /* Glass Mode */
        body.theme-glass-mode {
            --background-main: rgba(10, 10, 10, 0.75);
            background-image: url('https://source.unsplash.com/random/1920x1080?abstract,blur') !important;
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            backdrop-filter: blur(10px);
            --card-background: rgba(25, 25, 40, 0.7);
            --white: #e0e0e0;
            --text-light: rgba(255, 255, 255, 0.7);
            --input-background: rgba(255, 255, 255, 0.05);
            --border-light: rgba(255, 255, 255, 0.1);
            --button-background: linear-gradient(90deg, var(--pink), var(--blue));
            --button-shadow: 0 4px 15px var(--blue), 0 4px 15px var(--pink);
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.5);

            --background-color-primary: rgba(10, 10, 10, 0.75);
            --background-color-secondary: rgba(10, 10, 10, 0.6);
            --header-background-color: rgba(10, 10, 10, 0.85);
            --footer-background-color: rgba(10, 10, 10, 0.85);
            --content-background-color: rgba(10, 10, 10, 0.75);
            --card-background-color: rgba(25, 25, 40, 0.7);
            --text-color-primary: #e0e0e0;
            --text-color-secondary: #b0b0d0;
            --accent-color: #00d5ff;
            --accent-color-dark: #00aaff;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        /* Sunset Mode */
        body.theme-sunset-mode {
            background: linear-gradient(to top, #ff7e5f, #feb47b) !important;
            --background-main: linear-gradient(to top, #ff7e5f, #feb47b);
            --card-background: rgba(255, 255, 255, 0.15);
            --white: #fff;
            --text-light: rgba(255, 255, 255, 0.8);
            --input-background: rgba(255, 255, 255, 0.1);
            --border-light: rgba(255, 255, 255, 0.3);
            --button-background: linear-gradient(90deg, #fd746c, #ff9068);
            --button-shadow: 0 4px 15px rgba(253, 116, 108, 0.4), 0 4px 15px rgba(255, 144, 104, 0.4);

            --background-color-primary: #ff7e5f;
            --background-color-secondary: #feb47b;
            --header-background-color: rgba(255, 126, 95, 0.9);
            --footer-background-color: rgba(255, 126, 95, 0.9);
            --content-background-color: rgba(255, 126, 95, 0.85);
            --card-background-color: rgba(255, 255, 255, 0.15);
            --text-color-primary: #fff;
            --text-color-secondary: rgba(255, 255, 255, 0.8);
            --accent-color: #ffd700;
            --accent-color-dark: #ccaa00;
            --border-color: rgba(255, 255, 255, 0.3);
        }

        /* JCHAT Loader */
        .jchat-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.95), rgba(20, 20, 30, 0.95));
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .jchat-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-container {
            text-align: center;
            position: relative;
        }

        .loader-spinner {
            width: 80px;
            height: 80px;
            border: 4px solid transparent;
            border-radius: 50%;
            position: relative;
            margin: 0 auto 20px;
            animation: spin 2s linear infinite;
        }

        .loader-spinner::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border: 4px solid transparent;
            border-top: 4px solid var(--pink);
            border-right: 4px solid var(--blue);
            border-radius: 50%;
            animation: spin 1.5s linear infinite reverse;
            filter: drop-shadow(0 0 20px var(--pink)) drop-shadow(0 0 20px var(--blue));
        }

        .loader-spinner::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 3px solid transparent;
            border-bottom: 3px solid var(--pink);
            border-left: 3px solid var(--blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            filter: drop-shadow(0 0 15px var(--pink)) drop-shadow(0 0 15px var(--blue));
        }

        .loader-text {
            color: var(--white);
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--pink), var(--blue), var(--pink));
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 2s ease-in-out infinite;
        }

        .loader-subtext {
            color: var(--text-light);
            font-size: 14px;
            opacity: 0.7;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* Base Styles */
        html, body {
            scroll-behavior: auto !important;
            overflow: auto !important;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 0px;
            background-color: var(--background-main);
            background-image: radial-gradient(circle at top left, var(--background-gradient-1), transparent 100px),
                              radial-gradient(circle at bottom right, var(--background-gradient-2), transparent 150px);
            color: var(--white);
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* Header Styling */
        header {
            background: var(--header-background);
            border-bottom: 1px solid var(--border-light);
            padding: 10px 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 55px;
            z-index: 10;
            display: flex;
            justify-content: center;
        }

        header .header-content-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            padding: 0 30px;
        }

        .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            background-clip: text;
            color: transparent;
            background-image: linear-gradient(90deg, var(--blue), var(--pink));
            letter-spacing: -0.03em;
            text-decoration: none;
        }

        /* Header Navigation */
        header nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 25px;
        }

        header nav ul li a {
            color: var(--white);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 5px 0;
            position: relative;
            transition: color var(--transition);
        }

        header nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 3px;
            background: var(--blue);
            border-radius: 2px;
            transition: width var(--transition);
        }

        header nav ul li a:hover {
            color: var(--blue);
        }

        header nav ul li a:hover::after {
            width: 100%;
        }

        /* Notification Icon Styling */
        .notification-icon-wrapper {
            position: relative;
            margin-right: 15px;
        }

        .notification-icon-wrapper a {
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .notification-icon-wrapper a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .notification-icon-wrapper a:hover::before {
            left: 100%;
        }

        .notification-icon-wrapper a:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 213, 255, 0.3);
            border-color: var(--blue);
        }

        .notification-icon-wrapper i {
            font-size: 1.3rem;
            background: linear-gradient(45deg, var(--blue), var(--pink));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            transition: all 0.3s ease;
            z-index: 1;
            position: relative;
        }

        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: linear-gradient(45deg, #ff4757, #ff3742);
            color: var(--white);
            border-radius: 50%;
            padding: 4px 8px;
            font-size: 0.7rem;
            font-weight: 800;
            min-width: 22px;
            height: 22px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--background-main);
            animation: pulse-notification 2s infinite;
            z-index: 2;
        }

        @keyframes pulse-notification {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .notification-badge:empty {
            display: none;
        }

        /* Admin Icon Styling */
        #adminIconLink {
            display: none;
            margin-right: 15px;
            background-image: linear-gradient(90deg, var(--blue), var(--pink));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            font-size: 1.5rem;
            transition: transform 0.2s ease;
        }

        #adminIconLink:hover {
            transform: scale(1.1);
        }

        /* User Profile Header Styling */
        .user-profile-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-profile-header #profileLink {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--white);
            transition: opacity 0.3s ease, background-color 0.3s ease;
            padding: 5px 10px;
            border-radius: var(--radius);
        }

        .user-profile-header #profileLink:hover {
            opacity: 0.8;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .user-profile-header img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: opacity 0.3s ease;
        }

        .user-profile-header i {
            font-size: 30px;
            background-image: linear-gradient(90deg, var(--blue), var(--pink));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        .user-profile-header span {
            font-weight: 600;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
            background-image: linear-gradient(90deg, var(--blue), var(--pink));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        /* Logout Button Styling */
        #logoutButton {
            background: linear-gradient(90deg, var(--pink), var(--blue));
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.3s ease;
            opacity: 0.8;
            margin-left: 10px;
        }

        #logoutButton:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px var(--pink), 0 44px 15px var(--blue);
            opacity: 1;
        }

        #logoutButton i {
            color: var(--white);
            font-size: 0.9rem;
        }

        /* Main Content Area */
        main {
            flex-grow: 1;
            padding: 40px 0;
            padding-top: 55px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            text-align: center;
        }

        .content-wrapper {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            overflow: visible;
        }

        /* Chat Container Styles */
        .chat-container {
            display: flex;
            width: 100%;
            height: calc(100vh - 120px);
            background: var(--card-background);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .chat-sidebar {
            width: 300px;
            background: var(--card-background);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-light);
        }

        .chat-item.active {
            background: rgba(0, 213, 255, 0.1);
            border-color: var(--blue);
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border-light);
        }

        .chat-info {
            flex: 1;
            text-align: left;
        }

        .chat-name {
            font-weight: 600;
            color: var(--white);
            margin: 0 0 5px 0;
            font-size: 1rem;
        }

        .chat-last-message {
            color: var(--text-light);
            font-size: 0.9rem;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-light);
            background: var(--card-background);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border-light);
        }

        .chat-header-info h3 {
            margin: 0;
            color: var(--white);
            font-size: 1.2rem;
        }

        .chat-header-info p {
            margin: 5px 0 0 0;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 70%;
        }

        .message.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.received {
            align-self: flex-start;
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border-light);
            flex-shrink: 0;
        }

        .message-content {
            background: var(--input-background);
            padding: 12px 16px;
            border-radius: 18px;
            border: 1px solid var(--border-light);
            color: var(--white);
            word-wrap: break-word;
        }

        .message.sent .message-content {
            background: linear-gradient(135deg, var(--blue), var(--pink));
            color: white;
        }

        .message-time {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 5px;
            text-align: center;
        }

        .chat-input-container {
            padding: 20px;
            border-top: 1px solid var(--border-light);
            background: var(--card-background);
        }

        .chat-input-wrapper {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid var(--border-light);
            border-radius: 25px;
            background: var(--input-background);
            color: var(--white);
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .chat-input:focus {
            border-color: var(--blue);
        }

        .send-button {
            background: linear-gradient(135deg, var(--blue), var(--pink));
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            font-size: 1.2rem;
        }

        .send-button:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0, 213, 255, 0.4);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* No Chat Selected State */
        .no-chat-selected {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-light);
            text-align: center;
            padding: 40px;
        }

        .no-chat-selected i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .no-chat-selected p {
            font-size: 1.2rem;
            margin: 0;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .chat-container {
                flex-direction: column;
                height: auto;
            }

            .chat-sidebar {
                width: 100%;
                height: 300px;
                border-right: none;
                border-bottom: 1px solid var(--border-light);
            }

            .chat-main {
                height: 400px;
            }

            .message {
                max-width: 85%;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, var(--blue), var(--pink));
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(to bottom, var(--pink), var(--blue));
        }
    </style>
</head>

<body>
    <!-- JCHAT Loader -->
    <div id="jchatLoader" class="jchat-loader">
        <div class="loader-container">
            <div class="loader-spinner"></div>
            <div class="loader-text">JCHAT</div>
            <div class="loader-subtext">Loading your chat experience...</div>
        </div>
    </div>

    <!-- Header -->
    <header>
        <div class="header-content-wrapper">
            <a href="/Home.html" class="logo">JCHAT</a>
            <nav>
                <ul>
                    <!-- Navigation items can be added here -->
                </ul>
            </nav>
            <div class="user-profile-header">
                <!-- Admin Icon Link (hidden by default) -->
                <a href="/gas_management.html" id="adminIconLink" aria-label="Admin Dashboard">
                    <i class="fas fa-user-cog"></i>
                </a>
                <!-- Notification Icon with Badge -->
                <div class="notification-icon-wrapper">
                    <a href="/notifications.html" aria-label="Notifications">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge" id="notificationCount" style="display: none;">0</span>
                    </a>
                </div>
                <!-- User Profile Link -->
                <a href="/Profile.html" id="profileLink">
                    <img id="headerProfilePic" src="" alt="Profile Picture" style="display: none;">
                    <i id="headerAvatarIcon" class="fas fa-user-circle"></i>
                    <span id="headerDisplayName">Guest</span>
                </a>
                <!-- Logout Button -->
                <button id="logoutButton" aria-label="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="content-wrapper">
            <div class="chat-container">
                <!-- Chat Sidebar -->
                <div class="chat-sidebar">
                    <div class="chat-list" id="chatList">
                        <!-- Chat items will be populated here -->
                    </div>
                </div>

                <!-- Chat Main Area -->
                <div class="chat-main">
                    <!-- Chat Header -->
                    <div class="chat-header" id="chatHeader" style="display: none;">
                        <img id="chatHeaderAvatar" src="" alt="Chat Avatar" class="chat-header-avatar">
                        <div class="chat-header-info">
                            <h3 id="chatHeaderName">Chat Name</h3>
                            <p id="chatHeaderStatus">Online</p>
                        </div>
                    </div>

                    <!-- Chat Messages -->
                    <div class="chat-messages" id="chatMessages">
                        <div class="no-chat-selected">
                            <i class="fas fa-comment-dots"></i>
                            <p>Select a chat from the left to start messaging!</p>
                        </div>
                    </div>

                    <!-- Chat Input -->
                    <div class="chat-input-container" id="chatInputContainer" style="display: none;">
                        <div class="chat-input-wrapper">
                            <textarea 
                                id="chatInput" 
                                class="chat-input" 
                                placeholder="Type your message here..."
                                rows="1"
                            ></textarea>
                            <button id="sendButton" class="send-button" disabled>
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script type="module">
        // Import Firebase modules (Updated to v11.8.0 - Latest Stable)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateProfile, signOut, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, setDoc, collection, query, where, getDocs, onSnapshot, addDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/11.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.8.0/firebase-storage.js";

        // Firebase Configuration
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyBsBinyrD9WZZXRaCvA4gxfX7BIimydDvo",
            authDomain: "jchat-1.firebaseapp.com",
            projectId: "jchat-1",
            storageBucket: "jchat-1.firebasestorage.app",
            appId: "1:328479683167:web:276c0b7e8ea44dd2d6a1ea",
            measurementId: "G-S6Z9GG0R9P"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        // Cloudinary Configuration
        const cloudinaryConfig = {
            cloudName: "dxld01rcp",
            uploadPreset: "Storage_preset"
        };

        // Initialize Firebase services
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // DOM Elements
        const jchatLoader = document.getElementById('jchatLoader');
        const headerProfilePic = document.getElementById('headerProfilePic');
        const headerAvatarIcon = document.getElementById('headerAvatarIcon');
        const headerDisplayName = document.getElementById('headerDisplayName');
        const adminIconLink = document.getElementById('adminIconLink');
        const logoutButton = document.getElementById('logoutButton');
        const chatList = document.getElementById('chatList');
        const chatHeader = document.getElementById('chatHeader');
        const chatHeaderAvatar = document.getElementById('chatHeaderAvatar');
        const chatHeaderName = document.getElementById('chatHeaderName');
        const chatHeaderStatus = document.getElementById('chatHeaderStatus');
        const chatMessages = document.getElementById('chatMessages');
        const chatInputContainer = document.getElementById('chatInputContainer');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');

        // Chat State
        let currentUser = null;
        let currentChatId = null;
        let unsubscribeMessages = null;
        let chatListData = [];

        // JCHAT Loader Management
        function showLoader(message = 'Loading your chat experience') {
            if (jchatLoader) {
                const subtext = jchatLoader.querySelector('.loader-subtext');
                if (subtext) {
                    subtext.textContent = message;
                }
                jchatLoader.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            }
        }

        function hideLoader() {
            if (jchatLoader) {
                jchatLoader.classList.add('hidden');
                document.body.style.overflow = 'auto';
                setTimeout(() => {
                    if (jchatLoader.classList.contains('hidden')) {
                        jchatLoader.style.display = 'none';
                    }
                }, 500);
            }
        }

        // Profile Picture Display Function
        function displayProfilePicture(imgElement, iconElement, profilePicId, fallbackInitial, cloudinaryParams = "w_70,h_70,c_fill,g_face,r_max") {
            if (!imgElement || !iconElement) return;

            if (profilePicId && profilePicId !== 'default') {
                try {
                    if (profilePicId.startsWith('http')) {
                        imgElement.src = profilePicId;
                    } else {
                        imgElement.src = `https://res.cloudinary.com/${cloudinaryConfig.cloudName}/image/upload/${cloudinaryParams}/${profilePicId}`;
                    }
                    imgElement.style.display = 'block';
                    iconElement.style.display = 'none';
                } catch (error) {
                    console.error('Error displaying profile picture:', error);
                    imgElement.style.display = 'none';
                    iconElement.style.display = 'block';
                    iconElement.textContent = fallbackInitial;
                }
            } else {
                imgElement.style.display = 'none';
                iconElement.style.display = 'block';
                iconElement.textContent = fallbackInitial;
            }
        }

        // Fetch and Display Header Profile
        async function fetchAndDisplayHeaderProfile(user) {
            try {
                const profileDocRef = doc(db, "artifacts", appId, "users", user.uid, "profiles", "user_profile");
                const profileSnap = await getDoc(profileDocRef);
                
                if (profileSnap.exists()) {
                    const profileData = profileSnap.data();
                    const username = profileData.username || user.displayName || `User_${user.uid.substring(0, 8)}`;
                    const profilePicId = profileData.profilePicId;
                    
                    displayProfilePicture(headerProfilePic, headerAvatarIcon, profilePicId, username.charAt(0).toUpperCase());
                    headerDisplayName.textContent = username;
                } else {
                    const username = user.displayName || `User_${user.uid.substring(0, 8)}`;
                    displayProfilePicture(headerProfilePic, headerAvatarIcon, user.photoURL, username.charAt(0).toUpperCase());
                    headerDisplayName.textContent = username;
                }
            } catch (error) {
                console.error('Error fetching header profile:', error);
                const username = user.displayName || `User_${user.uid.substring(0, 8)}`;
                displayProfilePicture(headerProfilePic, headerAvatarIcon, user.photoURL, username.charAt(0).toUpperCase());
                headerDisplayName.textContent = username;
            }
        }

        // Fetch Chat List
        async function fetchChatList() {
            if (!currentUser) return;

            try {
                const chatsRef = collection(db, "artifacts", appId, "chats");
                const q = query(chatsRef, where("participants", "array-contains", currentUser.uid));
                const querySnapshot = await getDocs(q);
                
                chatListData = [];
                querySnapshot.forEach((doc) => {
                    const chatData = doc.data();
                    chatListData.push({
                        id: doc.id,
                        ...chatData
                    });
                });

                renderChatList();
            } catch (error) {
                console.error('Error fetching chat list:', error);
            }
        }

        // Render Chat List
        function renderChatList() {
            chatList.innerHTML = '';
            
            if (chatListData.length === 0) {
                chatList.innerHTML = '<div class="no-chat-selected"><p>No chats yet. Start a conversation!</p></div>';
                return;
            }

            chatListData.forEach(chat => {
                const chatItem = document.createElement('div');
                chatItem.className = 'chat-item';
                chatItem.onclick = () => selectChat(chat);
                
                const otherUserId = chat.participants.find(id => id !== currentUser.uid);
                const otherUserData = chat.participantsData?.[otherUserId] || {};
                
                chatItem.innerHTML = `
                    <img src="${otherUserData.profilePicId ? `https://res.cloudinary.com/${cloudinaryConfig.cloudName}/image/upload/w_50,h_50,c_fill,g_face,r_max/${otherUserData.profilePicId}` : ''}" 
                         alt="Avatar" 
                         class="chat-avatar"
                         onerror="this.style.display='none'">
                    <div class="chat-info">
                        <div class="chat-name">${otherUserData.username || `User_${otherUserId.substring(0, 8)}`}</div>
                        <div class="chat-last-message">${chat.lastMessage || 'Start a conversation!'}</div>
                    </div>
                `;
                
                chatList.appendChild(chatItem);
            });
        }

        // Select Chat
        function selectChat(chat) {
            currentChatId = chat.id;
            
            // Update active state
            document.querySelectorAll('.chat-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // Show chat interface
            chatHeader.style.display = 'flex';
            chatInputContainer.style.display = 'block';
            
            const otherUserId = chat.participants.find(id => id !== currentUser.uid);
            const otherUserData = chat.participantsData?.[otherUserId] || {};
            
            chatHeaderName.textContent = otherUserData.username || `User_${otherUserId.substring(0, 8)}`;
            chatHeaderStatus.textContent = 'Online';
            
            if (otherUserData.profilePicId) {
                chatHeaderAvatar.src = `https://res.cloudinary.com/${cloudinaryConfig.cloudName}/image/upload/w_40,h_40,c_fill,g_face,r_max/${otherUserData.profilePicId}`;
            }
            
            // Load messages
            loadChatMessages(chat.id);
            
            // Enable input
            chatInput.disabled = false;
            sendButton.disabled = false;
        }

        // Load Chat Messages
        async function loadChatMessages(chatId) {
            if (unsubscribeMessages) {
                unsubscribeMessages();
            }

            try {
                const messagesRef = collection(db, "artifacts", appId, "chats", chatId, "messages");
                const q = query(messagesRef, orderBy("timestamp", "asc"));
                
                unsubscribeMessages = onSnapshot(q, (snapshot) => {
                    chatMessages.innerHTML = '';
                    
                    snapshot.forEach((doc) => {
                        const messageData = doc.data();
                        const messageElement = createMessageElement(messageData);
                        chatMessages.appendChild(messageElement);
                    });
                    
                    // Scroll to bottom
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                });
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        // Create Message Element
        function createMessageElement(messageData) {
            const messageDiv = document.createElement('div');
            const isSent = messageData.senderId === currentUser.uid;
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            
            const timestamp = messageData.timestamp?.toDate() || new Date();
            const timeString = timestamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            messageDiv.innerHTML = `
                <img src="${messageData.senderProfilePic ? `https://res.cloudinary.com/${cloudinaryConfig.cloudName}/image/upload/w_35,h_35,c_fill,g_face,r_max/${messageData.senderProfilePic}` : ''}" 
                     alt="Avatar" 
                     class="message-avatar"
                     onerror="this.style.display='none'">
                <div class="message-content">
                    ${messageData.text}
                    <div class="message-time">${timeString}</div>
                </div>
            `;
            
            return messageDiv;
        }

        // Send Message
        async function sendMessage() {
            if (!currentChatId || !chatInput.value.trim()) return;

            const messageText = chatInput.value.trim();
            chatInput.value = '';

            try {
                const messagesRef = collection(db, "artifacts", appId, "chats", currentChatId, "messages");
                await addDoc(messagesRef, {
                    text: messageText,
                    senderId: currentUser.uid,
                    senderProfilePic: currentUser.profilePicId,
                    timestamp: serverTimestamp()
                });

                // Update chat last message
                const chatRef = doc(db, "artifacts", appId, "chats", currentChatId);
                await updateDoc(chatRef, {
                    lastMessage: messageText,
                    lastMessageTime: serverTimestamp()
                });

            } catch (error) {
                console.error('Error sending message:', error);
            }
        }

        // Event Listeners
        sendButton.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        logoutButton.addEventListener('click', async () => {
            try {
                await signOut(auth);
                window.location.href = '/Login.html';
            } catch (error) {
                console.error('Error signing out:', error);
            }
        });

        // Auto-resize textarea
        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Authentication State Observer
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                console.log("JCHAT_DEBUG: User authenticated in Chat Page:", user.uid);
                await fetchAndDisplayHeaderProfile(user);
                fetchChatList();

                // Show Admin Icon only if the current user is the ADMIN_UID
                if (currentUser.uid === 'ADMIN_UID') {
                    adminIconLink.style.display = 'block';
                } else {
                    adminIconLink.style.display = 'none';
                }

                hideLoader();
            } else {
                console.log("JCHAT_DEBUG: No user signed in. Attempting anonymous sign-in or redirecting to login page.");
                try {
                    if (initialAuthToken) {
                        await signInWithCustomToken(auth, initialAuthToken);
                        console.log("JCHAT_DEBUG: Signed in with custom token.");
                    } else {
                        await signInAnonymously(auth);
                        console.log("JCHAT_DEBUG: Signed in anonymously.");
                    }
                } catch (error) {
                    console.error("JCHAT_ERROR: Error during anonymous sign-in or custom token sign-in:", error);
                    if (!auth.currentUser) {
                        window.location.href = '/Login.html';
                    }
                }
            }
        });

        // Theme Management
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('jchat-theme');
            const themes = ['theme-light-mode', 'theme-dark-mode', 'theme-glass-mode', 'theme-sunset-mode'];
            if (savedTheme && themes.includes(savedTheme)) {
                document.body.classList.remove(...themes);
                document.body.classList.add(savedTheme);
            } else {
                document.body.classList.remove(...themes);
                document.body.classList.add('theme-dark-mode');
            }
        });

        window.addEventListener('storage', (event) => {
            if (event.key === 'jchat-theme') {
                const newTheme = event.newValue || 'theme-dark-mode';
                const themes = ['theme-light-mode', 'theme-dark-mode', 'theme-glass-mode', 'theme-sunset-mode'];
                if (themes.includes(newTheme)) {
                    document.body.classList.remove(...themes);
                    document.body.classList.add(newTheme);
                }
            }
        });

        window.addEventListener('beforeunload', () => {
            if (unsubscribeMessages) {
                unsubscribeMessages();
            }
        });
    </script>
</body>
</html>
