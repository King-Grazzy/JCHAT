<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCHAT - JCoin Store</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://*.firebaseio.com" crossorigin>
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* Universal box-sizing for consistent layout */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        /* Global CSS Variables - Keep consistent with other pages */
        :root {
            --pink: #ff2e92;
            --blue: #00d5ff;
            --glass-black: rgba(10, 10, 10, .75);
            --glass-blue: rgba(0, 213, 255, .15);
            --radius: 20px;
            --transition: .3s ease;

            /* These variables will be overridden by theme classes */
            --white: #fff;
            --text-light: rgba(255, 255, 255, .7);
            --background-main: rgba(10, 10, 10, .75);
            --background-gradient-1: #00d5ff;
            --background-gradient-2: #ff2e92;
            --card-background: linear-gradient(145deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, .01));
            --header-background: linear-gradient(135deg, rgba(10, 10, 20, .85), rgba(10, 10, 20, .75));
            --border-light: rgba(255, 255, 255, .05);
            --input-background: rgba(255, 255, 255, 0.05);
            --button-background: linear-gradient(90deg, var(--blue), var(--pink));
            --button-shadow: 0 4px 15px var(--blue), 0 4px 15px var(--pink);
        }

        /* --- Theme Definitions (Simplified: Light and Dark Mode) --- */
        /* Light Mode */
        body.theme-light-mode {
            --background-main: #f0f2f5; /* Light gray background */
            --background-gradient-1: #e0e2e5; /* Subtle lighter gradient */
            --background-gradient-2: #d0d2d5; /* Subtle darker gradient */
            --white: #333; /* Dark text for readability */
            --text-light: #666; /* Lighter dark text */
            --card-background: rgba(255, 255, 255, 0.95); /* Near white cards */
            --header-background: rgba(255, 255, 255, 0.98); /* Near white header */
            --border-light: rgba(0, 0, 0, 0.1); /* Light borders */
            --input-background: rgba(0, 0, 0, 0.05); /* Light input background */
            --button-background: linear-gradient(90deg, #6dd5ed, #2193b0); /* Blue gradient */
            --button-shadow: 0 4px 15px rgba(109, 213, 237, 0.4), 0 4px 15px rgba(33, 147, 176, 0.4);
        }

        /* Dark Mode */
        body.theme-dark-mode {
            --background-main: #1a1a2e; /* Deep purple-dark blue */
            --background-gradient-1: #16213e; /* Slightly lighter deep blue */
            --background-gradient-2: #0f3460; /* Darker blue */
            --white: #e0e0e0; /* Off-white text */
            --text-light: #a0a0a0; /* Grayish text */
            --card-background: rgba(25, 25, 40, 0.7); /* Darker, less transparent cards */
            --header-background: linear-gradient(135deg, rgba(10, 10, 20, .85), rgba(10, 10, 20, .75)); /* Original dark header */
            --border-light: rgba(255, 255, 255, 0.08); /* Subtle white borders */
            --input-background: rgba(255, 255, 255, 0.08); /* Dark input background */
            --button-background: linear-gradient(90deg, #e94560, #ba2f49); /* Reddish gradient */
            --button-shadow: 0 4px 15px rgba(233, 69, 96, 0.4), 0 4px 15px rgba(186, 47, 73, 0.4);
        }

        /* Always show scrollbar to prevent layout shifts */
        html {
            overflow-y: scroll;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding-bottom: 20px; /* Some padding at the bottom */
            background-color: var(--background-main);
            background-image: radial-gradient(circle at top left, var(--background-gradient-1), transparent 100px),
                              radial-gradient(circle at bottom right, var(--background-gradient-2), transparent 150px);
            color: var(--white);
            transition: background-color 0.5s ease, color 0.5s ease; /* Smooth theme transition */
        }

        /* Header Styling */
        header {
            background: var(--header-background);
            border-bottom: 1px solid var(--border-light);
            padding: 10px 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 55px;
            z-index: 10;
            display: flex;
            justify-content: center;
        }

        header .header-content-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            padding: 0 30px;
        }

        .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            background-clip: text;
            color: transparent;
            background-image: linear-gradient(90deg, var(--blue), var(--pink));
            letter-spacing: -0.03em;
            text-decoration: none;
        }

        /* Header Navigation (simplified) */
        header nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 25px;
        }

        header nav ul li a {
            color: var(--white);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 5px 0;
            position: relative;
            transition: color var(--transition);
        }

        header nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 3px;
            background: var(--blue);
            border-radius: 2px;
            transition: width var(--transition);
        }

        header nav ul li a:hover {
            color: var(--blue);
        }

        header nav ul li a:hover::after {
            width: 100%;
        }

        /* Smart Back Button Styling */
        .smart-back-button {
            background: linear-gradient(90deg, var(--pink), var(--blue));
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.3s ease;
            opacity: 0.8;
            margin-right: 15px;
        }

        .smart-back-button:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px var(--pink), 0 4px 15px var(--blue);
            opacity: 1;
        }

        .smart-back-button i {
            color: var(--white);
            font-size: 0.9rem;
        }

        /* User Profile Header Styling */
        .user-profile-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-profile-header #profileLink {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--white);
            transition: opacity 0.3s ease, background-color 0.3s ease;
            padding: 5px 10px;
            border-radius: var(--radius);
        }

        .user-profile-header #profileLink:hover {
            opacity: 0.8;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .user-profile-header img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--blue);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: opacity 0.3s ease;
        }

        .user-profile-header i {
            font-size: 30px;
            color: var(--text-light);
        }

        .user-profile-header span {
            font-weight: 600;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }

        /* Logout Button Styling */
        #logoutButton {
            background: linear-gradient(90deg, var(--pink), var(--blue));
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.3s ease;
            opacity: 0.8;
            margin-left: 10px;
        }

        #logoutButton:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px var(--pink), 0 4px 15px var(--blue);
            opacity: 1;
        }

        #logoutButton i {
            color: var(--white);
            font-size: 0.9rem;
        }

        /* Main Content */
        main {
            flex-grow: 1;
            padding: 20px 0;
            padding-top: 55px; /* Adjust for fixed header */
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Align content to top */
            text-align: center;
        }

        .content-wrapper {
            width: 100%;
            max-width: 800px; /* Wider for more content */
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .generator-card {
            background: var(--card-background);
            border: 1px solid var(--glass-blue);
            backdrop-filter: blur(10px) saturate(180%);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, .3);
            text-align: center;
            margin-bottom: 20px;
        }

        .generator-card h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 25px;
            background-clip: text;
            color: transparent;
            background-image: linear-gradient(90deg, var(--blue), var(--pink));
        }

        .info-section {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-item {
            flex: 1 1 150px; /* Allows items to grow/shrink but maintain min-width */
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid var(--border-light);
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
        }

        .info-item .label {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 5px;
        }

        .info-item .value {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--pink);
            background-clip: text;
            color: transparent;
            background-image: linear-gradient(90deg, var(--blue), var(--pink));
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--white);
        }

        .form-group input[type="text"],
        .form-group select { /* Added select to styling */
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            background: var(--input-background);
            border: 1px solid var(--border-light);
            color: var(--white);
            font-size: 1rem;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .form-group input[type="text"]:focus,
        .form-group select:focus { /* Added select to styling */
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(0, 213, 255, 0.2);
        }

        .action-button {
            background: var(--button-background);
            color: var(--white);
            border: none;
            border-radius: 25px;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--button-shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
        }

        .action-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--blue), 0 6px 20px var(--pink);
        }

        .action-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .generated-code-display {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed var(--blue);
            border-radius: 10px;
            padding: 15px;
            margin-top: 25px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            color: var(--pink);
            display: none; /* Hidden by default */
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .generated-code-display button {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 1.2rem;
            transition: color 0.2s ease;
        }

        .generated-code-display button:hover {
            color: var(--white);
        }

        /* Custom Message Box Styles */
        #messageBox {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            min-width: 250px;
            text-align: center;
        }
        #messageBox.success {
            background-color: rgba(46, 204, 113, 0.9);
        }
        #messageBox.error {
            background-color: rgba(231, 76, 60, 0.9);
        }
        #messageBox.info {
            background-color: rgba(52, 152, 219, 0.9);
        }
        @keyframes pulse-bg {
            0% { background-color: rgba(52, 152, 219, 0.9); }
            50% { background-color: rgba(52, 152, 219, 0.7); }
            100% { background-color: rgba(52, 152, 219, 0.9); }
        }
        #messageBox.loading-pulse {
            animation: pulse-bg 1.5s infinite ease-in-out;
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            header .header-content-wrapper {
                padding: 0 20px;
            }
            .logo {
                font-size: 1.6rem;
            }
            header nav ul {
                display: none; /* Hide desktop nav on mobile */
            }
            .user-profile-header #profileLink {
                padding: 5px;
            }
            .user-profile-header span {
                max-width: 90px;
            }
            .user-profile-header img {
                width: 30px;
                height: 30px;
            }
            .user-profile-header i {
                font-size: 25px;
            }
            #logoutButton {
                width: 25px;
                height: 25px;
                font-size: 0.8rem;
                margin-left: 8px;
            }
            #logoutButton i {
                font-size: 0.8rem;
            }
            .generator-card {
                padding: 20px;
            }
            .generator-card h2 {
                font-size: 1.8rem;
            }
            .info-item .value {
                font-size: 1.3rem;
            }
            .action-button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
            .generated-code-display {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

    <div id="messageBox"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
        import { userCurrency, setUserCurrencyFromProfile } from "./currency.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsBinyrD9WZZXRaCvA4gxfX7BIimydDvo",
            authDomain: "jchat-1.firebaseapp.com",
            projectId: "jchat-1",
            storageBucket: "jchat-1.firebasestorage.app",
            messagingSenderId: "328479683167",
            appId: "1:328479683167:web:276c0b7e8ea44dd2d6a1ea",
            measurementId: "G-S6Z9GG0R9P"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const cloudinaryConfig = { cloudName: "dxld01rcp", uploadPreset: "Storage_preset" };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        console.log('JCHAT_DEBUG: JCoin Store script loaded');

        const headerProfilePic = document.getElementById('headerProfilePic');
        const headerAvatarIcon = document.getElementById('headerAvatarIcon');
        const headerDisplayName = document.getElementById('headerDisplayName');
        const logoutButton = document.getElementById('logoutButton');
        const messageBox = document.getElementById('messageBox');
        const backButton = document.getElementById('backButton');

        // Store elements
        const currentJCoinsEl = document.getElementById('currentJCoins');
        const nairaPerJEl = document.getElementById('nairaPerJ');
        const orderIdValueEl = document.getElementById('orderIdValue');
        const buyForm = document.getElementById('buyJcoinsForm');
        const jcoinBuyAmountSelect = document.getElementById('jcoinBuyAmount');
        const receiptInput = document.getElementById('receiptInput');
        const submitBuyBtn = document.getElementById('submitBuyBtn');
        const buyResult = document.getElementById('buyResult');

        let currentUser = null;
        let currentUserProfileData = null;
        let orderId = null;

        async function handleLogout() {
            try {
                await signOut(auth);
                showMessage('Logged out successfully', 'success');
                setTimeout(() => { window.location.href = '/Login.html'; }, 800);
            } catch (e) {
                showMessage('Failed to log out', 'error');
            }
        }

        // Auto-auth support (Canvas or fallback anonymous)
        const initialAuthToken = (typeof __initial_auth_token !== 'undefined') ? __initial_auth_token : null;
        async function ensureAuthenticated() {
            try {
                if (auth.currentUser) return;
                headerDisplayName.textContent = 'Signing in…';
                if (initialAuthToken) {
                    await signInWithCustomToken(auth, initialAuthToken);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error('JCHAT_DEBUG: ensureAuthenticated failed:', e);
                showMessage('Authentication failed. Retrying…', 'error');
            }
        }

        function showMessage(text, type='info') {
            showMessageBox(text, type);
        }

        function generateOrderId() {
            return 'ORD-' + Math.random().toString(36).slice(2, 8).toUpperCase();
        }

        async function uploadReceipt(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', cloudinaryConfig.uploadPreset);
            const resp = await fetch(`https://api.cloudinary.com/v1_1/${cloudinaryConfig.cloudName}/auto/upload`, { method: 'POST', body: formData });
            if (!resp.ok) throw new Error('Receipt upload failed');
            const data = await resp.json();
            return data.secure_url;
        }

        async function getUserProfile(userId) {
            const ref = doc(db, "artifacts", appId, "users", userId, "profiles", "user_profile");
            const snap = await getDoc(ref);
            if (!snap.exists()) {
                const base = { jCoins: 0, level: 1, currentXp: 0, xpToNextLevel: 100, createdAt: serverTimestamp(), updatedAt: serverTimestamp() };
                await setDoc(ref, base, { merge: true });
                return base;
            }
            return snap.data();
        }

        async function submitBuyRequest(e) {
            e.preventDefault();
            if (!currentUser) { showMessage('Please log in.', 'error'); return; }
            const amountJ = parseInt(jcoinBuyAmountSelect.value, 10);
            if (!amountJ || amountJ <= 0) { showMessage('Select a valid amount.', 'error'); return; }
            submitBuyBtn.disabled = true;
            showMessage('Submitting request…', 'info');

            let receiptUrl = null;
            try {
                if (receiptInput.files && receiptInput.files[0]) {
                    receiptUrl = await uploadReceipt(receiptInput.files[0]);
                }
            } catch (_) {}

            try {
                const reqId = orderId || generateOrderId();
                const ref = doc(collection(db, 'artifacts', appId, 'coin_requests'));
                const payload = {
                    requestId: reqId,
                    requesterId: currentUser.uid,
                    requestedCoins: amountJ,
                    status: 'Pending',
                    timestamp: serverTimestamp(),
                    ...(receiptUrl ? { paymentProof: receiptUrl } : {})
                };
                await setDoc(ref, payload);
                orderId = generateOrderId();
                orderIdValueEl.textContent = orderId;
                buyResult.style.display = 'flex';
                buyResult.textContent = `Request submitted. Developer will approve and your JCoins will be credited immediately.`;
                showMessage('Request submitted. Await approval.', 'success');
                buyForm.reset();
            } catch (err) {
                showMessage(err?.message || 'Failed to submit request', 'error');
            } finally {
                submitBuyBtn.disabled = false;
            }
        }

        onAuthStateChanged(auth, async (user) => {
            try {
                if (user) {
                    currentUser = user;
                    try {
                        await fetchAndDisplayHeaderProfile(user);
                        const prof = await getUserProfile(user.uid);
                        currentUserProfileData = prof;
                        currentJCoinsEl.textContent = String(prof?.jCoins || 0);
                        try {
                            const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'system_settings');
                            const s = await getDoc(settingsRef);
                            const rate = s.exists() ? (s.data().jcoinNairaRate || 0) : 0;
                            nairaPerJEl.textContent = String(rate);
                        } catch (_) { nairaPerJEl.textContent = '—'; }
                        setUserCurrencyFromProfile(prof || {});
                        orderId = generateOrderId();
                        orderIdValueEl.textContent = orderId;
                    } catch (error) {
                        displayProfilePicture(headerProfilePic, headerAvatarIcon, user.photoURL, (user.displayName || 'J').charAt(0).toUpperCase(), 'w_70,h_70,c_fill,g_face,r_max');
                        headerDisplayName.textContent = user.displayName || 'JCHAT User';
                        showMessage(`Error loading header profile: ${error.message}`, 'error');
                    }
                } else {
                    currentUser = null;
                    headerDisplayName.textContent = 'Guest';
                    headerAvatarIcon.style.display = 'block';
                    headerProfilePic.style.display = 'none';
                    // Anonymous sign-in for access
                    try {
                        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                        if (initialAuthToken) {
                            await signInWithCustomToken(auth, initialAuthToken);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        showMessage('Auth initialization failed', 'error');
                    }
                }
            } catch (fatal) {
                showMessage('Unexpected error. Reload the page.', 'error');
            }
        });

        logoutButton.addEventListener('click', handleLogout);
        buyForm.addEventListener('submit', submitBuyRequest);

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('jchat-theme');
            if (savedTheme && ['theme-light-mode', 'theme-dark-mode'].includes(savedTheme)) {
                document.body.classList.remove('theme-light-mode', 'theme-dark-mode');
                document.body.classList.add(savedTheme);
            } else {
                document.body.classList.add('theme-dark-mode');
            }
            // Kick off auth immediately and retry once after a short delay if needed
            ensureAuthenticated();
            setTimeout(() => { if (!auth.currentUser) ensureAuthenticated(); }, 2000);
        });

        window.addEventListener('storage', (event) => {
            if (event.key === 'jchat-theme') {
                const newTheme = event.newValue || 'theme-dark-mode';
                if (['theme-light-mode', 'theme-dark-mode'].includes(newTheme)) {
                    document.body.classList.remove('theme-light-mode', 'theme-dark-mode');
                    document.body.classList.add(newTheme);
                }
            }
        });

        if (backButton) {
            backButton.addEventListener('click', () => {
                window.history.back();
            });
        }

    </script>
</body>
</html>
