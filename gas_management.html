<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>JCHAT - Admin Dashboard</title>

	<!-- Google Fonts: Poppins for headings, Inter for body text -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<!-- Preconnect to Firebase and Cloudinary domains for faster loading -->
	<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
	<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
	<link rel="preconnect" href="https://*.firebaseio.com" crossorigin>
	<link rel="preconnect" href="https://res.cloudinary.com" crossorigin>

	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
	<!-- Font Awesome for icons -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
	<!-- Tone.js for audio notifications -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

	<style>
		/* styles omitted for brevity */
	</style>
</head>
<body class="theme-dark-mode">

	<header>
		<div class="header-content-wrapper">
			<a href="/home.html" class="logo">JCHAT</a>
			<nav>
				<ul>
					<li><a href="/home.html">Home</a></li>
					<li><a href="/profile.html" id="headerNavLinkProfile">Profile</a></li>
				</ul>
			</nav>
			<div class="user-profile-header">
				<!-- Notification Icon with Badge -->
				<div class="notification-icon-wrapper">
					<a href="/notifications.html" aria-label="Notifications">
						<i class="fas fa-bell"></i>
						<span class="notification-badge" id="notificationCount" style="display: none;">0</span>
					</a>
				</div>
				<!-- Logout Button -->
				<button id="logoutButton" aria-label="Logout" disabled>
					<i class="fas fa-sign-out-alt"></i>
				</button>
				<a href="/profile.html" id="profileLink">
					<img id="headerProfilePic" src="" alt="Profile Picture" style="display: none;">
					<i id="headerAvatarIcon" class="fas fa-user-circle"></i>
					<span id="headerDisplayName">Loading...</span>
				</a>
			</div>
		</div>
	</header>

	<main>
		<div class="content-wrapper">
			<div class="section-card" id="developerPaymentsSection">
				<h1>Developer Payments</h1>
				<p style="color: var(--text-light);">Review JCoin purchase requests. Approve to credit JCoins immediately.</p>
				<div class="filters-container">
					<input type="text" id="devReqSearch" placeholder="Search by User ID or Request ID…">
					<select id="devReqStatus">
						<option value="Pending">Pending</option>
						<option value="Approved">Approved</option>
						<option value="Rejected">Rejected</option>
						<option value="">All</option>
					</select>
					<button id="devReqRefreshBtn">Refresh</button>
				</div>
				<div class="requests-table-container">
					<table class="requests-table">
						<thead>
							<tr>
								<th>Request ID</th>
								<th>User</th>
								<th>Coins</th>
								<th>Proof</th>
								<th>Status</th>
								<th>Requested On</th>
								<th>Actions</th>
							</tr>
						</thead>
						<tbody id="devReqTbody">
							<tr><td colspan="7" style="text-align:center; color: var(--text-light);">Loading…</td></tr>
						</tbody>
					</table>
				</div>
			</div>
			<!-- existing admin content below -->
		</div>
	</main>

	<script type="module">
		console.log("JCHAT_DEBUG: Admin.html script started.");
		import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
		import { getAuth, onAuthStateChanged, signOut, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
		import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs, runTransaction, writeBatch, serverTimestamp, onSnapshot, addDoc, deleteDoc, Timestamp, arrayUnion, arrayRemove, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
		import { getStorage, ref, getDownloadURL, deleteObject, uploadBytes } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

		const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { apiKey:"AIzaSyBsBinyrD9WZZXRaCvA4gxfX7BIimydDvo", authDomain:"jchat-1.firebaseapp.com", projectId:"jchat-1", storageBucket:"jchat-1.firebasestorage.app", messagingSenderId:"328479683167", appId:"1:328479683167:web:276c0b7e8ea44dd2d6a1ea" };
		const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
		const app = initializeApp(firebaseConfig);
		const auth = getAuth(app);
		const db = getFirestore(app);
		const storage = getStorage(app);

		// Developer payments admin UID and section refs
		const DEV_ADMIN_UID = 'cc96gdhCRPO72NFZtleRCujHvIq2';
		const devReqSection = document.getElementById('developerPaymentsSection');
		const devReqSearch = document.getElementById('devReqSearch');
		const devReqStatus = document.getElementById('devReqStatus');
		const devReqRefreshBtn = document.getElementById('devReqRefreshBtn');
		const devReqTbody = document.getElementById('devReqTbody');

		let unsubscribeDevReq = null;
		let allDevReqRows = [];

		function renderDevRequests() {
			const term = (devReqSearch?.value || '').trim().toLowerCase();
			const status = devReqStatus?.value || 'Pending';
			const filtered = allDevReqRows.filter(r => {
				const matchesStatus = status ? (r.status === status) : true;
				const hay = `${r.requestId} ${r.userId}`.toLowerCase();
				const matchesTerm = term ? hay.includes(term) : true;
				return matchesStatus && matchesTerm;
			});
			if (filtered.length === 0) {
				devReqTbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color: var(--text-light);">No requests found.</td></tr>';
				return;
			}
			devReqTbody.innerHTML = filtered.map(r => {
				const proof = r.paymentProof ? `<a href="${r.paymentProof}" target="_blank" rel="noopener">View</a>` : '—';
				const ts = r.timestamp ? new Date(r.timestamp).toLocaleString() : '—';
				const actions = r.status === 'Pending'
					? `<button class="approve-btn" data-id="${r.id}" data-uid="${r.userId}" data-coins="${r.requestedCoins}">Approve</button>
					   <button class="reject-btn" data-id="${r.id}">Reject</button>`
					: '—';
				return `<tr>
					<td>${r.requestId || r.id}</td>
					<td><a href="/profile.html?userId=${r.userId}" target="_blank">${r.userId}</a></td>
					<td>${r.requestedCoins}</td>
					<td>${proof}</td>
					<td>${r.status}</td>
					<td>${ts}</td>
					<td>${actions}</td>
				</tr>`;
			}).join('');

			devReqTbody.querySelectorAll('.approve-btn').forEach(btn => {
				btn.addEventListener('click', async (e) => {
					const id = e.currentTarget.getAttribute('data-id');
					const uid = e.currentTarget.getAttribute('data-uid');
					const coins = parseInt(e.currentTarget.getAttribute('data-coins'), 10) || 0;
					e.currentTarget.disabled = true;
					try {
						const reqRef = doc(db, 'artifacts', appId, 'coin_requests', id);
						const userProfileRef = doc(db, 'artifacts', appId, 'users', uid, 'profiles', 'user_profile');
						const publicProfileRef = doc(db, 'artifacts', appId, 'public_user_data', uid);
						await runTransaction(db, async (tx) => {
							const reqSnap = await tx.get(reqRef);
							if (!reqSnap.exists()) throw new Error('Request not found');
							const req = reqSnap.data();
							if (req.status !== 'Pending') return; // idempotent
							const userSnap = await tx.get(userProfileRef);
							if (!userSnap.exists()) throw new Error('User profile missing');
							const cur = userSnap.data().jCoins || 0;
							tx.update(userProfileRef, { jCoins: cur + (coins || 0), updatedAt: serverTimestamp() });
							tx.set(publicProfileRef, { jCoins: (cur + (coins || 0)) }, { merge: true });
							tx.update(reqRef, { status: 'Approved', approvedAt: serverTimestamp(), approvedBy: auth.currentUser.uid });
						});
					} catch (err) { console.error('JCHAT_ERROR: approve failed', err); }
					finally { e.currentTarget.disabled = false; }
				});
			});
			devReqTbody.querySelectorAll('.reject-btn').forEach(btn => {
				btn.addEventListener('click', async (e) => {
					const id = e.currentTarget.getAttribute('data-id');
					e.currentTarget.disabled = true;
					try {
						await updateDoc(doc(db, 'artifacts', appId, 'coin_requests', id), { status: 'Rejected', rejectedAt: serverTimestamp(), rejectedBy: auth.currentUser.uid });
					} catch (err) { console.error('JCHAT_ERROR: reject failed', err); }
					finally { e.currentTarget.disabled = false; }
				});
			});
		}

		function subscribeDeveloperRequests() {
			if (unsubscribeDevReq) { unsubscribeDevReq(); unsubscribeDevReq = null; }
			try {
				const colRef = collection(db, 'artifacts', appId, 'coin_requests');
				const status = devReqStatus?.value || 'Pending';
				let qref = colRef;
				if (status) { qref = query(colRef, where('status', '==', status)); }
				unsubscribeDevReq = onSnapshot(qref, (snap) => {
					const rows = [];
					snap.forEach((d) => {
						const v = d.data();
						rows.push({ id: d.id, requestId: v.requestId || d.id, userId: v.requesterId, requestedCoins: v.requestedCoins || 0, paymentProof: v.paymentProof || null, status: v.status || 'Pending', timestamp: v.timestamp ? v.timestamp.toDate() : null });
					});
					rows.sort((a,b) => (a.timestamp && b.timestamp) ? (b.timestamp - a.timestamp) : 0);
					allDevReqRows = rows;
					renderDevRequests();
				}, (err) => {
					console.error('JCHAT_ERROR: onSnapshot coin_requests', err);
					devReqTbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color: var(--text-light);">Failed to load.</td></tr>';
				});
			} catch (e) { console.error('JCHAT_ERROR: subscribeDeveloperRequests failed', e); }
		}

		onAuthStateChanged(auth, async (user) => {
			console.log("JCHAT_DEBUG: onAuthStateChanged triggered. User:", user ? user.uid : "null");
			if (user) {
				if (devReqSection) devReqSection.style.display = (user.uid === DEV_ADMIN_UID) ? '' : 'none';
				if (user.uid === DEV_ADMIN_UID) {
					subscribeDeveloperRequests();
					devReqSearch?.addEventListener('input', renderDevRequests);
					devReqStatus?.addEventListener('change', subscribeDeveloperRequests);
					devReqRefreshBtn?.addEventListener('click', subscribeDeveloperRequests);
				}
			} else {
				if (devReqSection) devReqSection.style.display = 'none';
			}
		});
	</script>
</body>
</html>
