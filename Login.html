<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Welcome Back</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 40px 20px 30px;
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 10px;
        }

        .login-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .login-form {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #a0a0a0;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 14px;
            margin-top: 16px;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .forgot-password {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: #764ba2;
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
            color: #a0a0a0;
            font-size: 14px;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e1e5e9;
            z-index: 1;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            z-index: 2;
        }

        .social-login {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .social-btn:hover {
            border-color: #667eea;
            background: #f8f9fa;
        }

        .signup-link {
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            color: #764ba2;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        /* Signup mode styles */
        .login-container.signup-mode .login-header {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .login-container.signup-mode .login-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .login-container.signup-mode .login-btn:hover {
            box-shadow: 0 10px 20px rgba(40, 167, 69, 0.3);
        }

        /* Loading state */
        .login-btn:disabled {
            cursor: not-allowed;
            transform: none !important;
        }

        /* Success message styling */
        .error-message.success {
            background: #d4edda;
            color: #155724;
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 10px;
            }
            
            .login-form {
                padding: 30px 20px;
            }
            
            .login-header {
                padding: 30px 20px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Welcome Back</h1>
            <p>Please sign in to your account</p>
        </div>
        
        <form class="login-form" id="loginForm">
            <div class="error-message" id="errorMessage">
                Invalid email or password. Please try again.
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Enter your email"
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password"
                    required
                >
                <button type="button" class="password-toggle" onclick="togglePassword()">
                    👁️
                </button>
            </div>
            
            <div class="remember-forgot">
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>
            
            <button type="submit" class="login-btn">
                Sign In
            </button>
            
            <div class="divider">
                <span>or continue with</span>
            </div>
            
            <div class="social-login">
                <button type="button" class="social-btn" onclick="loginWithGithub()" style="width: 100%;">
                    🐙 GitHub
                </button>
            </div>
            
            <div class="signup-link">
                Don't have an account? <a href="#" onclick="goToSignup()">Sign up here</a>
            </div>
        </form>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        // Import Firebase modules
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithCustomToken, signOut } from "https://www.gstatic.com/firebasejs/11.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.8.0/firebase-firestore.js";

        // Firebase configuration (using your existing config)
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyBsBinyrD9WZZXRaCvA4gxfX7BIimydDvo",
            authDomain: "jchat-1.firebaseapp.com",
            projectId: "jchat-1",
            storageBucket: "jchat-1.firebasestorage.app",
            messagingSenderId: "328479683167",
            appId: "1:328479683167:web:276c0b7e8ea44dd2d6a1ea",
            measurementId: "G-S6Z9GG0R9P"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Check for OAuth callback parameters
        const urlParams = new URLSearchParams(window.location.search);
        const githubCode = urlParams.get('code');
        const githubState = urlParams.get('state');
        const authError = urlParams.get('error');

        // Handle GitHub OAuth callback
        if (githubCode && githubState) {
            handleGitHubCallback(githubCode, githubState);
        } else if (authError) {
            showError(`Authentication error: ${authError}`);
        }

        // Make functions globally available
        window.togglePassword = function() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.password-toggle');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁️';
            }
        };



        window.loginWithGithub = function() {
            // Generate a random state parameter for security
            const state = generateRandomString(32);
            localStorage.setItem('github_oauth_state', state);
            
            // GitHub OAuth configuration
            const githubClientId = 'Ov23liHpMKo1Rz3s6TIu'; // Your GitHub OAuth app client ID
            const redirectUri = encodeURIComponent(window.location.origin + '/auth/github/callback.html');
            const scope = 'user:email';
            
            // Redirect to GitHub OAuth
            const githubAuthUrl = `https://github.com/login/oauth/authorize?client_id=${githubClientId}&redirect_uri=${redirectUri}&scope=${scope}&state=${state}`;
            
            window.location.href = githubAuthUrl;
        };

        window.goToSignup = function() {
            // Toggle to signup mode
            toggleSignupMode();
        };

        // Handle GitHub OAuth callback
        async function handleGitHubCallback(code, state) {
            try {
                showLoading('Processing GitHub authentication...');
                
                // Verify state parameter
                const savedState = localStorage.getItem('github_oauth_state');
                if (state !== savedState) {
                    throw new Error('Invalid state parameter');
                }
                
                // Exchange code for access token (this would typically be done on your backend)
                const response = await fetch('/api/auth/github/callback', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ code, state })
                });
                
                if (!response.ok) {
                    throw new Error('Failed to authenticate with GitHub');
                }
                
                const data = await response.json();
                
                // Create a custom token for Firebase (this would come from your backend)
                if (data.firebaseToken) {
                    const userCredential = await signInWithCustomToken(auth, data.firebaseToken);
                    const user = userCredential.user;
                    
                    // Save user data
                    await saveUserData(user, 'github', data.githubUser);
                    
                    hideLoading();
                    showSuccess('Successfully signed in with GitHub!');
                    
                    // Redirect to home
                    setTimeout(() => {
                        window.location.href = '/Home.html';
                    }, 1500);
                }
                
                // Clean up
                localStorage.removeItem('github_oauth_state');
                
            } catch (error) {
                hideLoading();
                console.error('GitHub authentication error:', error);
                showError('Failed to authenticate with GitHub. Please try again.');
                
                // Clean up
                localStorage.removeItem('github_oauth_state');
            }
        }

        // Save user data to Firestore
        async function saveUserData(user, provider, additionalData = {}) {
            try {
                const userRef = doc(db, 'users', user.uid);
                const userDoc = await getDoc(userRef);
                
                const userData = {
                    uid: user.uid,
                    email: user.email,
                    displayName: user.displayName,
                    photoURL: user.photoURL,
                    provider: provider,
                    lastLogin: serverTimestamp(),
                    ...additionalData
                };
                
                if (!userDoc.exists()) {
                    // New user
                    userData.createdAt = serverTimestamp();
                    userData.isNewUser = true;
                    await setDoc(userRef, userData);
                } else {
                    // Existing user
                    await updateDoc(userRef, {
                        lastLogin: serverTimestamp(),
                        provider: provider
                    });
                }
                
            } catch (error) {
                console.error('Error saving user data:', error);
            }
        }

        // Generate random string for OAuth state
        function generateRandomString(length) {
            const charset = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += charset.charAt(Math.floor(Math.random() * charset.length));
            }
            return result;
        }

        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const isSignupMode = document.querySelector('.login-container').classList.contains('signup-mode');
            
            // Basic validation
            if (!email || !password) {
                showError('Please fill in all fields.');
                return;
            }
            
            if (!isValidEmail(email)) {
                showError('Please enter a valid email address.');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters long.');
                return;
            }
            
            hideError();
            
            try {
                if (isSignupMode) {
                    await signUpUser(email, password);
                } else {
                    await loginUser(email, password, remember);
                }
            } catch (error) {
                console.error('Authentication error:', error);
                showError(error.message || 'Authentication failed. Please try again.');
            }
        });

        // Sign up user
        async function signUpUser(email, password) {
            showLoading('Creating your account...');
            
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Save user data to Firestore
                await saveUserData(user, 'email');
                
                hideLoading();
                showSuccess('Account created successfully! Welcome to JCHAT!');
                
                // Redirect to home
                setTimeout(() => {
                    window.location.href = '/Home.html';
                }, 1500);
                
            } catch (error) {
                hideLoading();
                let errorMessage = 'Failed to create account. Please try again.';
                
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage = 'An account with this email already exists.';
                        break;
                    case 'auth/weak-password':
                        errorMessage = 'Password is too weak. Please choose a stronger password.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Please enter a valid email address.';
                        break;
                }
                
                showError(errorMessage);
            }
        }

        // Login user
        async function loginUser(email, password, remember) {
            showLoading('Signing you in...');
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // Update last login
                await saveUserData(user, 'email');
                
                hideLoading();
                showSuccess('Successfully signed in! Welcome back!');
                
                // Redirect to home
                setTimeout(() => {
                    window.location.href = '/Home.html';
                }, 1500);
                
            } catch (error) {
                hideLoading();
                let errorMessage = 'Invalid email or password.';
                
                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMessage = 'No account found with this email.';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = 'Incorrect password.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Please enter a valid email address.';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Too many failed attempts. Please try again later.';
                        break;
                }
                
                showError(errorMessage);
            }
        }

        // Email validation
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            resetErrorStyles();
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // Hide error message
        function hideError() {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';
        }

        // Show loading state
        function showLoading(message) {
            const loginBtn = document.querySelector('.login-btn');
            loginBtn.textContent = message;
            loginBtn.disabled = true;
            loginBtn.style.opacity = '0.7';
        }

        // Hide loading state
        function hideLoading() {
            const loginBtn = document.querySelector('.login-btn');
            const isSignupMode = document.querySelector('.login-container').classList.contains('signup-mode');
            loginBtn.textContent = isSignupMode ? 'Create Account' : 'Sign In';
            loginBtn.disabled = false;
            loginBtn.style.opacity = '1';
        }

        // Show success message
        function showSuccess(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.background = '#d4edda';
            errorDiv.style.color = '#155724';
            errorDiv.style.border = '1px solid #c3e6cb';
            errorDiv.style.display = 'block';
        }

        // Reset error message styles
        function resetErrorStyles() {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.background = '#fee';
            errorDiv.style.color = '#c33';
            errorDiv.style.border = 'none';
        }

        // Toggle between login and signup modes
        function toggleSignupMode() {
            const container = document.querySelector('.login-container');
            const header = document.querySelector('.login-header h1');
            const subtitle = document.querySelector('.login-header p');
            const submitBtn = document.querySelector('.login-btn');
            const signupLink = document.querySelector('.signup-link');
            const rememberForgot = document.querySelector('.remember-forgot');
            
            if (container.classList.contains('signup-mode')) {
                // Switch to login mode
                container.classList.remove('signup-mode');
                header.textContent = 'Welcome Back';
                subtitle.textContent = 'Please sign in to your account';
                submitBtn.textContent = 'Sign In';
                signupLink.innerHTML = 'Don\'t have an account? <a href="#" onclick="goToSignup()">Sign up here</a>';
                rememberForgot.style.display = 'flex';
            } else {
                // Switch to signup mode
                container.classList.add('signup-mode');
                header.textContent = 'Join JCHAT';
                subtitle.textContent = 'Create your account to get started';
                submitBtn.textContent = 'Create Account';
                signupLink.innerHTML = 'Already have an account? <a href="#" onclick="goToSignup()">Sign in here</a>';
                rememberForgot.style.display = 'none';
            }
            
            hideError();
        }

        // Check authentication state
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in, redirect to home
                console.log('User already authenticated:', user.email);
                window.location.href = '/Home.html';
            }
        });

        // Add some interactive effects
        document.addEventListener('DOMContentLoaded', function() {
            // Add focus effects to inputs
            const inputs = document.querySelectorAll('input[type="email"], input[type="password"]');
            
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'translateY(-2px)';
                });
                
                input.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'translateY(0)';
                });
            });
        });
    </script>
</body>
</html>
